<!doctype html>
<html>
  <head>
    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marketplace</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --line: #e7eaf0;
        --ink: #0f172a;
        --muted: #6b7280;
        --accent: #4f46e5;
        --accent2: #6366f1;
        --green: #059669;
        --red: #dc2626;
        --yellow: #b45309;
      }
      html[data-theme="dark"] {
        --bg: #0e1014;
        --surface: #161a22;
        --surface-2: #1e232e;
        --line: #2a3140;
        --ink: #e8ebf2;
        --muted: #9aa3b4;
        --green: #34d399;
        --red: #f87171;
        --yellow: #fbbf24;
        color-scheme: dark;
      }
      html[data-theme="dark"] .nav .links a.active {
        background: rgba(99, 102, 241, 0.2);
      }
      html[data-theme="dark"] .nav .me .logout:hover {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.4);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        display: flex;
        overflow: hidden;
      }
      .themebtn {
        cursor: pointer;
      }

      .nav {
        width: 236px;
        background: var(--surface);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }
      .nav .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }
      .nav .brand .mark {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        display: grid;
        place-items: center;
        box-shadow: 0 6px 14px rgba(79, 70, 229, 0.32);
      }
      .nav .brand b {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.15;
      }
      .nav .brand b span {
        display: block;
        font-size: 10.5px;
        color: var(--muted);
        font-weight: 500;
      }
      .nav .links {
        padding: 12px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .nav .links a {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 11px 13px;
        border-radius: 10px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
      }
      .nav .links a:hover {
        background: var(--surface-2);
      }
      .nav .links a.active {
        background: #eef2ff;
        color: var(--accent);
        font-weight: 600;
      }
      .nav .me {
        border-top: 1px solid var(--line);
        padding: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav .me .av {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #34d399, #10b981);
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        flex-shrink: 0;
      }
      .nav .me .who {
        line-height: 1.2;
        min-width: 0;
      }
      .nav .me .who b {
        font-size: 13.5px;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 110px;
      }
      .nav .me .who span {
        display: block;
        font-size: 11px;
        color: var(--muted);
      }
      .nav .me .logout {
        margin-left: auto;
        width: 32px;
        height: 32px;
        border-radius: 9px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      .nav .me .logout:hover {
        color: #ef4444;
        border-color: #fecaca;
        background: #fef2f2;
      }
      .nav .me .logout + .logout {
        margin-left: 8px;
      }

      .frame-wrap {
        flex: 1;
        min-width: 0;
        display: flex;
      }
      .frame-wrap iframe {
        flex: 1;
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--bg);
      }
    </style>
  </head>

  <body>
    <aside class="nav">
      <div class="brand">
        <span class="mark"
          ><svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="12 2 2 8.5 12 15 22 8.5 12 2"></polygon>
            <path d="M2 8.5v7L12 22l10-6.5v-7"></path></svg
        ></span>
        <b>RedeemHub<span>Admin console</span></b>
      </div>
      <nav class="links">
        <a href="/admin.html"
          ><svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path
              d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            ></path>
          </svg>
          Inbox</a
        >
        <a href="/orders"
          ><svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <path d="M3 9h18M7 14h6"></path>
          </svg>
          Orders</a
        >
        <a href="/inventory"
          ><svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M20 7H4M16 3H8M6 11h12l-1 10H7z"></path>
          </svg>
          Inventory</a
        >
        <a href="/twitch-inventory.html"
          ><svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="4" width="20" height="14" rx="2"></rect>
            <path d="M8 21h8M12 18v3M7 8h.01M11 8h2"></path>
          </svg>
          Twitch drops</a
        >
        <a href="/bots.html"
          ><svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="4" y="8" width="16" height="12" rx="2"></rect>
            <path d="M12 8V5M9 3h6M9 14h.01M15 14h.01M2 13h2M20 13h2"></path>
          </svg>
          Bots</a
        >
      </nav>
      <div class="me">
        <span class="av" id="meAvatar">--</span>
        <div class="who">
          <b id="meName">Admin</b><span id="meRole">Seller</span>
        </div>
        <button
          class="logout themebtn"
          data-theme-toggle
          onclick="toggleTheme()"
          title="Toggle dark mode"
          aria-pressed="false"
        >
          <svg
            class="t-moon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
            ></path></svg
          ><svg
            class="t-sun"
            style="display: none"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4"></circle>
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
            ></path>
          </svg>
        </button>
        <button class="logout" id="logoutBtn" title="Log out">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path
              d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
            ></path>
          </svg>
        </button>
      </div>
    </aside>

    <div class="frame-wrap">
      <iframe
        src="/marketplace/"
        title="Marketplace"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>

    <script src="/theme.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      $("logoutBtn").addEventListener("click", async () => {
        try {
          await fetch("/admin-logout", {
            method: "POST",
            credentials: "same-origin",
          });
        } catch (e) {}
        window.location.href = "/admin-login.html";
      });
      (async () => {
        try {
          const r = await fetch("/whoami", { credentials: "same-origin" });
          if (!r.ok) {
            window.location.href = "/admin-login.html";
            return;
          }
          const data = await r.json();
          const admin = (data && data.admin) || {};
          const name = admin.username || "Admin";
          $("meName").innerText = name;
          $("meAvatar").innerText = name.slice(0, 2).toUpperCase();
        } catch (e) {
          window.location.href = "/admin-login.html";
        }
      })();
    </script>
    <script src="/admin-nav.js"></script>
  </body>
</html>
