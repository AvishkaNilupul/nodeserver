<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Generate Redeem Code</title>

  <style>

    /* =========================
       Base
    ========================= */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family:
        'Segoe UI',
        Tahoma,
        sans-serif;

      background:
        radial-gradient(circle at top,
        #0b1220,
        #020617);

      color: #e2e8f0;

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;
    }

    /* =========================
       Container
    ========================= */

    .container {

      width: 100%;
      max-width: 520px;

      background:
        rgba(30, 41, 59, 0.72);

      backdrop-filter: blur(12px);

      border-radius: 20px;

      padding: 32px;

      border:
        1px solid rgba(255,255,255,0.06);

      box-shadow:
        0 0 30px rgba(239, 68, 68, 0.10),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    /* =========================
       Heading
    ========================= */

    h2 {

      font-size: 28px;
      font-weight: 700;

      margin-bottom: 26px;

      letter-spacing: 0.4px;
    }

    /* =========================
       Inputs
    ========================= */

    .input-group {

      display: flex;
      flex-direction: column;

      gap: 18px;
    }

    input {

      width: 100%;

      padding: 16px;

      border-radius: 14px;

      border:
        1px solid rgba(255,255,255,0.06);

      background:
        rgba(2, 6, 23, 0.82);

      color: #f8fafc;

      font-size: 15px;

      outline: none;

      transition: 0.2s ease;
    }

    input:focus {

      border-color:
        rgba(239, 68, 68, 0.45);

      box-shadow:
        0 0 12px rgba(239, 68, 68, 0.18);
    }

    input::placeholder {
      color: #64748b;
    }

    /* =========================
       Button
    ========================= */

    button {

      margin-top: 6px;

      width: 100%;

      padding: 16px;

      border: none;

      border-radius: 14px;

      background:
        linear-gradient(
          135deg,
          #ef4444,
          #dc2626
        );

      color: white;

      font-size: 15px;
      font-weight: 600;

      cursor: pointer;

      transition: 0.2s ease;
    }

    button:hover {

      transform: translateY(-1px);

      box-shadow:
        0 0 18px rgba(239, 68, 68, 0.28);
    }

    button:disabled {

      opacity: 0.7;

      cursor: not-allowed;

      transform: none;
    }

    /* =========================
       Result
    ========================= */

    #result {
      margin-top: 22px;
    }

    .generated-code {

      background:
        rgba(2, 6, 23, 0.82);

      border:
        1px solid rgba(239, 68, 68, 0.18);

      border-radius: 16px;

      padding: 20px;

      text-align: center;

      color: #f87171;

      font-size: 24px;
      font-weight: 700;

      letter-spacing: 3px;

      word-break: break-word;

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .success-message {

      margin-top: 12px;

      text-align: center;

      color: #4ade80;

      font-size: 14px;
    }

    .error {

      text-align: center;

      color: #f87171;

      font-size: 14px;

      margin-top: 10px;
    }

    /* =========================
       Mobile
    ========================= */

    @media (max-width: 480px) {

      body {

        padding: 16px;

        align-items: flex-start;
      }

      .container {

        padding: 22px;
      }

      h2 {

        font-size: 22px;

        margin-bottom: 20px;
      }

      input {

        padding: 14px;

        font-size: 14px;
      }

      button {

        padding: 14px;

        font-size: 14px;
      }

      .generated-code {

        font-size: 17px;

        letter-spacing: 2px;

        padding: 16px;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <h2>Generate Redeem Code</h2>

    <div class="input-group">

      <input
        id="account"
        placeholder="Enter account / username"
      >

      <input
        id="password"
        placeholder="Enter password"
      >

      <input
        id="key"
        placeholder="Enter admin key"
      >

      <button
        onclick="generateCode()"
        id="btn"
      >
        Generate Code
      </button>

    </div>

    <div id="result"></div>

  </div>

  <script>

    async function generateCode() {

      const account =
        document.getElementById("account")
        .value
        .trim();

      const password =
        document.getElementById("password")
        .value
        .trim();

      const key =
        document.getElementById("key")
        .value
        .trim();

      const result =
        document.getElementById("result");

      const btn =
        document.getElementById("btn");

      // Reset UI

      result.innerHTML = "";

      // Validation

      if (!account || !password || !key) {

        result.innerHTML = `
          <div class="error">
            All fields are required
          </div>
        `;

        return;
      }

      // Loading state

      btn.disabled = true;

      btn.innerText = "Generating...";

      try {

        const res = await fetch(
          "/generate",
          {
            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              account,
              password,
              key
            })
          }
        );

        const data = await res.json();

        // Success

        if (data.success) {

          result.innerHTML = `

            <div class="generated-code">
              ${data.code}
            </div>

            <div class="success-message">
              Redeem code generated successfully
            </div>

          `;

        } else {

          result.innerHTML = `
            <div class="error">
              ${data.message || "Failed to generate code"}
            </div>
          `;
        }

      } catch (err) {

        result.innerHTML = `
          <div class="error">
            Server error
          </div>
        `;
      }

      // Reset button

      btn.disabled = false;

      btn.innerText = "Generate Code";
    }

  </script>

</body>
</html>
