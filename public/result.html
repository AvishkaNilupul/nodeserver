<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Live Support</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
.upload-btn{

  padding:14px 18px;

  border-radius:12px;

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );

  color:white;

  cursor:pointer;

  display:flex;

  align-items:center;

  justify-content:center;

}
body{

  font-family:
    'Segoe UI',
    Tahoma,
    sans-serif;

  background:
    radial-gradient(
      circle at top,
      #0b1220,
      #020617
    );

  color:white;

  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:24px;
}

.chat-container{

  width:100%;
  max-width:950px;

  height:85vh;

  background:
    rgba(15,23,42,0.78);

  border:
    1px solid
    rgba(255,255,255,0.06);

  border-radius:22px;

  backdrop-filter:blur(14px);

  overflow:hidden;

  display:flex;

  flex-direction:column;
}

.chat-header{

  padding:24px;

  border-bottom:
    1px solid
    rgba(255,255,255,0.06);

  background:
    rgba(2,6,23,0.45);
}
.status-row{

  display:flex;

  align-items:center;

  gap:10px;

  margin-top:8px;

}

.status-dot{

  width:10px;

  height:10px;

  border-radius:50%;

  background:#22c55e;

  box-shadow:
    0 0 12px #22c55e;

  animation:
    pulse 1.6s infinite;

}

@keyframes pulse{

  0%{

    opacity:1;

    transform:scale(1);

  }

  50%{

    opacity:0.45;

    transform:scale(1.18);

  }

  100%{

    opacity:1;

    transform:scale(1);

  }

}

.chat-header h1{

  font-size:30px;

  margin-bottom:10px;
}

.chat-header p{

  color:#94a3b8;
}

#messages{

  flex:1;

  overflow-y:auto;

  padding:24px;

  display:flex;

  flex-direction:column;

  gap:14px;
}

.message{

  max-width:75%;

  padding:16px;

  border-radius:16px;

  line-height:1.6;

  word-break:break-word;
}

.user{

  align-self:flex-end;

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );

  color:white;
}

.admin{

  align-self:flex-start;

  background:
    rgba(30,41,59,0.9);

  color:#93c5fd;
}

.chat-bottom{

  padding:20px;

  display:flex;

  gap:14px;

  border-top:
    1px solid
    rgba(255,255,255,0.06);
}

input{

  flex:1;

  padding:16px;

  border:none;

  outline:none;

  border-radius:14px;

  background:#020617;

  color:white;

  border:
    1px solid
    rgba(255,255,255,0.06);
}

button{

  padding:16px 24px;

  border:none;

  border-radius:14px;

  cursor:pointer;

  font-weight:600;

  color:white;

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );
}

button:hover{

  box-shadow:
    0 0 16px rgba(239,68,68,0.35);
}

#imageModal{

  display:none;

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:
    rgba(0,0,0,0.88);

  justify-content:center;

  align-items:center;

  z-index:99999;

}

#modalImage{

  max-width:92%;

  max-height:92%;

  border-radius:18px;

  cursor:pointer;

}

@media(max-width:768px){

  .chat-container{

    height:100vh;

    border-radius:0;

  }

  .chat-header h1{

    font-size:24px;

  }

  .message{

    max-width:90%;

    font-size:15px;

  }

  .chat-bottom{

    padding:14px;

    gap:10px;

  }

  input{

    padding:14px;

  }

}
#typingIndicator{

  display:none;

  align-self:flex-start;

  background:
    rgba(30,41,59,0.9);

  color:#94a3b8;

  padding:12px 16px;

  border-radius:16px;

  margin:0 24px 16px;

  animation:
    pulseTyping 1.2s infinite;

}

@keyframes pulseTyping{

  0%{

    opacity:1;

  }

  50%{

    opacity:0.45;

  }

  100%{

    opacity:1;

  }

}
</style>

</head>

<body>

<div class="chat-container">

  <div class="chat-header">

    <h1>Live Support</h1>

    <div class="status-row">

  <div
    class="status-dot"
  ></div>

  <p id="subtitle"></p>

</div>

  </div>

  <div id="messages"></div>

<div
  id="typingIndicator"
>

Support is typing...

</div>

<div class="chat-bottom">

  <input
    id="messageInput"
    placeholder="Type your message..."
    autocomplete="off"
  >

<input
  type="file"
  id="imageUpload"
  accept="image/*"
  style="display:none"
>

<label
  for="imageUpload"
  class="upload-btn"
>

📷

</label>

  <button onclick="sendMessage()">
    Send
  </button>

</div>

</div>
<div id="imageModal">

  <img id="modalImage">

</div>

<script>

// =========================
// Gamer Tag
// =========================

const gamerTag =

  localStorage.getItem(
    "gamerTag"
  );

if(!gamerTag){

  window.location.href =
    "/index.html";

}

// subtitle

document
  .getElementById(
    "subtitle"
  )
  .innerText =

    `Support Online • Connected as ${gamerTag}`;

// =========================
// Socket
// =========================

const socket = io();

socket.on(

  "connect",

  ()=>{

    console.log(

      "CONNECTED:",
      socket.id

    );

    socket.emit(

      "join-user",

      gamerTag

    );

  }

);

socket.onAny(

  (event,...args)=>{

    console.log(

      "SOCKET EVENT:",

      event,

      args

    );

  }

);
// =========================
// Elements
// =========================

const messages =
  document.getElementById(
    "messages"
  );
const typingIndicator =

  document.getElementById(
    "typingIndicator"
  );
const input =
  document.getElementById(
    "messageInput"
  );
let userTypingTimer;
// =========================
// Add Message
// =========================
function addMessage(

  text,
  className

){

  const div =

    document.createElement(
      "div"
    );

  div.classList.add(

    "message",

    className

  );

  div.style.whiteSpace =
    "pre-wrap";

  div.style.wordBreak =
    "break-word";

  if(

    text.startsWith(
      "[IMAGE]"
    )

  ){

    const img =

      document
        .createElement(
          "img"
        );

    img.src =

      text.replace(
        "[IMAGE]",
        ""
      );

    img.style.maxWidth =
      "260px";

    img.style.borderRadius =
      "14px";

    img.style.cursor =
      "pointer";

    img.onclick = ()=>{

      document
        .getElementById(
          "modalImage"
        )
        .src =
          img.src;

      document
        .getElementById(
          "imageModal"
        )
        .style.display =
          "flex";

    };

    div.appendChild(
      img
    );

  }

  else{

    div.textContent =
      text;

  }

  messages.appendChild(
    div
  );

  messages.scrollTop =

    messages.scrollHeight;

    socket.emit(

  "message-seen",

  gamerTag

);

}
socket.on(

  "support-typing",

  ()=>{

    typingIndicator
      .style.display =

        "block";

  }

);

socket.on(

  "support-stop-typing",

  ()=>{

    typingIndicator
      .style.display =

        "none";

  }

);
socket.on(

  "chat-history",

  (history)=>{

    messages.innerHTML = "";

    history.forEach(

      (msg)=>{

        addMessage(

          msg.message,

          msg.sender==="admin"

          ?

          "admin"

          :

          "user"

        );

      }

    );

  }

);

function sendMessage(){

  const message =

    input.value.trim();

  if(!message){

    return;

  }

  socket.emit(

    "user-message",

    {

      userId:
        gamerTag,

      message

    }

  );

  addMessage(

    `You: ${message}`,

    "user"

  );

  input.value = "";

}
// =========================
// Reply
// =========================

socket.on(

  "admin-reply",

  (data)=>{

    if(

      data.message
        .startsWith(
          "[IMAGE]"
        )

    ){

      addMessage(

        data.message,

        "admin"

      );

    }

    else{

      addMessage(

        `Support: ${data.message}`,

        "admin"

      );

    }

  }

);

document
  .getElementById(
    "imageUpload"
  )
  .addEventListener(

    "change",

    async (e)=>{

      try{

        const file =

          e.target
            .files[0];

        if(!file){

          return;

        }

        const formData =

          new FormData();

        formData.append(

          "image",

          file

        );

        const res =

          await fetch(

            "/upload-image",

            {

              method:
                "POST",

              body:
                formData

            }

          );

        const data =

          await res.json();

if(

  data.success

){

  socket.emit(

    "user-message",

    {

      userId:
        gamerTag,

      message:

        `[IMAGE]${data.url}`

    }

  );

  addMessage(

    "You sent an image",

    "user"

  );

}

        else{

          alert(
            "Upload failed"
          );

        }

      }

      catch(err){

        console.error(
          err
        );

        alert(
          "Image upload failed"
        );

      }

    }

  );
// =========================
// Enter Key
// =========================
input.addEventListener(

  "input",

  ()=>{

    socket.emit(

      "user-typing",

      gamerTag

    );

    clearTimeout(

      userTypingTimer

    );

    userTypingTimer =

      setTimeout(

        ()=>{

          socket.emit(

            "user-stop-typing",

            gamerTag

          );

        },

        1200

      );

  }

);
input.addEventListener(
  "keypress",
  (e)=>{

    if(
      e.key==="Enter"
    ){

      sendMessage();

    }

  }
);
document
  .getElementById(
    "imageModal"
  )
  .onclick = ()=>{

    document
      .getElementById(
        "imageModal"
      )
      .style.display =
        "none";

  };
</script>

</body>
</html>
