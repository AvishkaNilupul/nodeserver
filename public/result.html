<!DOCTYPE html>
<html lang="en">

<head>
<script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Support</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script src="/socket.io/socket.io.js"></script>

  <style>

  :root{--bg:#f6f7fb;--surface:#ffffff;--surface-2:#f8fafc;--line:#e7eaf0;--ink:#0f172a;--muted:#6b7280;}
  html[data-theme="dark"]{--bg:#0e1014;--surface:#161a22;--surface-2:#1e232e;--line:#2a3140;--ink:#e8ebf2;--muted:#9aa3b4;color-scheme:dark;}
  .themebtn{cursor:pointer;}
  .theme-fab{position:fixed;top:16px;right:16px;z-index:80;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px rgba(15,23,42,.12);transition:background .15s;}
  .theme-fab:hover{background:var(--surface-2);}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #4f46e5;
    }

    body {
      font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--ink);
      background:
        radial-gradient(1000px 500px at 100% -10%, #eef2ff 0%, transparent 60%),
        radial-gradient(900px 500px at -10% 110%, #faf5ff 0%, transparent 55%),
        var(--bg);
    }

    .chat-container {
      width: 100%;
      max-width: 880px;
      height: 86vh;
      background: var(--surface);
      border: 1px solid #ebeef3;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(31, 41, 55, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.32);
      position: relative;
      flex-shrink: 0;
    }

    .avatar .on {
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #22c55e;
      border: 2.5px solid #fff;
    }

    .chat-header h1 {
      font-size: 16px;
      font-weight: 700;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 1.6s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(1.18); }
      100% { opacity: 1; transform: scale(1); }
    }

    .header-badge {
      margin-left: auto;
      font-size: 11.5px;
      color: #4f46e5;
      background: #eef2ff;
      border: 1px solid #e0e4ff;
      padding: 6px 11px;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--surface-2);
    }

    .message {
      max-width: 74%;
      padding: 13px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 14.5px;
      word-break: break-word;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border-top-right-radius: 6px;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.28);
    }

    .admin {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--ink);
      border-top-left-radius: 6px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
    }

    .message img {
      display: block;
    }

    #typingIndicator {
      display: none;
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 14px 16px;
      border-radius: 18px;
      border-top-left-radius: 6px;
      margin: 0 24px 4px;
    }

    #typingIndicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c2c9d6;
      display: inline-block;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }

    #typingIndicator span:nth-child(2) { animation-delay: 0.15s; }
    #typingIndicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes blink {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }

    .chat-bottom {
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--line);
      background: var(--surface);
    }

    input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 999px;
      outline: none;
      background: var(--surface-2);
      border: 1.5px solid var(--line);
      color: var(--ink);
      font-size: 14.5px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    input::placeholder {
      color: #aeb4c2;
    }

    input:focus {
      background: var(--surface);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    .upload-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .upload-btn:hover {
      background: var(--line);
    }

    button {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
      flex-shrink: 0;
      transition: transform 0.12s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(79, 70, 229, 0.5);
    }

    #imageModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    #modalImage {
      max-width: 92%;
      max-height: 92%;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 768px) {
      body { padding: 0; }
      .chat-container {
        height: 100vh;
        border-radius: 0;
        border: none;
      }
      .message { max-width: 88%; }
      .chat-bottom { padding: 12px; gap: 10px; }
    }
  </style>
</head>

<body>
<button class="theme-fab" data-theme-toggle onclick="toggleTheme()" title="Toggle dark mode" aria-pressed="false"><svg class="t-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg><svg class="t-sun" style="display:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg></button>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5z"></path></svg>
        <span class="on"></span>
      </div>
      <div>
        <h1>RedeemHub Support</h1>
        <div class="status-row">
          <span class="status-dot"></span>
          <p id="subtitle"></p>
        </div>
      </div>
      <span class="header-badge">Live chat</span>
    </div>

    <div id="messages"></div>

    <div id="typingIndicator">
      <span></span><span></span><span></span>
    </div>

    <div class="chat-bottom">
      <input type="file" id="imageUpload" accept="image/*" style="display: none" />
      <label for="imageUpload" class="upload-btn" title="Send an image">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="m21 15-5-5L5 21"></path></svg>
      </label>

      <input id="messageInput" placeholder="Type your message..." autocomplete="off" />

      <button onclick="sendMessage()" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
      </button>
    </div>
  </div>

  <div id="imageModal">
    <img id="modalImage" />
  </div>

  <script>
    // =========================
    // Gamer Tag
    // =========================
    const gamerTag = localStorage.getItem("gamerTag");
    const chatToken = localStorage.getItem("chatToken");

    if (!gamerTag) {
      window.location.href = "/index.html";
    }

    document.getElementById("subtitle").innerText =
      `Online · connected as ${gamerTag}`;

    // =========================
    // Socket
    // =========================
    const socket = io();

    socket.on("connect", () => {
      console.log("CONNECTED:", socket.id);
      socket.emit("join-user", { userId: gamerTag, token: chatToken });
    });

    socket.onAny((event, ...args) => {
      console.log("SOCKET EVENT:", event, args);
    });

    // =========================
    // Elements
    // =========================
    const messages = document.getElementById("messages");
    const typingIndicator = document.getElementById("typingIndicator");
    const input = document.getElementById("messageInput");
    let userTypingTimer;

    // =========================
    // Add Message
    // =========================
    function addMessage(text, className) {
      const div = document.createElement("div");
      div.classList.add("message", className);
      div.style.whiteSpace = "pre-wrap";
      div.style.wordBreak = "break-word";

      if (text.startsWith("[IMAGE]")) {
        const img = document.createElement("img");
        img.src = text.replace("[IMAGE]", "");
        img.style.maxWidth = "260px";
        img.style.borderRadius = "14px";
        img.style.cursor = "pointer";
        img.onclick = () => {
          document.getElementById("modalImage").src = img.src;
          document.getElementById("imageModal").style.display = "flex";
        };
        div.appendChild(img);
      } else {
        div.textContent = text;
      }

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    socket.on("support-typing", () => {
      typingIndicator.style.display = "block";
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on("support-stop-typing", () => {
      typingIndicator.style.display = "none";
    });

    socket.on("chat-history", (history) => {
      messages.innerHTML = "";
      history.forEach((msg) => {
        addMessage(msg.message, msg.sender === "admin" ? "admin" : "user");
      });
      socket.emit("message-seen", gamerTag);
    });

    function sendMessage() {
      const message = input.value.trim();
      if (!message) {
        return;
      }
      socket.emit("user-message", { userId: gamerTag, message });
      addMessage(`You: ${message}`, "user");
      input.value = "";
    }

    // =========================
    // Reply
    // =========================
    socket.on("admin-reply", (data) => {
      if (data.message.startsWith("[IMAGE]")) {
        addMessage(data.message, "admin");
      } else {
        addMessage(`Support: ${data.message}`, "admin");
      }
      socket.emit("message-seen", gamerTag);
    });

    // =========================
    // Image Upload
    // =========================
    document.getElementById("imageUpload").addEventListener("change", async (e) => {
      try {
        const file = e.target.files[0];
        if (!file) {
          return;
        }

        const formData = new FormData();
        formData.append("image", file);

        const res = await fetch("/upload-image", {
          method: "POST",
          body: formData,
        });

        const data = await res.json();

        if (data.success) {
          socket.emit("user-message", {
            userId: gamerTag,
            message: `[IMAGE]${data.url}`,
          });
          addMessage("You sent an image", "user");
        } else {
          alert("Upload failed");
        }
      } catch (err) {
        console.error(err);
        alert("Image upload failed");
      }
    });

    // =========================
    // Typing + Enter key
    // =========================
    input.addEventListener("input", () => {
      socket.emit("user-typing", gamerTag);
      clearTimeout(userTypingTimer);
      userTypingTimer = setTimeout(() => {
        socket.emit("user-stop-typing", gamerTag);
      }, 1200);
    });

    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    document.getElementById("imageModal").onclick = () => {
      document.getElementById("imageModal").style.display = "none";
    };
  </script>
<script src="/theme.js"></script>
</body>
</html>
