<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Live Support Admin</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>
    .chat-header-row{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:24px;

  border-bottom:
    1px solid rgba(255,255,255,0.06);

}

.clear-btn{

  background:
    rgba(239,68,68,0.15);

  border:
    1px solid rgba(239,68,68,0.35);

  color:#f87171;

  padding:10px 14px;

  border-radius:10px;

  cursor:pointer;
}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family:
        'Segoe UI',
        Tahoma,
        sans-serif;

      background:
        radial-gradient(
          circle at top,
          #0b1220,
          #020617
        );

      color: #e2e8f0;

      height: 100vh;

      display: flex;

      overflow: hidden;
    }

    /* =========================
       Sidebar
    ========================= */

    .sidebar {
      width: 300px;

      background:
        rgba(15,23,42,0.95);

      border-right:
        1px solid rgba(255,255,255,0.06);

      display: flex;

      flex-direction: column;
    }

    .sidebar-header {

      padding: 24px;

      border-bottom:
        1px solid rgba(255,255,255,0.06);

      display: flex;

      justify-content: space-between;

      align-items: center;
    }

    .sidebar-header h2 {
      font-size: 22px;
    }

    .logout-btn {

      background:
        rgba(239,68,68,0.15);

      border:
        1px solid rgba(239,68,68,0.25);

      color: #f87171;

      padding: 8px 12px;

      border-radius: 10px;

      cursor: pointer;

      font-size: 13px;
    }

    .users {

      flex: 1;

      overflow-y: auto;

      padding: 16px;
    }

    .user {

      padding: 14px 16px;

      border-radius: 14px;

      background:
        rgba(30,41,59,0.72);

      margin-bottom: 12px;

      cursor: pointer;

      transition: 0.2s ease;

      border:
        1px solid transparent;

      word-break: break-word;
    }

    .user:hover {

      border-color:
        rgba(239,68,68,0.4);

      transform: translateY(-1px);
    }

    .user.active {

      border-color:
        rgba(239,68,68,0.6);

      background:
        rgba(239,68,68,0.08);
    }

    /* =========================
       Unread State
    ========================= */

    .user.unread {

      border-color:
        rgba(239,68,68,0.7);

      box-shadow:
        0 0 16px rgba(239,68,68,0.22);

      animation:
        pulseGlow 1.4s infinite;
    }

    @keyframes pulseGlow {

      0% {

        box-shadow:
          0 0 10px rgba(239,68,68,0.15);

      }

      50% {

        box-shadow:
          0 0 22px rgba(239,68,68,0.35);

      }

      100% {

        box-shadow:
          0 0 10px rgba(239,68,68,0.15);

      }

    }

    .user-content {

      display: flex;

      justify-content: space-between;

      align-items: center;

      gap: 10px;
    }

    .unread-badge {

      background: #ef4444;

      color: white;

      min-width: 24px;

      height: 24px;

      border-radius: 999px;

      display: flex;

      justify-content: center;

      align-items: center;

      font-size: 12px;

      font-weight: 700;

      padding: 0 8px;
    }

    /* =========================
       Chat Area
    ========================= */

    .chat {

      flex: 1;

      display: flex;

      flex-direction: column;
    }

    .chat-header {

      padding: 24px;

      border-bottom:
        1px solid rgba(255,255,255,0.06);

      font-size: 20px;

      font-weight: 700;

      background:
        rgba(15,23,42,0.7);

      backdrop-filter: blur(10px);
    }

    #messages {

      flex: 1;

      overflow-y: auto;

      padding: 24px;

      display: flex;

      flex-direction: column;

      gap: 12px;
    }

    .message {

      max-width: 75%;

      padding: 14px 16px;

      border-radius: 16px;

      line-height: 1.6;

      word-break: break-word;
    }

    .msg-user {

      align-self: flex-start;

      background:
        rgba(30,41,59,0.85);

      color: #93c5fd;
    }

    .msg-admin {

      align-self: flex-end;

      background:
        linear-gradient(
          135deg,
          #ef4444,
          #dc2626
        );

      color: white;
    }

    /* =========================
       Bottom
    ========================= */

    .bottom {

      padding: 18px;

      display: flex;

      gap: 12px;

      border-top:
        1px solid rgba(255,255,255,0.06);

      background:
        rgba(15,23,42,0.9);
    }

    input {

      flex: 1;

      padding: 14px;

      border: none;

      outline: none;

      border-radius: 12px;

      background: #1e293b;

      color: white;

      font-size: 14px;
    }

    button {

      padding: 14px 18px;

      border: none;

      border-radius: 12px;

      background:
        linear-gradient(
          135deg,
          #ef4444,
          #dc2626
        );

      color: white;

      cursor: pointer;

      font-weight: 600;

      transition: 0.2s ease;
    }

    button:hover {

      transform: translateY(-1px);

      box-shadow:
        0 0 14px rgba(239,68,68,0.35);
    }

    @media (max-width: 768px) {

      body {

        flex-direction: column;
      }

      .sidebar {

        width: 100%;

        height: 240px;

        border-right: none;

        border-bottom:
          1px solid rgba(255,255,255,0.06);
      }

    }

#imageModal{

  display:none;

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:
    rgba(0,0,0,0.85);

  justify-content:center;

  align-items:center;

  z-index:99999;

}

#modalImage{

  max-width:90%;

  max-height:90%;

  border-radius:16px;

  cursor:pointer;

}
#adminTypingIndicator{

  display:none;

  color:#94a3b8;

  padding:12px 20px;

  font-size:14px;

}
.seen-status{

  font-size:12px;

  color:#94a3b8;

  margin-top:6px;

  text-align:right;

}
#guideModal{

  display:none;

  position:fixed;

  inset:0;

  background:
    rgba(0,0,0,0.45);

  backdrop-filter:
    blur(10px);

  justify-content:center;

  align-items:center;

  z-index:99999;

}

#guideBox{

  width:500px;

  max-width:90%;

  background:
    rgba(15,23,42,0.96);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:22px;

  padding:34px;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.45);

}

#guideBox h2{

  margin-bottom:28px;

}

#guideBox input{

  width:100%;

  margin-bottom:16px;

}
#guideBox select{

  width:100%;

  padding:14px;

  margin-bottom:16px;

  border:none;

  outline:none;

  border-radius:14px;

  background:#1e293b;

  color:white;

  font-size:14px;

}
.guideButtons{

  display:flex;

  justify-content:flex-end;

  gap:12px;

  margin-top:8px;

}

.cancelBtn{

  background:
    rgba(239,68,68,0.18);

}
  </style>

</head>

<body>

<script>

  const notificationSound =
  new Audio(
    "https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3"
  );


</script>

<!-- Sidebar -->

<div class="sidebar">

  <div class="sidebar-header">

    <h2>Live Support</h2>

    <button
      class="logout-btn"
      onclick="logout()"
    >
      Logout
    </button>

  </div>

  <div
    class="users"
    id="users"
  ></div>

</div>


<!-- Chat -->

<div class="chat">

  <div class="chat-header-row">

    <div
      class="chat-header"
      id="chatHeader"
    >

      Select a customer

    </div>

    <button
      class="clear-btn"
      onclick="clearChat()"
    >
      Clear Chat
    </button>
    <button
  class="clear-btn"
  onclick="sendGuide()"
  style="margin-left:10px;"
>
  Quick Guide
</button>

  </div>

  <div id="messages"></div>

<div
  id="adminTypingIndicator"
>

Customer is typing...

</div>

<div class="bottom">

    <input
      id="messageInput"
      placeholder="Type reply..."
      autocomplete="off"
    >

<input
  type="file"
  id="adminImageUpload"
  accept="image/*"
  style="display:none"
>

<button

  type="button"

  onclick="

    document
      .getElementById(
        'adminImageUpload'
      )
      .click()

  "

>

📷

</button>

    <button onclick="sendReply()">
      Send
    </button>

</div>

</div>
<div id="imageModal">

  <img id="modalImage">

</div>
<div id="guideModal">

  <div id="guideBox">

    <h2>Twitch Quick Guide</h2>
    <select
  id="guideCategory"
  onchange="toggleManualFields()"
>

</select>
    <input
      id="guideUser"
      oninput="clearCategory()"
      placeholder="Twitch Username"
    >

    <input
      id="guidePass"
      oninput="clearCategory()"
      placeholder="Twitch Password"
      type="password"
    >

    <div class="guideButtons">

      <button
        class="cancelBtn"
        onclick="closeGuideModal()"
      >
        Cancel
      </button>

      <button
        onclick="submitGuide()"
      >
        Send
      </button>

    </div>

  </div>

</div>
<script>

const socket = io();

const usersDiv =
  document.getElementById(
    "users"
  );

const messagesDiv =
  document.getElementById(
    "messages"
  );
const adminTypingIndicator =

  document.getElementById(
    "adminTypingIndicator"
  );
const chatHeader =
  document.getElementById(
    "chatHeader"
  );

const input =
  document.getElementById(
    "messageInput"
  );
let typingTimer;
let selectedUser = null;
let lastAdminBubble =
  null;

// =========================
// Logout
// =========================

async function logout(){

  await fetch(

    "/admin-logout",

    {

      method:"POST"

    }

  );

  window.location.href =
    "/admin-login.html";

}

// =========================
// Load Users
// =========================
function loadGuideCategories(){

  const saved =

    JSON.parse(

      localStorage.getItem(
        "itemCategories"
      )

      ||

      '["Twitch","Rust","Steam"]'

    );

  const select =

    document
      .getElementById(
        "guideCategory"
      );

  select.innerHTML =

`
<option value="">

Manual Entry

</option>
`;

  saved.forEach(

    cat=>{

      select.innerHTML +=

`
<option>

${cat}

</option>
`;

    }

  );

}

function clearCategory(){

  document
    .getElementById(
      "guideCategory"
    )
    .value = "";

}
function toggleManualFields(){

  const selected =

    document
      .getElementById(
        "guideCategory"
      )
      .value;

  const user =

    document
      .getElementById(
        "guideUser"
      );

  const pass =

    document
      .getElementById(
        "guidePass"
      );

  if(selected){

    user.style.display =
      "none";

    pass.style.display =
      "none";

  }

  else{

    user.style.display =
      "block";

    pass.style.display =
      "block";

  }

}
async function loadUsers() {

  const usersRes =
    await fetch("/users");

  const users =
    await usersRes.json();

  const messagesRes =
    await fetch("/messages");

  const messages =
    await messagesRes.json();

  usersDiv.innerHTML = "";

  users.reverse();

  users.forEach((userId) => {

    const div =
      document.createElement("div");

    div.className = "user";

    if (
      userId === selectedUser
    ) {

      div.classList.add(
        "active"
      );

    }

    // =========================
    // Unread Count
    // =========================

    const unreadCount =

      messages.filter(

        (msg) =>

          msg.userId === userId

          &&

          msg.sender === "user"

          &&

          !msg.readByAdmin

      ).length;

    if (unreadCount > 0) {

      div.classList.add(
        "unread"
      );

    }

    // =========================
    // Layout
    // =========================

    const wrapper =
      document.createElement("div");

    wrapper.className =
      "user-content";

    const text =
      document.createElement("span");

    text.innerText =
      userId;

    wrapper.appendChild(text);

    // Badge

    if (unreadCount > 0) {

      const badge =
        document.createElement("div");

      badge.className =
        "unread-badge";

      badge.innerText =
        unreadCount;

      wrapper.appendChild(
        badge
      );

    }

    div.appendChild(wrapper);

    // =========================
    // Click
    // =========================

    div.onclick = async () => {

      document
        .querySelectorAll(".user")
        .forEach((u) => {

          u.classList.remove(
            "active"
          );

        });

      div.classList.add(
        "active"
      );

      selectedUser =
        userId;

      chatHeader.innerText =
        `Chat with ${userId}`;

      // Mark Read

      await fetch(
        "/mark-read",
        {

          method: "POST",

          headers: {

            "Content-Type":
              "application/json"

          },

          body: JSON.stringify({
            userId
          })

        }
      );

      loadMessages(userId);

      loadUsers();

    };

    usersDiv.appendChild(div);

  });
 
}


loadUsers();

// =========================
// Load Messages
// =========================

async function loadMessages(
  userId
) {

  const res =
    await fetch("/messages");

  const messages =
    await res.json();

  messagesDiv.innerHTML = "";

  const filtered =
    messages.filter(
      (msg) =>
        msg.userId ===
        userId
    );

  filtered.forEach((msg) => {

    const div =
      document.createElement("div");

    div.classList.add(
      "message"
    );

    div.classList.add(

      msg.sender === "admin"

        ? "msg-admin"

        : "msg-user"

    );

if(

  msg.message
    .startsWith(
      "[IMAGE]"
    )

){

  const img =

    document
      .createElement(
        "img"
      );

  img.src =

    msg.message
      .replace(
        "[IMAGE]",
        ""
      );

  img.style.maxWidth =
    "260px";

  img.style.borderRadius =
    "12px";
  img.style.cursor =
  "pointer";

img.onclick = ()=>{

  document
    .getElementById(
      "modalImage"
    )
    .src =
      img.src;

  document
    .getElementById(
      "imageModal"
    )
    .style.display =
      "flex";

};

  div.appendChild(
    img
  );

}

else{

  div.innerText =
    msg.message;

}

    messagesDiv.appendChild(div);
    if(

  msg.sender==="admin"

  &&

  msg.seen

){

  const seen =

    document
      .createElement(
        "div"
      );

  seen.className =
    "seen-status";

  seen.innerText =
    "Seen";

  div.appendChild(
    seen
  );

}
if(

  msg.sender ===
  "admin"

){

  lastAdminBubble =
    div;

}

  });

  messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

}

// =========================
// Live Updates
// =========================

socket.on(

  "message-seen",

  (userId)=>{

    console.log(

      "SEEN EVENT RECEIVED",

      {

        userId,

        selectedUser,

        lastAdminBubble

      }

    );

    if(

      userId !==
      selectedUser

    ){

      console.log(
        "wrong user"
      );

      return;

    }

    if(

      !lastAdminBubble

    ){

      console.log(
        "no bubble"
      );

      return;

    }

    let seen =

      lastAdminBubble
        .querySelector(
          ".seen-status"
        );

    if(!seen){

      seen =

        document
          .createElement(
            "div"
          );

      seen.className =
        "seen-status";

      lastAdminBubble
        .appendChild(
          seen
        );

    }

    seen.innerText =
      "Seen";

  }

);
socket.on(

  "user-typing",

  (userId)=>{

    if(

      userId ===
      selectedUser

    ){

      adminTypingIndicator
        .style.display =

          "block";

    }

  }

);

socket.on(

  "user-stop-typing",

  (userId)=>{

    if(

      userId ===
      selectedUser

    ){

      adminTypingIndicator
        .style.display =

          "none";

    }

  }

);
socket.on(
  "new-message",
  (data) => {

    // refresh sidebar

    loadUsers();
    // play sound for new user messages

    if(

      data.sender === "user"

    ){

      notificationSound
        .play()
        .catch(()=>{});

    }

    // =========================
    // Auto open new customer
    // =========================

    if (

      !selectedUser

      &&

      data.sender === "user"

    ) {

      selectedUser =
        data.userId;

      chatHeader.innerText =
        `Chat with ${data.userId}`;

      loadMessages(
        data.userId
      );

    }

    // =========================
    // Ignore other chats
    // =========================

    if (

      data.userId !==
      selectedUser

    ) return;

    const div =
      document.createElement(
        "div"
      );

    div.classList.add(
      "message"
    );

    div.classList.add(

      data.sender === "admin"

        ? "msg-admin"

        : "msg-user"

    );

    // preserve formatting

    div.style.whiteSpace =
      "pre-wrap";

    div.style.wordBreak =
      "break-word";

if(

  data.message
    .startsWith(
      "[IMAGE]"
    )

){

  const img =

    document
      .createElement(
        "img"
      );

  img.src =

    data.message
      .replace(
        "[IMAGE]",
        ""
      );

  img.style.maxWidth =
    "260px";

  img.style.borderRadius =
    "12px";
  
  img.style.cursor =
  "pointer";

img.onclick = ()=>{

  document
    .getElementById(
      "modalImage"
    )
    .src =
      img.src;

  document
    .getElementById(
      "imageModal"
    )
    .style.display =
      "flex";

};

  div.appendChild(
    img
  );

}

else{

  div.textContent =
    data.message;

}

    messagesDiv.appendChild(
      div
    );
    if(

  data.sender ===
  "admin"

){

  lastAdminBubble =
    div;

}

    messagesDiv.scrollTop =
      messagesDiv.scrollHeight;

  }
);

// =========================
// Send Reply
// =========================
function sendGuide(){

  if(

    !selectedUser

  ){

    alert(
      "Select a customer first"
    );

    return;

  }

  document
    .getElementById(
      "guideModal"
    )
    .style.display =
      "flex";

}

function closeGuideModal(){

  document
    .getElementById(
      "guideModal"
    )
    .style.display =
      "none";

}

async function submitGuide(){

  let username =
    document
      .getElementById(
        "guideUser"
      )
      .value
      .trim();

  let password =
    document
      .getElementById(
        "guidePass"
      )
      .value
      .trim();

  const category =

    document
      .getElementById(
        "guideCategory"
      )
      .value;

  // =========================
  // Inventory Mode
  // =========================

  if(category){

    try{

      const res =

        await fetch(

          `/items/next/${category}`

        );

      const data =

        await res.json();

      if(

        !data.success

      ){

        alert(

          data.message

        );

        return;

      }

      username =
        data.item.username;

      password =
        data.item.password;

    }

    catch{

      alert(

        "Inventory fetch failed"

      );

      return;

    }

  }

  // =========================
  // Manual Mode
  // =========================

  else if(

    !username
    ||
    !password

  ){

    alert(
      "Fill fields or choose category"
    );

    return;

  }

  const message =

`📋 TWITCH DROP GUIDE

🔑 Login

User: ${username}
Pass: ${password}

1. Log in → https://www.twitch.tv/drops/inventory

Scroll down to the "Received" section.

2. Press the purple "Connect" button below your item.

3. Follow the connection instructions shown on the linked site.

4. Some games require extra steps.

Rust:
• Activate Drops
• Check for missing drops`;

  socket.emit(

    "admin-message",

    {

      userId:
        selectedUser,

      message

    }

  );

  document
    .getElementById(
      "guideUser"
    )
    .value = "";

  document
    .getElementById(
      "guidePass"
    )
    .value = "";

  document
    .getElementById(
      "guideCategory"
    )
    .value = "";

  closeGuideModal();

}
function sendReply() {

  if (!selectedUser) {

    alert(
      "Select a customer first"
    );

    return;

  }

  const message =
    input.value.trim();

  if (!message) return;

  socket.emit(
    "admin-message",
    {

      userId:
        selectedUser,

      message

    }
  );

  input.value = "";
  socket.emit(

  "admin-stop-typing",

  selectedUser

);

}

// =========================
// Enter Key
// =========================
document
  .getElementById(
    "adminImageUpload"
  )
  .addEventListener(

    "change",

    async (e)=>{

      if(

        !selectedUser

      ){

        alert(
          "Select a customer first"
        );

        return;

      }

      try{

        const file =

          e.target
            .files[0];

        if(!file){

          return;

        }

        const formData =

          new FormData();

        formData.append(

          "image",

          file

        );

        const res =

          await fetch(

            "/upload-image",

            {

              method:
                "POST",

              body:
                formData

            }

          );

        const data =

          await res.json();

        if(

          data.success

        ){

          socket.emit(

            "admin-message",

            {

              userId:
                selectedUser,

              message:

                `[IMAGE]${data.url}`

            }

          );

        }

        else{

          alert(
            "Upload failed"
          );

        }

      }

      catch(err){

        console.error(
          err
        );

        alert(
          "Image upload failed"
        );

      }

    }

  );

input.addEventListener(

  "input",

  ()=>{

    if(

      !selectedUser

    ){

      return;

    }

    socket.emit(

      "admin-typing",

      selectedUser

    );

    clearTimeout(
      typingTimer
    );

    typingTimer =

      setTimeout(

        ()=>{

          socket.emit(

            "admin-stop-typing",

            selectedUser

          );

        },

        1200

      );

  }

);

input.addEventListener(

  "keypress",

  (e)=>{

    if(

      e.key==="Enter"

    ){

      sendReply();

    }

  }

);

async function clearChat(){

  if(!selectedUser){

    alert(
      "Select a chat first"
    );

    return;

  }

  if(

    !confirm(

      `Delete chat with ${selectedUser}?`

    )

  ) return;

  await fetch(

    "/clear-chat",

    {

      method:"POST",

      headers:{

        "Content-Type":
          "application/json"

      },

      body:JSON.stringify({

        userId:
          selectedUser

      })

    }

  );

  messagesDiv.innerHTML="";

  selectedUser=null;

  chatHeader.innerText=
    "Select a customer";

  loadUsers();

}
document
  .getElementById(
    "imageModal"
  )
  .onclick = ()=>{

    document
      .getElementById(
        "imageModal"
      )
      .style.display =
        "none";

  };
document
  .getElementById(
    "guideModal"
  )

  .addEventListener(

    "click",

    (e)=>{

      if(

        e.target.id
        ===
        "guideModal"

      ){

        closeGuideModal();

      }

    }

  );
loadGuideCategories();
</script>
