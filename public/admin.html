  <style>

  :root{--bg:#f6f7fb;--surface:#ffffff;--surface-2:#f8fafc;--line:#e7eaf0;--ink:#0f172a;--muted:#6b7280;}
  html[data-theme="dark"]{--bg:#0e1014;--surface:#161a22;--surface-2:#1e232e;--line:#2a3140;--ink:#e8ebf2;--muted:#9aa3b4;color-scheme:dark;}
  html[data-theme="dark"] .nav .links a.active{background:rgba(99,102,241,0.20);}
  html[data-theme="dark"] .nav .me .logout:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.4);}
  .themebtn{cursor:pointer;}
  .theme-fab{position:fixed;top:16px;right:16px;z-index:80;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px rgba(15,23,42,.12);transition:background .15s;}
  .theme-fab:hover{background:var(--surface-2);}

* { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #4f46e5; --accent2: #6366f1; --ink: #0f172a; --muted: #6b7280;  }
    body { font-family: "Inter", "Segoe UI", Tahoma, sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; overflow: hidden; }

    /* NAV */
    .nav { width: 236px; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; flex-shrink: 0; }
    .nav .brand { display: flex; align-items: center; gap: 10px; padding: 18px 20px; border-bottom: 1px solid var(--line); }
    .nav .brand .mark { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: grid; place-items: center; box-shadow: 0 6px 14px rgba(79,70,229,0.32); }
    .nav .brand b { font-size: 15px; font-weight: 700; line-height: 1.15; }
    .nav .brand b span { display: block; font-size: 10.5px; color: var(--muted); font-weight: 500; }
    .nav .links { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .nav .links a { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 10px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; }
    .nav .links a:hover { background: var(--surface-2); }
    .nav .links a.active { background: #eef2ff; color: var(--accent); font-weight: 600; }
    .nav .me { border-top: 1px solid var(--line); padding: 14px; display: flex; align-items: center; gap: 10px; }
    .nav .me .av { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#34d399,#10b981); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .nav .me .who { line-height: 1.2; min-width: 0; }
    .nav .me .who b { font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
    .nav .me .who span { display: block; font-size: 11px; color: var(--muted); }
    .nav .me .logout { margin-left: auto; width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); display: grid; place-items: center; cursor: pointer; }
    .nav .me .logout:hover { color: #ef4444; border-color: #fecaca; background: #fef2f2; }

    /* SIDEBAR (conversations) */
    .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 16px 18px; border-bottom: 1px solid var(--line); }
    .sidebar-header h2 { font-size: 16px; font-weight: 700; }
    .users { flex: 1; overflow-y: auto; padding: 8px; }
    .user { display: flex; align-items: center; padding: 11px 12px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; margin-bottom: 2px; }
    .user:hover { background: var(--surface-2); }
    .user.active { background: #eef2ff; border-color: #e0e4ff; }
    .user-content { display: flex; align-items: center; gap: 11px; width: 100%; min-width: 0; }
    .u-av { width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(135deg,#a5b4fc,#6366f1); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .u-mid { flex: 1; min-width: 0; }
    .u-mid b { font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .u-prev { font-size: 12.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .user.unread .u-prev { color: var(--muted); font-weight: 500; }
    .unread-badge { background: var(--accent); color: #fff; min-width: 20px; height: 20px; border-radius: 999px; display: grid; place-items: center; font-size: 11px; font-weight: 700; padding: 0 6px; flex-shrink: 0; }

    /* CHAT */
    .chat { flex: 1; display: flex; flex-direction: column; background: var(--surface-2); min-width: 0; }
    .chat-header-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 22px; border-bottom: 1px solid var(--line); background: var(--surface); gap: 12px; }
    .chat-header { font-size: 15px; font-weight: 700; }
    .chat-actions { display: flex; gap: 8px; }
    .ghost-btn { display: inline-flex; align-items: center; gap: 7px; background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); padding: 9px 13px; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; }
    .ghost-btn:hover { background: var(--line); }
    .ghost-btn.danger:hover { color: #dc2626; border-color: #fecaca; background: #fef2f2; }
    #messages { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 72%; padding: 12px 15px; border-radius: 16px; line-height: 1.5; font-size: 14px; word-break: break-word; }
    .msg-user { align-self: flex-start; background: var(--surface); border: 1px solid var(--line); color: var(--ink); border-top-left-radius: 5px; box-shadow: 0 1px 2px rgba(16,24,40,0.04); }
    .msg-admin { align-self: flex-end; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; border-top-right-radius: 5px; box-shadow: 0 8px 18px rgba(79,70,229,0.25); }
    .message img { display: block; }
    .seen-status { font-size: 10.5px; color: var(--muted); text-align: right; margin-top: 4px; }
    .msg-admin .seen-status { color: rgba(255,255,255,0.8); }
    #adminTypingIndicator { display: none; align-self: flex-start; background: var(--surface); border: 1px solid var(--line); padding: 13px 15px; border-radius: 16px; border-top-left-radius: 5px; margin: 0 22px 6px; }
    #adminTypingIndicator span { width: 7px; height: 7px; border-radius: 50%; background: #c2c9d6; display: inline-block; margin: 0 2px; animation: blink 1.2s infinite; }
    #adminTypingIndicator span:nth-child(2) { animation-delay: 0.15s; }
    #adminTypingIndicator span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes blink { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }
    .quick-replies { display: flex; gap: 7px; padding: 0 22px 12px; flex-wrap: wrap; }
    .quick-replies span { font-size: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; color: var(--muted); cursor: pointer; }
    .quick-replies span:hover { border-color: var(--accent); color: var(--accent); }
    .bottom { display: flex; align-items: center; gap: 11px; padding: 15px; background: var(--surface); border-top: 1px solid var(--line); }
    .composer-ic { width: 42px; height: 42px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); display: grid; place-items: center; cursor: pointer; flex-shrink: 0; }
    .composer-ic:hover { background: var(--line); }
    #messageInput { flex: 1; padding: 13px 17px; border-radius: 999px; border: 1.5px solid var(--line); background: var(--surface-2); outline: none; font-family: inherit; font-size: 14px; color: var(--ink); }
    #messageInput:focus { background: var(--surface); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(79,70,229,0.12); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; display: grid; place-items: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 8px 18px rgba(79,70,229,0.4); }

    /* image modal */
    #imageModal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.82); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 99999; }
    #modalImage { max-width: 92%; max-height: 92%; border-radius: 18px; cursor: pointer; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }

    /* guide modal */
    #guideModal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.45); backdrop-filter: blur(3px); justify-content: center; align-items: center; z-index: 99999; }
    #guideBox { width: 460px; max-width: 92vw; background: var(--surface); border-radius: 20px; padding: 26px; box-shadow: 0 30px 70px rgba(15,23,42,0.3); }
    #guideBox h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }
    #guideBox select, #guideBox input { width: 100%; padding: 12px 14px; border-radius: 11px; border: 1.5px solid var(--line); background: var(--surface-2); outline: none; font-family: inherit; font-size: 14px; margin-bottom: 13px; color: var(--ink); }
    #guideBox select:focus, #guideBox input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 4px rgba(79,70,229,0.12); }
    .guideButtons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
    .guideButtons button { padding: 11px 18px; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13.5px; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
    .guideButtons .cancelBtn { background: var(--surface-2); color: var(--muted); }
  </style>

</head>

<script>

const socket = io();

const usersDiv =
  document.getElementById(
    "users"
  );

const messagesDiv =
  document.getElementById(
    "messages"
  );
const adminTypingIndicator =

  document.getElementById(
    "adminTypingIndicator"
  );
const chatHeader =
  document.getElementById(
    "chatHeader"
  );

const input =
  document.getElementById(
    "messageInput"
  );
let typingTimer;
let selectedUser = null;
let lastAdminBubble =
  null;

// =========================
// Logout
// =========================

async function logout(){

  await fetch(

    "/admin-logout",

    {

      method:"POST"

    }

  );

  window.location.href =
    "/admin-login.html";

}

// =========================
// Load Users
// =========================
function loadGuideCategories(){

  const saved =

    JSON.parse(

      localStorage.getItem(
        "itemCategories"
      )

      ||

      '["Twitch","Rust","Steam"]'

    );

  const select =

    document
      .getElementById(
        "guideCategory"
      );

  select.innerHTML =

`
<option value="">

Manual Entry

</option>
`;

  saved.forEach(

    cat=>{

      select.innerHTML +=

`
<option>

${cat}

</option>
`;

    }

  );

}

function clearCategory(){

  document
    .getElementById(
      "guideCategory"
    )
    .value = "";

}
function toggleManualFields(){

  const selected =

    document
      .getElementById(
        "guideCategory"
      )
      .value;

  const user =

    document
      .getElementById(
        "guideUser"
      );

  const pass =

    document
      .getElementById(
        "guidePass"
      );

  if(selected){

    user.style.display =
      "none";

    pass.style.display =
      "none";

  }

  else{

    user.style.display =
      "block";

    pass.style.display =
      "block";

  }

}
async function loadUsers() {

  const usersRes =
    await fetch("/users");

  const users =
    await usersRes.json();

  const messagesRes =
    await fetch("/messages");

  const messages =
    await messagesRes.json();

  usersDiv.innerHTML = "";

  users.reverse();

  users.forEach((userId) => {

    const div =
      document.createElement("div");

    div.className = "user";

    if (
      userId === selectedUser
    ) {

      div.classList.add(
        "active"
      );

    }

    // =========================
    // Unread Count
    // =========================

    const unreadCount =

      messages.filter(

        (msg) =>

          msg.userId === userId

          &&

          msg.sender === "user"

          &&

          !msg.readByAdmin

      ).length;

    if (unreadCount > 0) {

      div.classList.add(
        "unread"
      );

    }

    // =========================
    // Layout
    // =========================

    const wrapper =
      document.createElement("div");

    wrapper.className = "user-content";

    const userMsgs = messages.filter((m) => m.userId === userId);
    const last = userMsgs[userMsgs.length - 1];
    const lastText = last
      ? last.message.startsWith("[IMAGE]")
        ? "📷 Image"
        : (last.sender === "admin" ? "You: " : "") + last.message
      : "No messages yet";

    const avatar = document.createElement("div");
    avatar.className = "u-av";
    avatar.innerText = String(userId).slice(0, 2).toUpperCase();

    const mid = document.createElement("div");
    mid.className = "u-mid";
    const name = document.createElement("b");
    name.innerText = userId;
    const prev = document.createElement("div");
    prev.className = "u-prev";
    prev.innerText = lastText;
    mid.appendChild(name);
    mid.appendChild(prev);

    wrapper.appendChild(avatar);
    wrapper.appendChild(mid);

    // Badge

    if (unreadCount > 0) {

      const badge =
        document.createElement("div");

      badge.className =
        "unread-badge";

      badge.innerText =
        unreadCount;

      wrapper.appendChild(
        badge
      );

    }

    div.appendChild(wrapper);

    // =========================
    // Click
    // =========================

    div.onclick = async () => {

      document
        .querySelectorAll(".user")
        .forEach((u) => {

          u.classList.remove(
            "active"
          );

        });

      div.classList.add(
        "active"
      );

      selectedUser =
        userId;

      chatHeader.innerText =
        `Chat with ${userId}`;

      // Mark Read

      await fetch(
        "/mark-read",
        {

          method: "POST",

          headers: {

            "Content-Type":
              "application/json"

          },

          body: JSON.stringify({
            userId
          })

        }
      );

      loadMessages(userId);

      loadUsers();

    };

    usersDiv.appendChild(div);

  });
 
}


loadUsers();

// =========================
// Load Messages
// =========================

async function loadMessages(
  userId
) {

  const res =
    await fetch("/messages");

  const messages =
    await res.json();

  messagesDiv.innerHTML = "";

  const filtered =
    messages.filter(
      (msg) =>
        msg.userId ===
        userId
    );

  filtered.forEach((msg) => {

    const div =
      document.createElement("div");

    div.classList.add(
      "message"
    );

    div.classList.add(

      msg.sender === "admin"

        ? "msg-admin"

        : "msg-user"

    );

if(

  msg.message
    .startsWith(
      "[IMAGE]"
    )

){

  const img =

    document
      .createElement(
        "img"
      );

  img.src =

    msg.message
      .replace(

async function submitGuide(){

  let username =
    document
      .getElementById(
        "guideUser"
      )
      .value
      .trim();

  let password =
    document
      .getElementById(
        "guidePass"
      )
      .value
      .trim();

  const category =

    document
      .getElementById(
        "guideCategory"
      )
      .value;

  // =========================
  // Inventory Mode
  // =========================

  if(category){

    try{

      const res =

        await fetch(

          `/items/next/${category}`

        );

      const data =

        await res.json();

      if(

        !data.success

      ){

        alert(

          data.message

        );

        return;

      }

      username =
        data.item.username;

      password =
        data.item.password;

    }

    catch{

      alert(

        "Inventory fetch failed"

      );

      return;

    }

  }

  // =========================
  // Manual Mode
  // =========================

  else if(

    !username
    ||
    !password

  ){

    alert(
      "Fill fields or choose category"
    );

    return;

  }

  const message =

`📋 TWITCH DROP GUIDE

🔑 Login

User: ${username}
Pass: ${password}

1. Log in → https://www.twitch.tv/drops/inventory

Scroll down to the "Received" section.

2. Press the purple "Connect" button below your item.

3. Follow the connection instructions shown on the linked site.

4. Some games require extra steps.

Rust:
• Activate Drops
• Check for missing drops`;

  socket.emit(

    "admin-message",

    {

      userId:
        selectedUser,

      message

    }

  );

  document
    .getElementById(
      "guideUser"
    )
    .value = "";

  document
    .getElementById(
      "guidePass"
    )
    .value = "";

  document
    .getElementById(
      "guideCategory"
    )
    .value = "";

  closeGuideModal();

}

document
  .getElementById(
    "adminImageUpload"
  )
  .addEventListener(

    "change",

    async (e)=>{

      if(

        !selectedUser

      ){

        alert(
          "Select a customer first"
        );

        return;

      }

      try{

        const file =

          e.target
            .files[0];

        if(!file){

          return;

        }

        const formData =

          new FormData();

        formData.append(

          "image",

          file

        );

        const res =

          await fetch(

            "/upload-image",

            {

              method:
                "POST",

              body:
                formData

            }

          );

        const data =

          await res.json();

        if(

          data.success

        ){

          socket.emit(

            "admin-message",

            {

              userId:
                selectedUser,

              message:

                `[IMAGE]${data.url}`

            }

          );

        }

        else{

          alert(
            "Upload failed"
          );

        }

      }

      catch(err){

        console.error(
          err
        );

        alert(
          "Image upload failed"
        );

      }

    }

  );

input.addEventListener(

  "input",

  ()=>{

    if(

      !selectedUser

      return;

    }

    socket.emit(

      "admin-typing",

      selectedUser

    );

    clearTimeout(
      typingTimer
    );

    typingTimer =

      setTimeout(

        ()=>{

          socket.emit(

            "admin-stop-typing",

            selectedUser

          );

        },

        1200

      );

  }

);

input.addEventListener(

  (e)=>{

    if(

      e.key==="Enter"

      sendReply();

    }

  }

);

    );

    !confirm(

      `Delete chat with ${selectedUser}?`

    )

  ) return;

  await fetch(

    "/clear-chat",

    {

      method:"POST",

      headers:{

        "Content-Type":
          "application/json"

      },

      body:JSON.stringify({

        userId:
          selectedUser

      })

    }

  );

  messagesDiv.innerHTML="";

  selectedUser=null;
