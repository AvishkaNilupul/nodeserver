<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Live Support Admin</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family:
        'Segoe UI',
        Tahoma,
        sans-serif;

      background:
        radial-gradient(
          circle at top,
          #0b1220,
          #020617
        );

      color: #e2e8f0;

      height: 100vh;

      display: flex;

      overflow: hidden;
    }

    /* =========================
       Sidebar
    ========================= */

    .sidebar {

      width: 280px;

      background:
        rgba(15,23,42,0.95);

      border-right:
        1px solid rgba(255,255,255,0.06);

      display: flex;

      flex-direction: column;
    }

    .sidebar-header {

      padding: 24px;

      border-bottom:
        1px solid rgba(255,255,255,0.06);

      font-size: 22px;

      font-weight: 700;
    }

    .users {

      flex: 1;

      overflow-y: auto;

      padding: 16px;
    }

    .user {

      padding: 14px 16px;

      border-radius: 14px;

      background:
        rgba(30,41,59,0.72);

      margin-bottom: 12px;

      cursor: pointer;

      transition: 0.2s ease;

      border:
        1px solid transparent;

      word-break: break-word;
    }

    .user:hover {

      border-color:
        rgba(239,68,68,0.4);

      transform: translateY(-1px);
    }

    .user.active {

      border-color:
        rgba(239,68,68,0.6);

      background:
        rgba(239,68,68,0.08);
    }

    /* =========================
       Chat Area
    ========================= */

    .chat {

      flex: 1;

      display: flex;

      flex-direction: column;
    }

    .chat-header {

      padding: 24px;

      border-bottom:
        1px solid rgba(255,255,255,0.06);

      font-size: 20px;

      font-weight: 700;

      background:
        rgba(15,23,42,0.7);

      backdrop-filter: blur(10px);
    }

    #messages {

      flex: 1;

      overflow-y: auto;

      padding: 24px;

      display: flex;

      flex-direction: column;

      gap: 12px;
    }

    .message {

      max-width: 75%;

      padding: 14px 16px;

      border-radius: 16px;

      line-height: 1.6;

      word-break: break-word;
    }

    .msg-user {

      align-self: flex-start;

      background:
        rgba(30,41,59,0.85);

      color: #93c5fd;
    }

    .msg-admin {

      align-self: flex-end;

      background:
        linear-gradient(
          135deg,
          #ef4444,
          #dc2626
        );

      color: white;
    }

    /* =========================
       Bottom
    ========================= */

    .bottom {

      padding: 18px;

      display: flex;

      gap: 12px;

      border-top:
        1px solid rgba(255,255,255,0.06);

      background:
        rgba(15,23,42,0.9);
    }

    input {

      flex: 1;

      padding: 14px;

      border: none;

      outline: none;

      border-radius: 12px;

      background: #1e293b;

      color: white;

      font-size: 14px;
    }

    button {

      padding: 14px 18px;

      border: none;

      border-radius: 12px;

      background:
        linear-gradient(
          135deg,
          #ef4444,
          #dc2626
        );

      color: white;

      cursor: pointer;

      font-weight: 600;

      transition: 0.2s ease;
    }

    button:hover {

      transform: translateY(-1px);

      box-shadow:
        0 0 14px rgba(239,68,68,0.35);
    }

    /* =========================
       Mobile
    ========================= */

    @media (max-width: 768px) {

      body {

        flex-direction: column;
      }

      .sidebar {

        width: 100%;

        height: 220px;

        border-right: none;

        border-bottom:
          1px solid rgba(255,255,255,0.06);
      }

    }

  </style>

</head>

<body>

<!-- =========================
     Sidebar
========================= -->

<div class="sidebar">

  <div class="sidebar-header">

    Live Support

  </div>

  <div
    class="users"
    id="users"
  ></div>

</div>

<!-- =========================
     Chat
========================= -->

<div class="chat">

  <div
    class="chat-header"
    id="chatHeader"
  >

    Select a customer

  </div>

  <div id="messages"></div>

  <div class="bottom">

    <input
      id="messageInput"
      placeholder="Type reply..."
      autocomplete="off"
    >

    <button onclick="sendReply()">
      Send
    </button>

  </div>

</div>

<script>

// =========================
// Socket.IO
// =========================

const socket = io();

// =========================
// Elements
// =========================

const usersDiv =
  document.getElementById(
    "users"
  );

const messagesDiv =
  document.getElementById(
    "messages"
  );

const chatHeader =
  document.getElementById(
    "chatHeader"
  );

const input =
  document.getElementById(
    "messageInput"
  );

// =========================
// State
// =========================

let selectedUser = null;

// =========================
// Load Users
// =========================

async function loadUsers() {

  const res =
    await fetch("/users");

  const users =
    await res.json();

  usersDiv.innerHTML = "";

  users.forEach((userId) => {

    const div =
      document.createElement("div");

    div.className = "user";

    div.innerText = userId;

    div.onclick = () => {

      document
        .querySelectorAll(".user")
        .forEach((u) => {

          u.classList.remove(
            "active"
          );

        });

      div.classList.add(
        "active"
      );

      selectedUser =
        userId;

      chatHeader.innerText =
        `Chat with ${userId}`;

      loadMessages(userId);

    };

    usersDiv.appendChild(div);

  });

}

loadUsers();

// =========================
// Load Messages
// =========================

async function loadMessages(
  userId
) {

  const res =
    await fetch("/messages");

  const messages =
    await res.json();

  messagesDiv.innerHTML = "";

  const filtered =
    messages.filter(
      (msg) =>
        msg.userId ===
        userId
    );

  filtered.forEach((msg) => {

    const div =
      document.createElement("div");

    div.classList.add(
      "message"
    );

    div.classList.add(

      msg.sender === "admin"

        ? "msg-admin"

        : "msg-user"

    );

    div.innerText =
      msg.message;

    messagesDiv.appendChild(div);

  });

  messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

}

// =========================
// Live Updates
// =========================

socket.on(
  "new-message",
  (data) => {

    loadUsers();

    if (
      data.userId !==
      selectedUser
    ) return;

    const div =
      document.createElement("div");

    div.classList.add(
      "message"
    );

    div.classList.add(

      data.sender === "admin"

        ? "msg-admin"

        : "msg-user"

    );

    div.innerText =
      data.message;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
      messagesDiv.scrollHeight;

  }
);

// =========================
// Send Reply
// =========================

function sendReply() {

  if (!selectedUser) {

    alert(
      "Select a customer first"
    );

    return;

  }

  const message =
    input.value.trim();

  if (!message) return;

  socket.emit(
    "admin-message",
    {

      userId:
        selectedUser,

      message

    }
  );

  input.value = "";

}

// =========================
// Enter Key
// =========================

input.addEventListener(
  "keypress",
  (e) => {

    if (e.key === "Enter") {

      sendReply();

    }

  }
);

</script>

</body>
</html>
