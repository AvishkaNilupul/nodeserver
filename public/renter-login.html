<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Renter sign in</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --line: #e7eaf0;
        --ink: #0f172a;
        --muted: #6b7280;
        --accent: #4f46e5;
        --red: #dc2626;
      }
      html[data-theme="dark"] {
        --bg: #0e1014;
        --surface: #161a22;
        --surface-2: #1e232e;
        --line: #2a3140;
        --ink: #e8ebf2;
        --muted: #9aa3b4;
        --red: #f87171;
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(1000px 500px at 100% -10%, rgba(99, 102, 241, 0.1) 0%, transparent 60%),
          radial-gradient(900px 500px at -10% 110%, rgba(168, 85, 247, 0.08) 0%, transparent 55%),
          var(--bg);
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 30px 26px;
        box-shadow: 0 24px 60px rgba(31, 41, 55, 0.1);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
      }
      .mark {
        width: 38px;
        height: 38px;
        border-radius: 11px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        display: grid;
        place-items: center;
        color: #fff;
      }
      h1 {
        font-size: 19px;
        font-weight: 800;
      }
      .sub {
        color: var(--muted);
        font-size: 13px;
        margin-top: 2px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        margin: 14px 0 5px;
      }
      input {
        width: 100%;
        padding: 11px 13px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-2);
        color: var(--ink);
        font-size: 14px;
        font-family: inherit;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: 0;
        border-radius: 11px;
        background: var(--accent);
        color: #fff;
        font-size: 14.5px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover {
        filter: brightness(1.06);
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .msg {
        margin-top: 14px;
        font-size: 13px;
        padding: 10px 12px;
        border-radius: 9px;
        display: none;
      }
      .msg.err {
        display: block;
        color: var(--red);
        border: 1px solid var(--red);
        background: rgba(220, 38, 38, 0.06);
      }
      .foot {
        margin-top: 18px;
        font-size: 11.5px;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <form class="card" id="form">
      <div class="brand">
        <span class="mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
          </svg>
        </span>
        <div>
          <h1>Renter sign in</h1>
          <div class="sub">Access your bot slot</div>
        </div>
      </div>
      <label for="u">Username</label>
      <input id="u" autocomplete="username" autocapitalize="none" spellcheck="false" />
      <label for="p">Password</label>
      <input id="p" type="password" autocomplete="current-password" />
      <button id="btn" type="submit">Sign in</button>
      <div class="msg" id="msg"></div>
      <div class="foot">Contact the operator if you can't get in.</div>
    </form>

    <script>
      const $ = (id) => document.getElementById(id);
      function showErr(t) {
        const m = $("msg");
        m.textContent = t;
        m.className = "msg err";
      }
      if (/[?&]blocked=1/.test(location.search)) {
        showErr("Your access has ended. Contact the operator.");
      }
      $("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = $("u").value.trim();
        const password = $("p").value;
        if (!username || !password) return showErr("Enter your username and password.");
        $("btn").disabled = true;
        $("btn").textContent = "Signing in…";
        try {
          const res = await fetch("/renter-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (res.ok && data.success) {
            location.href = "/renter.html";
            return;
          }
          showErr(data.message || "Sign in failed.");
        } catch (err) {
          showErr("Network error. Try again.");
        }
        $("btn").disabled = false;
        $("btn").textContent = "Sign in";
      });
    </script>
    <script src="/theme.js"></script>
  </body>
</html>
