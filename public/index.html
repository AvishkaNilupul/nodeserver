<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Enter Gamer Tag</title>

<style>

/* Reset */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:
    'Segoe UI',
    Tahoma,
    sans-serif;

  background:
    radial-gradient(
      circle at top,
      #0b1220,
      #020617
    );

  color:#e2e8f0;

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:24px;

}

.redeem-wrapper{

  width:100%;

  display:flex;

  justify-content:center;

  align-items:center;

}

.redeem-card{

  width:100%;

  max-width:420px;

  background:
    rgba(15,23,42,0.78);

  backdrop-filter:blur(14px);

  border:
    1px solid
    rgba(255,255,255,0.06);

  border-radius:22px;

  padding:36px;

  box-shadow:
    0 0 35px rgba(239,68,68,0.12),
    inset 0 1px 0 rgba(255,255,255,0.03);

}

.redeem-header{

  margin-bottom:28px;

}

.redeem-header h1{

  font-size:34px;

  font-weight:700;

  margin-bottom:12px;

  color:#f8fafc;

}

.redeem-header p{

  color:#94a3b8;

  line-height:1.7;

  font-size:15px;

}

.redeem-form{

  display:flex;

  flex-direction:column;

  gap:16px;

}

input{

  width:100%;

  padding:16px;

  border:none;

  outline:none;

  border-radius:14px;

  background:#020617;

  color:white;

  font-size:15px;

  border:
    1px solid
    rgba(255,255,255,0.06);

}

input:focus{

  border-color:
    rgba(239,68,68,0.55);

  box-shadow:
    0 0 16px rgba(239,68,68,0.18);

}

button{

  width:100%;

  padding:16px;

  border:none;

  border-radius:14px;

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );

  color:white;

  font-size:15px;

  font-weight:600;

  cursor:pointer;

}

button:disabled{

  opacity:0.7;

  cursor:not-allowed;

}

#message{

  min-height:20px;

  text-align:center;

  font-size:14px;

}

.error{

  color:#f87171;

}

.success{

  color:#4ade80;

}

</style>

</head>

<body>

<div class="redeem-wrapper">

  <div class="redeem-card">

    <div class="redeem-header">

      <h1>Enter Gamer Tag</h1>

      <p>
        Enter your gamer tag
        to continue.
      </p>

    </div>

    <div class="redeem-form">

      <input
        id="gamerTag"
        placeholder="Enter your gamer tag"
        autocomplete="off"
      >

      <button
        onclick="submitTag()"
        id="btn"
      >
        Continue
      </button>

      <p id="message"></p>

    </div>

  </div>

</div>

<script>

  // auto login

const existingTag =

  localStorage.getItem(
    "gamerTag"
  );

if(existingTag){

  window.location.href =
    "/result.html";

}

async function submitTag(){

  const gamerTag =
    document
      .getElementById(
        "gamerTag"
      )
      .value
      .trim();

  const message =
    document
      .getElementById(
        "message"
      );

  const btn =
    document
      .getElementById(
        "btn"
      );

  message.innerText = "";
  message.className = "";

  if(!gamerTag){

    message.innerText =
      "Please enter your gamer tag";

    message.classList.add(
      "error"
    );

    return;

  }

  btn.disabled = true;

  btn.innerText =
    "Checking...";

  try{

    const response =
      await fetch(

        "/submit-gamertag",

        {

          method:"POST",

          headers:{

            "Content-Type":
              "application/json"

          },

          body:JSON.stringify({

            gamerTag

          })

        }

      );

    const data =
      await response.json();

    if(!data.success){

      throw new Error(
        "Submit failed"
      );

    }

    localStorage.setItem(

      "gamerTag",

      gamerTag

    );

    message.innerText =
      "Success";

    message.classList.add(
      "success"
    );

    setTimeout(()=>{

      window.location.href =
        "/result.html";

    },500);

  }

  catch(err){

    console.error(err);

    message.innerText =
      "Something went wrong";

    message.classList.add(
      "error"
    );

  }

  finally{

    btn.disabled = false;

    btn.innerText =
      "Continue";

  }

}

</script>

</body>
</html>
