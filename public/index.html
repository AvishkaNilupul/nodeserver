<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Redeem Code</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="redeem-wrapper">

  <div class="redeem-card">

    <!-- =========================
         Header
    ========================= -->

    <div class="redeem-header">

      <h1>Redeem Code</h1>


    </div>

    <!-- =========================
         Input
    ========================= -->

    <div class="redeem-form">

      <input
        id="code"
        placeholder="Enter your redeem code"
        autocomplete="off"
      >

      <button
        onclick="submitCode()"
        id="btn"
      >
        Redeem
      </button>

      <p id="message"></p>

    </div>

  </div>

</div>

<style>

/* =========================
   Reset
========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* =========================
   Body
========================= */

body {

  font-family:
    'Segoe UI',
    Tahoma,
    sans-serif;

  background:
    radial-gradient(
      circle at top,
      #0b1220,
      #020617
    );

  color: #e2e8f0;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 24px;
}

/* =========================
   Wrapper
========================= */

.redeem-wrapper {

  width: 100%;

  display: flex;

  justify-content: center;
  align-items: center;
}

/* =========================
   Card
========================= */

.redeem-card {

  width: 100%;

  max-width: 420px;

  background:
    rgba(15,23,42,0.78);

  backdrop-filter: blur(14px);

  border:
    1px solid
    rgba(255,255,255,0.06);

  border-radius: 22px;

  padding: 36px;

  box-shadow:
    0 0 35px rgba(239,68,68,0.12),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

/* =========================
   Header
========================= */

.redeem-header {

  margin-bottom: 28px;
}

.redeem-header h1 {

  font-size: 34px;

  font-weight: 700;

  margin-bottom: 12px;

  color: #f8fafc;
}

.redeem-header p {

  color: #94a3b8;

  line-height: 1.7;

  font-size: 15px;
}

/* =========================
   Form
========================= */

.redeem-form {

  display: flex;

  flex-direction: column;

  gap: 16px;
}

/* =========================
   Input
========================= */

input {

  width: 100%;

  padding: 16px;

  border: none;

  outline: none;

  border-radius: 14px;

  background: #020617;

  color: white;

  font-size: 15px;

  border:
    1px solid
    rgba(255,255,255,0.06);

  transition: 0.2s ease;
}

input:focus {

  border-color:
    rgba(239,68,68,0.55);

  box-shadow:
    0 0 16px rgba(239,68,68,0.18);
}

/* =========================
   Button
========================= */

button {

  width: 100%;

  padding: 16px;

  border: none;

  border-radius: 14px;

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );

  color: white;

  font-size: 15px;

  font-weight: 600;

  cursor: pointer;

  transition: 0.2s ease;
}

button:hover {

  transform: translateY(-1px);

  box-shadow:
    0 0 16px rgba(239,68,68,0.35);
}

button:disabled {

  opacity: 0.7;

  cursor: not-allowed;
}

/* =========================
   Message
========================= */

#message {

  min-height: 20px;

  text-align: center;

  font-size: 14px;
}

.error {

  color: #f87171;
}

.success {

  color: #4ade80;
}

/* =========================
   Mobile
========================= */

@media (max-width: 480px) {

  .redeem-card {

    padding: 28px 22px;
  }

  .redeem-header h1 {

    font-size: 28px;
  }

}

</style>

<script>

// =========================
// Submit Code
// =========================

async function submitCode() {

  const code =

    document
      .getElementById("code")
      .value
      .trim()
      .toUpperCase();

  const message =

    document
      .getElementById("message");

  const btn =

    document
      .getElementById("btn");

  // =========================
  // Reset UI
  // =========================

  message.innerText = "";

  message.className = "";

  // =========================
  // Validate Input
  // =========================

  if (!code) {

    message.innerText =
      "Please enter a redeem code";

    message.classList.add(
      "error"
    );

    return;

  }

  // =========================
  // Persistent Device Token
  // =========================

  let deviceToken =

    localStorage.getItem(
      "deviceToken"
    );

  if (!deviceToken) {

    deviceToken =
      crypto.randomUUID();

    localStorage.setItem(

      "deviceToken",

      deviceToken

    );

  }

  // =========================
  // Loading State
  // =========================

  btn.disabled = true;

  btn.innerText =
    "Checking...";

  try {

    const res = await fetch(
      "/validate",
      {

        method: "POST",

        headers: {

          "Content-Type":
            "application/json"

        },

        body: JSON.stringify({

          code,

          deviceToken

        })

      }
    );

    const data =
      await res.json();

    // =========================
    // Success
    // =========================

    if (data.success) {

    localStorage.setItem(

      "accountData",

      JSON.stringify({

        account:
          data.account,

        password:
          data.password,

        redeemCode:
          code

      })

    );

      window.location.href =
        "/result.html";

    } else {

      message.innerText =
        data.message;

      message.classList.add(
        "error"
      );

    }

  } catch (err) {

    console.error(err);

    message.innerText =
      "Something went wrong";

    message.classList.add(
      "error"
    );

  }

  // =========================
  // Reset Button
  // =========================

  btn.disabled = false;

  btn.innerText =
    "Redeem";

}

</script>

</body>
</html>
