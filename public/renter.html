<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Your bot slot</title>
    <style>
      :root {
        --bg: #f6f7fb; --surface: #fff; --surface-2: #f8fafc; --line: #e7eaf0;
        --ink: #0f172a; --muted: #6b7280; --accent: #4f46e5; --green: #059669;
        --red: #dc2626; --yellow: #b45309;
      }
      html[data-theme="dark"] {
        --bg: #0e1014; --surface: #161a22; --surface-2: #1e232e; --line: #2a3140;
        --ink: #e8ebf2; --muted: #9aa3b4; --green: #34d399; --red: #f87171;
        --yellow: #fbbf24; color-scheme: dark;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", "Segoe UI", Tahoma, sans-serif; color: var(--ink);
        min-height: 100vh; padding: 24px 16px 70px;
        background:
          radial-gradient(1000px 500px at 100% -10%, rgba(99,102,241,.1) 0%, transparent 60%),
          var(--bg);
      }
      .wrap { max-width: 900px; margin: 0 auto; }
      .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
      h1 { font-size: 22px; font-weight: 800; }
      .who { color: var(--muted); font-size: 13px; margin-top: 2px; }
      .hbtns { display: flex; gap: 8px; }
      .card { background: var(--surface); border: 1px solid var(--line); border-radius: 15px; padding: 16px 18px; }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
      .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; }
      .stat .k { font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
      .stat .v { font-size: 20px; font-weight: 800; margin-top: 6px; }
      .stat .v small { font-size: 13px; font-weight: 600; color: var(--muted); }
      .bar { height: 8px; border-radius: 5px; background: var(--line); overflow: hidden; margin-top: 9px; }
      .bar i { display: block; height: 100%; background: var(--accent); }
      .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--line); }
      .pill.on { color: var(--green); border-color: var(--green); }
      .pill.off { color: var(--red); border-color: var(--red); }
      .pill.unk { color: var(--muted); }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      .tabs { display: flex; gap: 6px; margin: 20px 0 14px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
      .tab { padding: 9px 14px; border: 0; background: transparent; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 9px 9px 0 0; font-family: inherit; }
      .tab.active { background: var(--surface); color: var(--accent); border: 1px solid var(--line); border-bottom-color: var(--surface); }
      .panel { display: none; }
      .panel.active { display: block; }
      table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
      th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
      th { font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
      .badge { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line); }
      .badge.ok { color: var(--green); border-color: var(--green); }
      .badge.bad { color: var(--red); border-color: var(--red); }
      .badge.wait { color: var(--muted); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .dgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
      .drop { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 9px 11px; }
      .drop img, .drop .ph { width: 34px; height: 34px; border-radius: 8px; object-fit: cover; background: var(--surface-2); border: 1px solid var(--line); display: grid; place-items: center; font-size: 10px; color: var(--muted); flex-shrink: 0; }
      .drop .nm { flex: 1; min-width: 0; }
      .drop .nm b { font-size: 13px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .drop .nm span { font-size: 11px; color: var(--muted); }
      .drop .ct { font-weight: 800; color: var(--accent); }
      textarea { width: 100%; min-height: 130px; padding: 12px; border: 1px solid var(--line); border-radius: 11px; background: var(--surface-2); color: var(--ink); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; resize: vertical; }
      textarea:focus { outline: none; border-color: var(--accent); }
      .btn { border: 0; border-radius: 10px; padding: 10px 16px; font-size: 13.5px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; font-family: inherit; }
      .btn:hover { filter: brightness(1.06); }
      .btn:disabled { opacity: .6; cursor: default; }
      .btn.ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
      .hint { font-size: 12.5px; color: var(--muted); margin: 8px 0; }
      .sub-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
      .muted { color: var(--muted); }
      .empty { color: var(--muted); padding: 16px 2px; font-size: 13.5px; }
      .theme-fab, .icobtn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface); color: var(--ink); display: inline-grid; place-items: center; cursor: pointer; }
      .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 100; }
      .toast.show { opacity: .95; }
      .overlay { position: fixed; inset: 0; background: rgba(15,23,42,.5); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 60; }
      .overlay.show { display: flex; }
      .modal { background: var(--surface); border: 1px solid var(--line); border-radius: 15px; padding: 20px; width: 100%; max-width: 380px; }
      .modal h3 { font-size: 16px; margin-bottom: 12px; }
      .modal input { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface-2); color: var(--ink); font-size: 14px; margin-top: 8px; font-family: inherit; }
      @media (max-width: 640px) { .stats { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div>
          <h1>Your bot slot</h1>
          <div class="who" id="who">…</div>
        </div>
        <div class="hbtns">
          <button class="theme-fab" data-theme-toggle onclick="toggleTheme()" title="Theme">
            <svg class="t-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg class="t-sun" style="display:none" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
          </button>
          <button class="btn ghost" id="logout">Log out</button>
        </div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="tabs">
        <button class="tab active" data-tab="accounts">Accounts</button>
        <button class="tab" data-tab="drops">Farmed drops</button>
        <button class="tab" data-tab="games">Games</button>
        <button class="tab" data-tab="submit">Add accounts</button>
      </div>

      <div class="panel active" id="panel-accounts"><div class="card"><div id="accounts"></div></div></div>
      <div class="panel" id="panel-drops"><div class="card"><div id="drops"></div></div></div>
      <div class="panel" id="panel-games">
        <div class="card">
          <div class="hint">Games your bot farms drops for. Leave empty to farm every available campaign.</div>
          <input id="gamesInput" placeholder="e.g. Escape from Tarkov, Rust, VALORANT" style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);color:var(--ink);font-size:14px;font-family:inherit" />
          <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
            <button class="btn" id="gamesBtn">Save games</button>
            <span class="hint" style="margin:0">Comma-separated. Your bot restarts to apply changes.</span>
          </div>
        </div>
      </div>
      <div class="panel" id="panel-submit">
        <div class="card">
          <div class="hint" id="quotaHint"></div>
          <textarea id="acctInput" placeholder="Paste accounts — one per line:&#10;username:password&#10;username:password:email (email optional)"></textarea>
          <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
            <button class="btn" id="submitBtn">Submit for approval</button>
            <span class="hint" style="margin:0">Accounts go live once the operator approves them.</span>
          </div>
        </div>
        <div class="card" style="margin-top:14px">
          <h3 style="font-size:14px;margin-bottom:6px">Your submissions</h3>
          <div id="subs"></div>
        </div>
      </div>
    </div>

    <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
    <div class="toast" id="toast"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
      function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
      async function api(path, opts){
        const res = await fetch(path, { credentials:"same-origin", headers:{"Content-Type":"application/json"}, ...opts });
        if (res.status === 401 || res.status === 403) { location.href = "/renter-login.html" + (res.status===403?"?blocked=1":""); throw new Error("auth"); }
        let d={}; try{ d=await res.json(); }catch(e){}
        if (!res.ok || d.success===false) throw new Error(d.message || "Request failed");
        return d;
      }

      const ACC_LABEL = { active:"Active", pending:"Awaiting activation", issue:"Needs fixing" };
      function accBadge(s){ const cls = s==="active"?"ok":s==="issue"?"bad":"wait"; return '<span class="badge '+cls+'">'+(ACC_LABEL[s]||s)+"</span>"; }

      function fmtDate(d){ return d ? new Date(d).toLocaleDateString() : "—"; }
      function remaining(end){
        if (!end) return "no expiry";
        const ms = new Date(end).getTime() - Date.now();
        if (ms <= 0) return "expired";
        const days = Math.floor(ms/864e5);
        if (days >= 1) return days + " day" + (days>1?"s":"") + " left";
        const hrs = Math.max(1, Math.floor(ms/36e5));
        return hrs + " hour" + (hrs>1?"s":"") + " left";
      }

      let ME = null;
      async function loadMe(){
        const d = await api("/renter/me");
        ME = d.me;
        $("who").textContent = "@" + ME.username + (ME.status==="suspended" ? " · suspended" : "");
        const q = ME.quota, bot = ME.bot, lease = ME.lease;
        const botPill = !bot.assigned ? '<span class="pill unk">Not assigned</span>'
          : bot.running === true ? '<span class="pill on"><span class="dot" style="background:var(--green)"></span>Running</span>'
          : bot.running === false ? '<span class="pill off"><span class="dot" style="background:var(--red)"></span>Stopped</span>'
          : '<span class="pill unk">Unknown</span>';
        const botBtn = !bot.assigned ? ""
          : bot.running === true ? '<button class="btn ghost" onclick="botToggle(this)" data-act="stop" style="margin-top:11px;padding:7px 13px;font-size:12.5px">Stop bot</button>'
          : bot.running === false ? '<button class="btn" onclick="botToggle(this)" data-act="start" style="margin-top:11px;padding:7px 13px;font-size:12.5px">Start bot</button>'
          : '';
        const pct = q.max > 0 ? Math.min(100, Math.round((q.used/q.max)*100)) : 0;
        $("stats").innerHTML =
          '<div class="stat"><div class="k">Bot</div><div class="v" style="font-size:15px;margin-top:9px">'+botPill+'</div>'+botBtn+'</div>' +
          '<div class="stat"><div class="k">Accounts</div><div class="v">'+q.used+' <small>/ '+q.max+'</small>'+(q.pending?' <small style="color:var(--yellow)">('+q.pending+' pending)</small>':'')+'</div><div class="bar"><i style="width:'+pct+'%"></i></div></div>' +
          '<div class="stat"><div class="k">Access</div><div class="v" style="font-size:16px">'+esc(remaining(lease.end))+'</div><div class="hint" style="margin:6px 0 0">until '+fmtDate(lease.end)+'</div></div>';
        const rem = q.remaining;
        $("quotaHint").textContent = rem > 0 ? "You can submit up to " + rem + " more account(s)." : "You've reached your account limit.";
        $("submitBtn").disabled = rem <= 0 || !bot.assigned;
        if (document.activeElement !== $("gamesInput")) $("gamesInput").value = (ME.games || []).join(", ");
        $("gamesBtn").disabled = !bot.assigned;
      }

      let ACCOUNTS = [];
      function acctLogin(id){ const a = ACCOUNTS.find(x=>x.id===id); return (a && a.login) || ""; }
      async function loadAccounts(){
        const d = await api("/renter/accounts");
        const a = d.accounts || [];
        ACCOUNTS = a;
        if (!a.length){ $("accounts").innerHTML = '<div class="empty">No accounts yet. Submit some under “Add accounts”.</div>'; return; }
        $("accounts").innerHTML = '<table><thead><tr><th>Login</th><th>Status</th><th>Drops</th><th></th></tr></thead><tbody>' +
          a.map(x=>'<tr><td class="mono">'+esc(x.login||"—")+'</td><td>'+accBadge(x.status)+'</td><td>'+(x.dropCount||0)+'</td>'+
              '<td style="text-align:right;white-space:nowrap">'+
                '<button class="btn ghost" style="padding:6px 11px;font-size:12.5px" onclick="liveDrops(\''+x.id+'\')">▶ Live</button> '+
                '<button class="btn ghost" style="padding:6px 11px;font-size:12.5px" onclick="editGames(\''+x.id+'\')">Games</button>'+
              '</td></tr>').join("") +
          '</tbody></table>';
      }

      // ---- modal helpers ----
      function openModal(html, wide){ const m=$("modal"); m.style.maxWidth = wide?"520px":"380px"; m.style.maxHeight="82vh"; m.style.overflowY="auto"; m.innerHTML = html; $("overlay").classList.add("show"); }
      function closeModal(){ $("overlay").classList.remove("show"); }
      $("overlay").addEventListener("click",(e)=>{ if(e.target===$("overlay")) closeModal(); });
      document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closeModal(); });

      // ---- live "farming now" for one account ----
      function progressRow(p){
        const pctW = Math.max(0, Math.min(100, p.percent||0));
        const barColor = p.claimed ? "var(--green)" : "var(--accent)";
        const img = p.imageURL ? '<img src="'+esc(p.imageURL)+'" alt="" referrerpolicy="no-referrer" style="width:34px;height:34px;border-radius:8px;object-fit:cover;flex-shrink:0"/>' : '<span class="ph" style="width:34px;height:34px;border-radius:8px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--line);font-size:10px;color:var(--muted);flex-shrink:0">'+esc((p.name||"?").slice(0,2))+'</span>';
        const status = p.claimed ? '<span class="badge ok">Claimed</span>' : (pctW+"% · "+(p.current||0)+"/"+(p.required||0)+" min");
        return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">'+img+
          '<div style="flex:1;min-width:0"><b style="font-size:13px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</b>'+
          '<span style="font-size:11px;color:var(--muted)">'+esc(p.game||p.campaign||"")+'</span>'+
          '<div class="bar" style="margin-top:6px"><i style="width:'+pctW+'%;background:'+barColor+'"></i></div></div>'+
          '<div style="font-size:11.5px;color:var(--muted);white-space:nowrap;text-align:right">'+status+'</div></div>';
      }
      window.liveDrops = async (id)=>{
        const login = acctLogin(id) || "—";
        openModal('<h3>Farming now · <span class="mono">'+esc(login)+'</span></h3><div class="empty" id="liveBody">Checking Twitch…</div>'+
          '<div style="display:flex;gap:8px;margin-top:14px"><button class="btn ghost" onclick="liveDrops(\''+id+'\')">Refresh</button><button class="btn ghost" onclick="closeModal()">Close</button></div>', true);
        try {
          const d = await api("/renter/accounts/"+id+"/live");
          const list = d.inProgress || [];
          $("liveBody").outerHTML = list.length
            ? '<div id="liveBody">'+list.map(progressRow).join("")+'</div>'
            : '<div class="empty" id="liveBody">Not farming anything right now. If the bot just started, give it a few minutes.</div>';
        } catch(e){ if(e.message!=="auth"){ const b=$("liveBody"); if(b) b.textContent = e.message; } }
      };

      // ---- per-account games editor ----
      window.editGames = async (id)=>{
        const login = acctLogin(id) || "—";
        openModal('<h3>Games · <span class="mono">'+esc(login)+'</span></h3><div class="hint">Only this account will farm these games. Comma-separated; leave empty to follow the bot default.</div>'+
          '<input id="agInput" placeholder="loading…" disabled />'+
          '<div style="display:flex;gap:8px;margin-top:14px"><button class="btn" id="agSave" disabled onclick="saveAccountGames(\''+id+'\')">Save</button><button class="btn ghost" onclick="closeModal()">Cancel</button></div>');
        try {
          const d = await api("/renter/accounts/"+id+"/games");
          const inp=$("agInput"); inp.value=(d.games||[]).join(", "); inp.placeholder="e.g. Rust, VALORANT"; inp.disabled=false; $("agSave").disabled=false; inp.focus();
        } catch(e){ if(e.message!=="auth"){ const inp=$("agInput"); if(inp) inp.placeholder=e.message; } }
      };
      window.saveAccountGames = async (id)=>{
        const btn=$("agSave"); const games=$("agInput").value;
        btn.disabled=true; btn.textContent="Saving…";
        try {
          const d = await api("/renter/accounts/"+id+"/games", { method:"POST", body: JSON.stringify({ games }) });
          toast(d.message || "Saved"); closeModal(); await loadAccounts();
        } catch(e){ if(e.message!=="auth") toast(e.message); btn.disabled=false; btn.textContent="Save"; }
      };

      async function loadDrops(){
        const d = await api("/renter/drops");
        const drops = d.drops || [];
        if (!drops.length){ $("drops").innerHTML = '<div class="empty">No drops farmed yet.</div>'; return; }
        $("drops").innerHTML = '<div class="hint">'+d.total+' total across your accounts</div><div class="dgrid">' +
          drops.map(x=>{ const img = x.image ? '<img src="'+esc(x.image)+'" alt="" referrerpolicy="no-referrer"/>' : '<span class="ph">'+esc((x.name||"?").slice(0,2))+'</span>';
            return '<div class="drop">'+img+'<div class="nm"><b>'+esc(x.name)+'</b><span>'+esc(x.game||"")+'</span></div><span class="ct">×'+x.count+'</span></div>'; }).join("") +
          '</div>';
      }

      const SUB_LABEL = { pending:"Pending", approved:"Approved", rejected:"Rejected" };
      const SUB_CLS = { pending:"wait", approved:"ok", rejected:"bad" };
      async function loadSubs(){
        const d = await api("/renter/submissions");
        const s = d.submissions || [];
        if (!s.length){ $("subs").innerHTML = '<div class="empty">No submissions yet.</div>'; return; }
        $("subs").innerHTML = s.map(x=>'<div class="sub-item"><div>'+x.count+' account(s) · <span class="muted">'+new Date(x.createdAt).toLocaleString()+'</span>'+
          (x.status==="approved"&&x.added!=null?' · <span class="muted">'+x.added+' added</span>':'')+
          (x.status==="rejected"&&x.rejectReason?' · <span class="muted">'+esc(x.rejectReason)+'</span>':'')+
          '</div><span class="badge '+(SUB_CLS[x.status]||"wait")+'">'+(SUB_LABEL[x.status]||x.status)+'</span></div>').join("");
      }

      // Start / stop their own bot.
      window.botToggle = async (btn)=>{
        const act = btn.dataset.act;
        btn.disabled = true; btn.textContent = act==="start" ? "Starting…" : "Stopping…";
        try {
          await api("/renter/bot/"+act, { method:"POST" });
          toast(act==="start" ? "Bot starting" : "Bot stopped");
          await loadMe();
        } catch(e){
          if (e.message!=="auth") toast(e.message);
          btn.disabled = false; btn.textContent = act==="start" ? "Start bot" : "Stop bot";
        }
      };

      // Save which games the bot farms.
      $("gamesBtn").addEventListener("click", async ()=>{
        const games = $("gamesInput").value;
        $("gamesBtn").disabled = true; $("gamesBtn").textContent = "Saving…";
        try {
          const d = await api("/renter/games", { method:"POST", body: JSON.stringify({ games }) });
          toast(d.message || "Games saved");
          await loadMe();
        } catch(e){ if(e.message!=="auth") toast(e.message); }
        $("gamesBtn").disabled = false; $("gamesBtn").textContent = "Save games";
      });

      // Tabs
      document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
        document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
        t.classList.add("active");
        $("panel-"+t.dataset.tab).classList.add("active");
      }));

      $("submitBtn").addEventListener("click", async ()=>{
        const text = $("acctInput").value.trim();
        if (!text) return toast("Paste some accounts first");
        $("submitBtn").disabled = true;
        try {
          const d = await api("/renter/submit", { method:"POST", body: JSON.stringify({ accounts: text }) });
          toast(d.message || "Submitted");
          $("acctInput").value = "";
          await Promise.all([loadMe(), loadSubs()]);
        } catch(e){ if(e.message!=="auth") toast(e.message); }
        $("submitBtn").disabled = false;
      });

      $("logout").addEventListener("click", async ()=>{
        try { await fetch("/renter-logout", { method:"POST", credentials:"same-origin" }); } catch(e){}
        location.href = "/renter-login.html";
      });

      (async function init(){
        try { await loadMe(); await Promise.all([loadAccounts(), loadDrops(), loadSubs()]); }
