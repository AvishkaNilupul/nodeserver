            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>' + escapeHtml(cfg.title) + "</span><span>" + (idx + 1) + " / " + cfg.items.length + " · ✅ " + score + "</span></div>" +
              '<div class="flashcard" style="min-height:150px;cursor:default"><div class="front ' + (item.promptClass || "") + '">' + escapeHtml(item.prompt) + "</div>" +
              (item.sub ? '<div class="tap">' + escapeHtml(item.sub) + "</div>" : "") + "</div>" +
              '<div class="opts">' + item.choices.map((ch) => '<button class="opt" data-v="' + escapeAttr(ch) + '">' + escapeHtml(ch) + "</button>").join("") + "</div></div>";
            if (item.speak) speak(item.speak);
            v.querySelectorAll(".opt").forEach((b) =>
              b.addEventListener("click", () => {
                if (answered) return;
                answered = true;
                const correct = b.dataset.v === item.answer;
                if (correct) score++;
                v.querySelectorAll(".opt").forEach((x) => {
                  if (x.dataset.v === item.answer) x.classList.add("correct");
                  else if (x === b) x.classList.add("wrong");
                  x.style.pointerEvents = "none";
                });
                setTimeout(() => {
                  answered = false;
                  idx++;
                  render();
                }, correct ? 550 : 1100);
              }),
            );
          }
          render();
        }

        // ===============================================================
        // Speaking practice (Web Speech API — recognition + synthesis)
        // ===============================================================
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const sttOk = !!SR;

        function listenOnce(h) {
          if (!sttOk) return null;
          let rec;
          try {
            rec = new SR();
          } catch (e) {
            return null;
          }
          rec.lang = "ja-JP";
          rec.interimResults = false;
          rec.maxAlternatives = 4;
          rec.continuous = false;
          rec.onresult = (e) => {
            const res = e.results[0];
            const alts = [];
            for (let i = 0; i < res.length; i++) alts.push(res[i].transcript);
            h.result && h.result(alts);
          };
          rec.onerror = (e) => h.error && h.error(e.error || "error");
          rec.onend = () => h.end && h.end();
          try {
            rec.start();
          } catch (e) {
            return null;
          }
          return rec;
        }

        // Normalize (katakana->hiragana, strip spaces/punctuation) then compare
        // with a Sørensen–Dice bigram similarity so partial matches still score.
        function normJa(s) {
          return String(s || "")
            .replace(/[\s、。，．,.！!？?・「」『』（）()ー~〜]/g, "")
            .replace(/[ァ-ヶ]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0x60));
        }
        function bigrams(s) {
          const b = {};
          if (s.length < 2) {
            if (s) b[s] = 1;
            return b;
          }
          for (let i = 0; i < s.length - 1; i++) {
            const g = s.slice(i, i + 2);
            b[g] = (b[g] || 0) + 1;
          }
          return b;
        }
        function dice(a, b) {
          if (!a.length || !b.length) return 0;
          if (a === b) return 1;
          const ba = bigrams(a), bb = bigrams(b);
          let inter = 0, na = 0, nb = 0;
          for (const k in ba) na += ba[k];
          for (const k in bb) {
            nb += bb[k];
            if (ba[k]) inter += Math.min(ba[k], bb[k]);
          }
          return na + nb ? (2 * inter) / (na + nb) : 0;
        }
        function scoreSpeech(alts, targets) {
          let best = 0, heard = alts[0] || "";
          const nts = targets.filter(Boolean).map(normJa);
          for (const alt of alts) {
            const na = normJa(alt);
            for (const nt of nts) {
              const s = na === nt ? 1 : dice(na, nt);
              if (s > best) {
                best = s;
                heard = alt;
              }
            }
          }
          return { score: best, heard };
        }
        function verdict(score) {
          if (score >= 0.72) return { label: "Great! 🎉", cls: "ok" };
          if (score >= 0.42) return { label: "Close — say it once more", cls: "mid" };
          return { label: "Not quite — listen and retry", cls: "bad" };
        }

        let speakMode = "pronounce";
        let speakSource = "vocab";
        const SPEAK_SOURCES = [
          ["vocab", "Vocabulary"],
          ["mywords", "My Words"],
          ["sentences", "Sentences"],
          ["phrases", "Phrases"],
        ];
        function sourceLabel() {
          const f = SPEAK_SOURCES.find((s) => s[0] === speakSource);
          return f ? f[1] : "";
        }
        RENDER.speak = function () {
          const v = $('[data-view="speak"]');
          v.innerHTML =
            '<div class="card"><h2>Speaking practice 🎙️</h2><div class="hint">' +
            (sttOk
              ? "Tap the mic and say the line aloud — the app listens (allow mic access) and scores how close you were, then plays the correct pronunciation."
              : "This browser can't do speech recognition, so it runs as <b>listen &amp; repeat</b>: hear the line, say it aloud, self-check. Open the site in Chrome or Safari for scoring.") +
            '</div><div class="chiprow" style="margin:14px 0 0">' +
            '<button class="chip ' + (speakMode === "pronounce" ? "active" : "") + '" onclick="setSpeakMode(\'pronounce\')">🗣️ Pronounce</button>' +
            '<button class="chip ' + (speakMode === "work" ? "active" : "") + '" onclick="setSpeakMode(\'work\')">💼 Work talk (アルバイト)</button>' +
            "</div></div><div id=\"speakBody\"></div>";
          paintSpeak();
        };
        window.setSpeakMode = function (m) {
          speakMode = m;
          RENDER.speak();
        };
        window.setSpeakSource = function (s) {
          speakSource = s;
          paintSpeak();
        };
        function paintSpeak() {
          const body = el("speakBody");
          if (!body) return;
          if (speakMode === "work") {
            body.innerHTML = DATA.scenarios
              .map(
                (sc) =>
                  '<div class="card" style="cursor:pointer" onclick="startScenario(\'' + sc.id + '\')">' +
                  '<h2>' + sc.place + " " + escapeHtml(sc.title) + '</h2><div class="hint">' +
                  escapeHtml(sc.desc) + " · " + sc.turns.length + " lines · tap to role-play</div></div>",
              )
              .join("");
            return;
          }
          body.innerHTML =
            '<div class="chiprow">' +
            SPEAK_SOURCES.map(
              ([k, l]) => '<button class="chip ' + (speakSource === k ? "active" : "") + '" onclick="setSpeakSource(\'' + k + "')\">" + l + "</button>",
            ).join("") +
            '</div><div class="card study" style="text-align:center"><div class="hint" style="margin-bottom:14px">Practise saying <b>' +
            sourceLabel() + "</b> out loud, one line at a time.</div>" +
            '<button class="btn jp" onclick="startPronounce()">▶ Start speaking drill</button></div>';
        }
        function pronounceItems() {
          if (speakSource === "vocab")
            return shuffle(DATA.vocab).slice(0, 20).map((o) => ({ jp: o.w, sub: o.k + "  ·  " + o.r, en: o.m, targets: [o.w, o.k], speak: o.k }));
          if (speakSource === "mywords")
            return shuffle(words.slice()).slice(0, 20).map((o) => ({ jp: o.w || o.k, sub: o.k || "", en: o.m, targets: [o.w, o.k], speak: o.k || o.w }));
          if (speakSource === "sentences")
            return shuffle(sentences.slice()).slice(0, 20).map((o) => ({ jp: o.j, sub: o.r || "", en: o.m, targets: [o.j], speak: o.j }));
          return shuffle(DATA.phrases).slice(0, 20).map((o) => ({ jp: o.j, sub: o.r, en: o.e, targets: [o.j], speak: o.j }));
        }
        window.startPronounce = function () {
          const items = pronounceItems();
          if (!items.length) return toast("Nothing to practise here yet — add some first");
          speakDrill(items, "Pronounce · " + sourceLabel());
        };

        function speakDrill(items, title) {
          const v = $('[data-view="speak"]');
          let idx = 0, phase = "idle", heard = "", score = 0, rec = null;
          function stop() {
            if (rec) {
              try {
                rec.stop();
              } catch (e) {}
              rec = null;
            }
          }
          function render() {
            if (idx >= items.length) {
              markStudied(items.length);
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">🎤</div><b>Drill done!</b><div style="margin-top:8px">' +
                items.length + ' lines practised.</div><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" onclick="RENDER_speak()">Back to Speak</button></div></div></div>';
              return;
            }
            const it = items[idx];
            const vd = phase === "result" ? verdict(score) : null;
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>' + escapeHtml(title) + "</span><span>" + (idx + 1) + " / " + items.length + "</span></div>" +
              '<div class="flashcard" style="cursor:default;min-height:200px"><div class="front jp ' + (it.jp.length > 6 ? "small" : "") + '">' + escapeHtml(it.jp) + "</div>" +
              (it.sub ? '<div class="tap" style="font-style:italic">' + escapeHtml(it.sub) + "</div>" : "") +
              '<div style="font-size:14px;margin-top:8px">' + escapeHtml(it.en) + "</div>" +
              (phase === "result" ? '<div class="spk-result ' + vd.cls + '">' + vd.label + (heard ? ' · you said: <b class="jp">' + escapeHtml(heard) + "</b>" : "") + "</div>" : "") +
              "</div>" +
              '<div class="spk-controls"><button class="btn" id="hearBtn">' + spk + " Hear</button>" +
              (sttOk ? '<button class="mic ' + (phase === "listening" ? "live" : "") + '" id="micBtn">' + (phase === "listening" ? "● listening…" : "🎙️ Speak") + "</button>" : "") +
              '<button class="btn" id="nextBtn">' + (idx + 1 >= items.length ? "Finish" : "Next →") + "</button></div>" +
              (!sttOk ? '<div class="hint" style="text-align:center;margin-top:10px">Hear it, say it aloud, then tap Next.</div>' : "") +
              "</div>";
            el("hearBtn").onclick = () => speak(it.speak);
            el("nextBtn").onclick = () => {
              stop();
              phase = "idle";
              heard = "";
              score = 0;
              idx++;
              render();
            };
            if (sttOk && el("micBtn")) {
              el("micBtn").onclick = () => {
                if (phase === "listening") {
                  stop();
                  phase = "idle";
                  render();
                  return;
                }
                phase = "listening";
                heard = "";
                score = 0;
                render();
                let errored = null;
                rec = listenOnce({
                  result: (alts) => {
                    const r = scoreSpeech(alts, it.targets);
                    heard = r.heard;
                    score = r.score;
                  },
                  error: (e) => (errored = e),
                  end: () => {
                    rec = null;
                    if (errored) {
                      phase = "idle";
                      toast(errored === "not-allowed" ? "Please allow mic access" : "Didn't catch that — try again");
                      render();
                      return;
                    }
                    phase = "result";
                    render();
                    speak(it.speak);
                  },
                });
                if (!rec) {
                  phase = "idle";
                  toast("Mic unavailable");
                  render();
                }
              };
            }
          }
          render();
        }

        window.startScenario = function (id) {
          const sc = DATA.scenarios.find((s) => s.id === id);
          if (sc) runScenario(sc);
        };
        function runScenario(sc) {
          const v = $('[data-view="speak"]');
          let idx = 0, phase = "idle", heard = "", score = 0, revealed = false, rec = null;
          function stop() {
            if (rec) {
              try {
                rec.stop();
              } catch (e) {}
              rec = null;
            }
          }
          function render() {
            if (idx >= sc.turns.length) {
              markStudied(sc.turns.filter((tn) => tn.who === "you").length);
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">✅</div><b>Scenario complete!</b><div style="margin-top:8px">Nice work with ' +
                escapeHtml(sc.title) + '.</div><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" onclick="startScenario(\'' + sc.id + '\')">Again</button><button class="btn" onclick="RENDER_speak()">Back</button></div></div></div>';
              return;
            }
            const turn = sc.turns[idx];
            const isYou = turn.who === "you";
            const bubbles = sc.turns
              .slice(0, idx)
              .map((tn) => '<div class="bubble ' + (tn.who === "you" ? "me" : "them") + '"><div class="jp">' + escapeHtml(tn.j) + '</div><div class="b-en">' + escapeHtml(tn.e) + "</div></div>")
              .join("");
            let cur;
            if (!isYou) {
              cur =
                '<div class="bubble them cur"><div class="jp">' + escapeHtml(turn.j) + '</div><div class="b-r">' + escapeHtml(turn.r) + '</div><div class="b-en">' + escapeHtml(turn.e) + "</div></div>" +
                '<div class="spk-controls"><button class="btn" id="hearBtn">' + spk + ' Hear</button><button class="btn primary" id="nextBtn">Next →</button></div>';
            } else {
              const vd = phase === "result" ? verdict(score) : null;
              cur =
                '<div class="bubble me cur"><div class="you-prompt">🗣️ Your line: <b>' + escapeHtml(turn.e) + "</b></div>" +
                (revealed
                  ? '<div class="jp">' + escapeHtml(turn.j) + '</div><div class="b-r">' + escapeHtml(turn.r) + "</div>"
                  : '<button class="btn sm" id="revealBtn">Show Japanese</button>') +
                (phase === "result" ? '<div class="spk-result ' + vd.cls + '">' + vd.label + (heard ? ' · you said: <b class="jp">' + escapeHtml(heard) + "</b>" : "") + "</div>" : "") +
                "</div>" +
                '<div class="spk-controls"><button class="btn" id="hearBtn">' + spk + " Hear</button>" +
                (sttOk ? '<button class="mic ' + (phase === "listening" ? "live" : "") + '" id="micBtn">' + (phase === "listening" ? "● listening…" : "🎙️ Say it") + "</button>" : "") +
                '<button class="btn primary" id="nextBtn">Next →</button></div>';
            }
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>' + sc.place + " " + escapeHtml(sc.title) + "</span><span>" + (idx + 1) + " / " + sc.turns.length + "</span></div>" +
              '<div class="scene">' + bubbles + cur + "</div></div>";
            if (!isYou) speak(turn.j);
            const hb = el("hearBtn");
            if (hb) hb.onclick = () => speak(turn.j);
            const rvb = el("revealBtn");
            if (rvb)
              rvb.onclick = () => {
                revealed = true;
                render();
                speak(turn.j);
              };
            el("nextBtn").onclick = () => {
              stop();
              phase = "idle";
              heard = "";
              score = 0;
              revealed = false;
              idx++;
              render();
            };
            if (isYou && sttOk && el("micBtn")) {
              el("micBtn").onclick = () => {
                if (phase === "listening") {
                  stop();
                  phase = "idle";
                  render();
                  return;
                }
                phase = "listening";
                heard = "";
                score = 0;
                render();
                let errored = null;
                rec = listenOnce({
                  result: (alts) => {
                    const r = scoreSpeech(alts, [turn.j]);
                    heard = r.heard;
                    score = r.score;
                  },
                  error: (e) => (errored = e),
                  end: () => {
                    rec = null;
                    if (errored) {
                      phase = "idle";
                      toast(errored === "not-allowed" ? "Please allow mic access" : "Didn't catch that — try again");
                      render();
                      return;
                    }
                    phase = "result";
                    revealed = true;
                    render();
                    speak(turn.j);
                  },
                });
                if (!rec) {
                  phase = "idle";
                  toast("Mic unavailable");
                  render();
                }
              };
            }
          }
          render();
        }
        window.RENDER_speak = RENDER.speak;

        // ===============================================================
        // Quiz hub
        // ===============================================================
        RENDER.quiz = function () {
          const v = $('[data-view="quiz"]');
          v.innerHTML =
            '<div class="card"><h2>Quick quiz</h2><div class="hint">10 questions, multiple choice. Great for a fast warm-up or cool-down.</div></div>' +
            '<div class="grid cols-3">' +
            quizTile("あ→a", "Kana reading", "kanaRead") +
            quizTile("a→あ", "Romaji → kana", "kanaWrite") +
            quizTile("日→meaning", "Kanji meaning", "kanjiMean") +
            quizTile("語→reading", "Kanji reading", "kanjiRead") +
            quizTile("word→meaning", "Vocab meaning", "vocabMean") +
            quizTile("meaning→word", "Meaning → word", "vocabWord") +
            "</div>";
        };
        function quizTile(big, label, mode) {
          return (
            '<div class="stat" style="cursor:pointer" onclick="startQuiz(\'' + mode + "')\"><div class=\"v jp\" style=\"font-size:20px\">" + big +
            '</div><div class="k" style="margin-top:8px">' + label + " →</div></div>"
          );

        window.startQuiz = function (mode) {
          let items = [];
          if (mode === "kanaRead" || mode === "kanaWrite") {
            const key = settings.script === "katakana" ? "k" : "h";
            const pool = shuffle(KANA_FLAT).slice(0, 10);

              mode === "kanaRead"
                ? { prompt: cell[key], promptClass: "jp", answer: cell.r, speak: cell[key], choices: uniqueChoices(cell.r, KANA_FLAT.map((c) => c.r), 4) }
                : { prompt: cell.r, answer: cell[key], speak: cell[key], choices: uniqueChoices(cell[key], KANA_FLAT.map((c) => c[key]), 4) },

              mode === "kanjiMean"
                ? { prompt: o.c, promptClass: "jp", sub: "What does it mean?", answer: o.m, speak: o.c, choices: uniqueChoices(o.m, all.map((k) => k.m), 4) }
                : { prompt: o.c, promptClass: "jp", sub: "Pick a reading", answer: firstReading(o), speak: o.c, choices: uniqueChoices(firstReading(o), all.map(firstReading), 4) },
            );
          } else {
            const all = byLevel(DATA.vocab);
            const pool = shuffle(all).slice(0, 10);
            items = pool.map((o) =>
              mode === "vocabMean"
                ? { prompt: o.w, promptClass: "jp", sub: o.k, answer: o.m, speak: o.k, choices: uniqueChoices(o.m, all.map((x) => x.m), 4) }
                : { prompt: o.m, sub: "Which word?", answer: o.w, speak: o.k, choices: uniqueChoices(o.w, all.map((x) => x.w), 4) },
            );

          runMcSession({ title: "Quiz", back: "quiz", items });
        };
        function firstReading(o) {
          const r = (o.kun !== "—" ? o.kun : o.on).split(",")[0].trim();
          return r.replace(/[（(].*/, "") || o.on;
        }

        // ===============================================================
        // Exam — mock JLPT test with per-section scores, history and an
        // "are you ready for N4?" readiness check.
        // ===============================================================
        const EXAM_SECTIONS = [
          ["vocab", "Vocabulary"],
          ["kanji", "Kanji"],
          ["grammar", "Grammar & particles"],
          ["reading", "Reading"],
          ["listen", "Listening"],
        ];
        // Weighted shuffle: cards you struggle with (lapsed / low box) come up
        // more often, unseen ones next, well-known ones least.
        function weightedShuffle(pool, idFn) {
          return pool
            .map((o) => {
              const c = srs[idFn(o)];
              const w = !c ? 2 : c.lapses > 0 || (c.box || 0) <= 1 ? 3 : 1;
              return { o, k: Math.pow(Math.random(), 1 / w) };
            })
            .sort((a, b) => b.k - a.k)
            .map((x) => x.o);
        }
        let examLevel = "n5";
        RENDER.exam = function () {
          const v = $('[data-view="exam"]');
          const exams = Array.isArray(stats.exams) ? stats.exams : [];
          const hist = exams.slice(0, 8).map((e) =>
            "<tr><td>" + escapeHtml(e.d) + "</td><td>" + escapeHtml(String(e.level).toUpperCase()) + "</td><td>" +
            e.score + " / " + e.total + "</td><td>" + e.pct + "%" + (e.pct >= 70 ? " ✅" : "") + "</td></tr>").join("");
          v.innerHTML =
            '<div class="card"><h2>Mock exam 📝</h2><div class="hint">Vocabulary, kanji, grammar/particles, reading and listening. 70% is a pass. Questions are drawn fresh every time — and weighted toward the cards you get wrong in review.</div>' +
            '<div class="chiprow" style="margin:14px 0 0">' +
            '<button class="chip ' + (examLevel === "n5" ? "active" : "") + '" onclick="setExamLevel(\'n5\')">N5 exam</button>' +
            '<button class="chip ' + (examLevel === "n4" ? "active" : "") + '" onclick="setExamLevel(\'n4\')">N4 exam</button></div>' +
            '<div class="btnrow" style="margin-top:14px"><button class="btn primary" onclick="startExam()">▶ Start ' + examLevel.toUpperCase() + " exam</button></div></div>" +
            readinessHtml() +
            (hist

        window.RENDER_exam = function () {

        // ===============================================================
        // Drills — conjugation + numbers / counters
        // ===============================================================
        // Conjugation engine (unit-tested): derives every N5 form from the
        // dictionary form + verb group.
        const C_IROW = { う: "い", つ: "ち", る: "り", む: "み", ぬ: "に", ぶ: "び", く: "き", ぐ: "ぎ", す: "し" };
        const C_AROW = { う: "わ", つ: "た", る: "ら", む: "ま", ぬ: "な", ぶ: "ば", く: "か", ぐ: "が", す: "さ" };
        const C_TE = { う: "って", つ: "って", る: "って", む: "んで", ぶ: "んで", ぬ: "んで", く: "いて", ぐ: "いで", す: "して" };
        const C_TA = { う: "った", つ: "った", る: "った", む: "んだ", ぶ: "んだ", ぬ: "んだ", く: "いた", ぐ: "いだ", す: "した" };
        const C_EROW = { う: "え", つ: "て", る: "れ", む: "め", ぬ: "ね", ぶ: "べ", く: "け", ぐ: "げ", す: "せ" };
        const C_OROW = { う: "お", つ: "と", る: "ろ", む: "も", ぬ: "の", ぶ: "ぼ", く: "こ", ぐ: "ご", す: "そ" };
        const N4_FORMS = [
          { key: "tai", label: "たい (want to)" },
          { key: "potential", label: "potential (can …)" },
          { key: "volitional", label: "volitional (let's …)" },
          { key: "ba", label: "ば-conditional" },
          { key: "passive", label: "passive" },
          { key: "causative", label: "causative" },
        ];
        const N4_FORM_KEYS = N4_FORMS.map((f) => f.key);
        function masuStem(w, g) {
          if (g === "irregular") {
            if (w.endsWith("する")) return w.slice(0, -2) + "し";
            if (w === "来る") return "来";
            if (w === "くる") return "き";
          }
          if (g === "ichidan") return w.slice(0, -1);
          return w.slice(0, -1) + C_IROW[w.slice(-1)];
        }
        function conjugate(w, g, form) {
          if (w === "ある") return { dict: "ある", masu: "あります", masen: "ありません", mashita: "ありました", te: "あって", ta: "あった", nai: "ない", ba: "あれば" }[form];
          if (form === "dict") return w;
          const st = w.slice(0, -1), end = w.slice(-1);
          if (N4_FORM_KEYS.indexOf(form) >= 0) {
            if (form === "tai") return masuStem(w, g) + "たい";
            if (g === "irregular") {
              if (w.endsWith("する")) {
                const b = w.slice(0, -2);
                return { potential: b + "できる", volitional: b + "しよう", ba: b + "すれば", passive: b + "される", causative: b + "させる" }[form];
              }
              if (w === "来る") return { potential: "来られる", volitional: "来よう", ba: "来れば", passive: "来られる", causative: "来させる" }[form];
              if (w === "くる") return { potential: "こられる", volitional: "こよう", ba: "くれば", passive: "こられる", causative: "こさせる" }[form];
              return undefined;
            }
            if (g === "ichidan")
              return { potential: st + "られる", volitional: st + "よう", ba: st + "れば", passive: st + "られる", causative: st + "させる" }[form];
            return {
              potential: st + C_EROW[end] + "る",
              volitional: st + C_OROW[end] + "う",
              ba: st + C_EROW[end] + "ば",
              passive: st + C_AROW[end] + "れる",
              causative: st + C_AROW[end] + "せる",
            }[form];
          }
          if (form === "masu") return masuStem(w, g) + "ます";
          if (form === "masen") return masuStem(w, g) + "ません";
          if (form === "mashita") return masuStem(w, g) + "ました";
          if (g === "ichidan") {
            if (form === "te") return st + "て";
            if (form === "ta") return st + "た";
            if (form === "nai") return st + "ない";
          }
          if (g === "irregular") {
            if (w.endsWith("する")) {
              const b = w.slice(0, -2);
              return { te: b + "して", ta: b + "した", nai: b + "しない" }[form];
            }
            if (w === "来る") return { te: "来て", ta: "来た", nai: "来ない" }[form];
            if (w === "くる") return { te: "きて", ta: "きた", nai: "こない" }[form];
          }
          if (w === "行く" || w === "いく") {
            if (form === "te") return st + "って";
            if (form === "ta") return st + "った";
          }
          if (form === "te") return st + C_TE[end];
          if (form === "ta") return st + C_TA[end];
          if (form === "nai") return st + C_AROW[end] + "ない";
          return w;
        }
        const FORM_HINT = {
          masu: "Polite present/future: stem + ます. (godan: last kana → i-row)",

        // Number reader (unit-tested), 1–99,999 with the sound changes.
        const N_ONES = { 1: "いち", 2: "に", 3: "さん", 4: "よん", 5: "ご", 6: "ろく", 7: "なな", 8: "はち", 9: "きゅう" };
        const N_HYAKU = { 1: "ひゃく", 2: "にひゃく", 3: "さんびゃく", 4: "よんひゃく", 5: "ごひゃく", 6: "ろっぴゃく", 7: "ななひゃく", 8: "はっぴゃく", 9: "きゅうひゃく" };

        function n_u100(n) {

        const JI = {};

        const MINMAP = { 0: "", 5: "ごふん", 10: "じゅっぷん", 15: "じゅうごふん", 20: "にじゅっぷん", 25: "にじゅうごふん", 30: "はん" };

        let drillMode = "conjugation";
        RENDER.drills = function () {

        let conjFormSel = "mixed";

        window.startConj = function () {

              const pct = Math.round((score / cfg.items.length) * 100);
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">' + (pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪") + "</div><b>" +
                score + " / " + cfg.items.length + ' correct</b><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" onclick="RENDER_listen()">Back</button></div></div></div>';
              return;
            }
            const it = cfg.items[idx];
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>Listening · ' + escapeHtml(cfg.title) + "</span><span>" + (idx + 1) + " / " + cfg.items.length + " · ✅ " + score + "</span></div>" +
              '<div class="flashcard" id="playCard" style="min-height:150px"><div style="font-size:52px">🔊</div><div class="tap" id="playTap">Tap to replay</div></div>' +
              '<div class="opts">' + it.choices.map((c) => '<button class="opt ' + (it.jpOpt ? "jp" : "") + '" data-v="' + escapeAttr(c) + '">' + escapeHtml(c) + "</button>").join("") + "</div></div>";
            speak(it.audio);
            el("playCard").onclick = () => speak(it.audio);
            v.querySelectorAll(".opt").forEach((b) =>
              b.addEventListener("click", () => {
                if (answered) return;
                answered = true;
                const good = b.dataset.v === it.answer;
                if (good) score++;
                v.querySelectorAll(".opt").forEach((x) => {
                  if (x.dataset.v === it.answer) x.classList.add("correct");
                  else if (x === b) x.classList.add("wrong");
                  x.style.pointerEvents = "none";
                });
                const tap = el("playTap");
                if (tap) tap.textContent = it.reveal || "";
                setTimeout(() => {
                  answered = false;
                  idx++;
                  render();
                }, good ? 850 : 1500);
              }),
            );
          }
          render();
        }
        window.RENDER_listen = RENDER.listen;

        // ---- Listening dialogues (two TTS "speakers" via pitch) --------
        let dlgToken = 0;
        function dlgSpeakAsync(text, pitch, token) {
          return new Promise((resolve) => {
            if (!("speechSynthesis" in window) || !text || token !== dlgToken) return resolve();
            try {
              const u = new SpeechSynthesisUtterance(text);
              u.lang = "ja-JP";
              u.rate = 0.88;
              u.pitch = pitch;
              if (jaVoice) u.voice = jaVoice;
              u.onend = resolve;
              u.onerror = resolve;
              speechSynthesis.speak(u);
            } catch (e) {
              resolve();
            }
          });
        }
        const dlgPause = (ms) => new Promise((r) => setTimeout(r, ms));
        window.startDialogue = function (i) {
          const d = byLevel(EXTRA.dialogues)[i];
          if (d) runDialogue(d);
        };
        function runDialogue(d) {
          const v = $('[data-view="listen"]');
          let showText = false, playing = false;
          function paint() {
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>💬 ' + escapeHtml(d.title) + "</span><span>" + d.lines.length + " lines</span></div>" +
              '<div class="card" style="min-height:120px">' +
              (showText
                ? d.lines.map((l) => '<div style="margin:8px 0;display:flex;gap:8px"><span>' + (l.sp === "A" ? "🧑" : "🧑‍🦰") + '</span><span><span class="jp">' + escapeHtml(l.ja) + '</span><div class="hint">' + escapeHtml(l.en) + "</div></span></div>").join("")
                : '<div class="empty-state"><div class="big">🎧</div><div class="hint">Text hidden — train your ears first, like the real exam.</div></div>') +
              "</div>" +
              '<div class="btnrow" style="justify-content:center;margin-top:14px">' +
              '<button class="btn jp" id="dlgPlay">' + (playing ? "⏸ Stop" : "▶ Play dialogue") + "</button>" +
              '<button class="btn" id="dlgText">' + (showText ? "Hide text" : "Show text") + "</button>" +
              '<button class="btn primary" id="dlgQ">Questions →</button>' +
              '<button class="btn" id="dlgBack">← Back</button></div></div>';
            el("dlgPlay").onclick = () => {
              if (playing) {
                playing = false;
                dlgToken++;
                try { speechSynthesis.cancel(); } catch (e) {}
                paint();
              } else {
                playing = true;
                paint();
                playAll();
              }
            };
            el("dlgText").onclick = () => {
              showText = !showText;
              paint();
            };
            el("dlgQ").onclick = () => {
              dlgToken++;
              try { speechSynthesis.cancel(); } catch (e) {}
              dlgQuestions(d);
            };
            el("dlgBack").onclick = () => {
              dlgToken++;
              try { speechSynthesis.cancel(); } catch (e) {}
              RENDER.listen();
            };
          }
          async function playAll() {
            const my = ++dlgToken;
            try { speechSynthesis.cancel(); } catch (e) {}
            for (const l of d.lines) {
              if (my !== dlgToken || !playing) return;
              await dlgSpeakAsync(l.ja, l.sp === "A" ? 1.0 : 0.8, my);
              await dlgPause(600);
            }
            if (my === dlgToken) {
              playing = false;
              paint();
            }
          }
          paint();
        }
        function dlgQuestions(d) {
          const v = $('[data-view="listen"]');
          let idx = 0, score = 0, answered = false;
          function render() {
            if (idx >= d.qs.length) {
              markStudied(d.qs.length * 2);
              const pct = Math.round((score / d.qs.length) * 100);
              if (pct >= 80) confetti();
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">' + (pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪") + "</div><b>" +
                score + " / " + d.qs.length + " correct</b><div style='margin-top:8px'>" + (pct >= 80 ? praise() : "Replay the dialogue with the text shown, then try again.") +
                '</div><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" onclick="RENDER_listen()">Back to Listening</button></div></div></div>';
              return;
            }
            const qq = d.qs[idx];
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>💬 ' + escapeHtml(d.title) + "</span><span>" + (idx + 1) + " / " + d.qs.length + " · ✅ " + score + "</span></div>" +
              '<div class="flashcard" style="min-height:120px;cursor:default"><div class="front" style="font-size:18px">' + escapeHtml(qq.q) + "</div></div>" +
              '<div class="opts">' + shuffle(qq.choices.slice()).map((c) => '<button class="opt" data-v="' + escapeAttr(c) + '">' + escapeHtml(c) + "</button>").join("") + "</div></div>";
            v.querySelectorAll(".opt").forEach((b) =>
              b.addEventListener("click", () => {
                if (answered) return;
                answered = true;
                const good = b.dataset.v === qq.a;
                if (good) score++;
                v.querySelectorAll(".opt").forEach((x) => {
                  if (x.dataset.v === qq.a) x.classList.add("correct");
                  else if (x === b) x.classList.add("wrong");
                  x.style.pointerEvents = "none";
                });
                setTimeout(() => {
                  answered = false;
                  idx++;
                  render();
                }, good ? 850 : 1500);
              }),
            );
          }
          render();
        }

        // ===============================================================
        // Reading — graded passages with comprehension questions
        // ===============================================================
        RENDER.reading = function () {
          const v = $('[data-view="reading"]');
          const list = byLevel(EXTRA.readings);
          v.innerHTML =
            '<div class="card"><h2>Reading 📖</h2><div class="hint">Short graded passages, JLPT-reading style. Read the Japanese (tap 🔊 to hear it), then answer the questions. The translation is there if you get stuck.</div></div>' +
            levelChips() +
            list
              .map(
                (r, i) =>
                  '<div class="card" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><div style="flex:1;min-width:180px"><b style="font-size:14px">' +
                  escapeHtml(r.title) + '</b><div class="hint">' + r.jp.length + " chars · " + r.qs.length + ' questions</div></div>' +
                  '<button class="btn primary sm" onclick="openReading(' + i + ')">Read →</button></div>',
              ).join("");
        };
        window.RENDER_reading = RENDER.reading;
        window.openReading = function (i) {
          const r = byLevel(EXTRA.readings)[i];
          if (!r) return;
          const v = $('[data-view="reading"]');
          let showEn = false;
          function paint() {
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>📖 ' + escapeHtml(r.title) + "</span><span>" + r.qs.length + " questions</span></div>" +
              '<div class="card"><div class="jp" style="font-size:18px;line-height:2.1">' + escapeHtml(r.jp) + "</div>" +
              (showEn ? '<div class="hint" style="margin-top:12px;line-height:1.7">' + escapeHtml(r.en) + "</div>" : "") + "</div>" +
              '<div class="btnrow" style="justify-content:center;margin-top:14px">' +
              '<button class="btn" id="rdHear">' + spk + " Hear it</button>" +
              '<button class="btn" id="rdEn">' + (showEn ? "Hide translation" : "Show translation") + "</button>" +
              '<button class="btn primary" id="rdQ">Questions →</button>' +
              '<button class="btn" onclick="RENDER_reading()">← Back</button></div></div>';
            el("rdHear").onclick = () => speak(r.jp, 0.85);
            el("rdEn").onclick = () => {
              showEn = !showEn;
              paint();
            };
            el("rdQ").onclick = () => readingQuestions(r);
          }
          paint();
        };
        function readingQuestions(r) {
          const v = $('[data-view="reading"]');
          let idx = 0, score = 0, answered = false;
          function render() {
            if (idx >= r.qs.length) {
              markStudied(r.qs.length * 2);
              const pct = Math.round((score / r.qs.length) * 100);
              if (pct >= 80) confetti();
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">' + (pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪") + "</div><b>" +
                score + " / " + r.qs.length + " correct</b><div style='margin-top:8px'>" + (pct >= 80 ? praise() : "Re-read the passage with the translation, then try again.") +
                '</div><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" onclick="RENDER_reading()">Back to Reading</button></div></div></div>';
              return;
            }
            const qq = r.qs[idx];
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>📖 ' + escapeHtml(r.title) + "</span><span>" + (idx + 1) + " / " + r.qs.length + " · ✅ " + score + "</span></div>" +
              '<div class="card"><div class="jp" style="font-size:15px;line-height:1.9;color:var(--muted)">' + escapeHtml(r.jp) + "</div></div>" +
              '<div class="flashcard" style="min-height:90px;cursor:default"><div class="front" style="font-size:17px">' + escapeHtml(qq.q) + "</div></div>" +
              '<div class="opts">' + shuffle(qq.choices.slice()).map((c) => '<button class="opt" data-v="' + escapeAttr(c) + '">' + escapeHtml(c) + "</button>").join("") + "</div></div>";
            v.querySelectorAll(".opt").forEach((b) =>
              b.addEventListener("click", () => {
                if (answered) return;
                answered = true;
                const good = b.dataset.v === qq.a;
                if (good) score++;
                v.querySelectorAll(".opt").forEach((x) => {
                  if (x.dataset.v === qq.a) x.classList.add("correct");
                  else if (x === b) x.classList.add("wrong");
                  x.style.pointerEvents = "none";
                });
                setTimeout(() => {
                  answered = false;
                  idx++;
                  render();
                }, good ? 850 : 1600);
              }),
            );
          }
          render();
        }

        // ===============================================================
        // Write — trace kana / kanji on a canvas with a fading guide
        // ===============================================================
        let writeSrc = "kana";
        RENDER.write = function () {
          const v = $('[data-view="write"]');
          v.innerHTML =
            '<div class="card"><h2>Writing ✍️</h2><div class="hint">Trace each character with your finger (or mouse) over the grey guide, then try it with the guide hidden. Muscle memory makes reading faster too.</div>' +
            '<div class="chiprow" style="margin:14px 0 0">' +
            [["kana", "Kana"], ["kanji", "Kanji"]]
              .map(([k, l]) => '<button class="chip ' + (writeSrc === k ? "active" : "") + '" onclick="setWriteSrc(\'' + k + "')\">" + l + "</button>").join("") +
            "</div></div>" +
            (writeSrc === "kanji" ? levelChips() : "") +
            '<div class="card study" style="text-align:center"><div class="hint" style="margin-bottom:12px">10 random ' +
            (writeSrc === "kana" ? (settings.script === "katakana" ? "katakana" : "hiragana") : lvName() + " kanji") +
            ' per session.</div><button class="btn jp" onclick="startWrite()">✍️ Start writing practice</button></div>';
        };
        window.RENDER_write = RENDER.write;
        window.setWriteSrc = function (s) {
          writeSrc = s;
          RENDER.write();
        };
        window.startWrite = function () {
          let items;
          if (writeSrc === "kana") {
            const key = settings.script === "katakana" ? "k" : "h";
            items = shuffle(KANA_FLAT).slice(0, 10).map((c) => ({ glyph: c[key], hint: c.r, say: c[key] }));
          } else {
            items = shuffle(byLevel(DATA.kanji)).slice(0, 10).map((o) => ({ glyph: o.c, hint: o.m + (o.kun ? " · " + o.kun : ""), say: firstReading(o) }));
          }
          writeSession(items);
        };
        function writeSession(items) {
          const v = $('[data-view="write"]');
          let idx = 0, guide = true;
          function render() {
            if (idx >= items.length) {
              markStudied(items.length);
              confetti();
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">✍️</div><b>' + items.length +
                " characters practised!</b><div style='margin-top:8px'>" + praise() +
                '</div><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" onclick="RENDER_write()">Back to Writing</button></div></div></div>';
              return;
            }
            const it = items[idx];
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>Writing</span><span>' + (idx + 1) + " / " + items.length + "</span></div>" +
              '<div class="card" style="text-align:center"><div style="font-size:14px;font-weight:600;margin-bottom:10px">' + escapeHtml(it.hint) + "</div>" +
              '<canvas id="wrCanvas" width="280" height="280" style="touch-action:none;border-radius:16px;background:var(--card,#fff);box-shadow:inset 0 0 0 2px rgba(120,120,140,.25);max-width:100%"></canvas>' +
              '<div class="btnrow" style="justify-content:center;margin-top:12px">' +
              '<button class="btn" id="wrClear">Clear</button>' +
              '<button class="btn" id="wrGuide">' + (guide ? "Hide guide" : "Show guide") + "</button>" +
              '<button class="btn" id="wrHear">' + spk + "</button>" +
              '<button class="btn primary" id="wrNext">' + (idx + 1 >= items.length ? "Finish" : "Next →") + "</button></div></div></div>";
            const cv = el("wrCanvas");
            const ctx = cv.getContext("2d");
            function paintBase() {
              ctx.clearRect(0, 0, cv.width, cv.height);
              ctx.save();
              ctx.strokeStyle = "rgba(120,120,140,.25)";
              ctx.setLineDash([6, 6]);
              ctx.beginPath();
              ctx.moveTo(cv.width / 2, 0);
              ctx.lineTo(cv.width / 2, cv.height);
              ctx.moveTo(0, cv.height / 2);
              ctx.lineTo(cv.width, cv.height / 2);
              ctx.stroke();
              ctx.restore();
              if (guide) {
                ctx.save();
                ctx.fillStyle = "rgba(120,120,140,.28)";
                ctx.font = '210px "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif';
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(it.glyph, cv.width / 2, cv.height / 2 + 10);
                ctx.restore();
              }
            }
            paintBase();
            let drawing = false;
            function pos(ev) {
              const r = cv.getBoundingClientRect();
              return [((ev.clientX - r.left) * cv.width) / r.width, ((ev.clientY - r.top) * cv.height) / r.height];
            }
            cv.addEventListener("pointerdown", (ev) => {
              drawing = true;
              cv.setPointerCapture(ev.pointerId);
              ctx.strokeStyle = "#6366f1";
              ctx.lineWidth = 7;
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.beginPath();
              const [x, y] = pos(ev);
              ctx.moveTo(x, y);
            });
            cv.addEventListener("pointermove", (ev) => {
              if (!drawing) return;
              const [x, y] = pos(ev);
              ctx.lineTo(x, y);
              ctx.stroke();
            });
            cv.addEventListener("pointerup", () => (drawing = false));
            el("wrClear").onclick = paintBase;
            el("wrGuide").onclick = () => {
              guide = !guide;
              render();
            };
            el("wrHear").onclick = () => speak(it.say);
            el("wrNext").onclick = () => {
              idx++;
              render();
            };
          }
          render();
        }

        // ===============================================================
        // Modal
        // ===============================================================
        function openModal(html) {
          let m = el("jpModal");
          if (!m) {
            m = document.createElement("div");
            m.id = "jpModal";
            m.className = "modal-wrap";
            m.addEventListener("click", (e) => {
              if (e.target === m) closeModal();
            });
            document.body.appendChild(m);
          }
          m.innerHTML =
            '<div class="modal-box"><button onclick="closeModal()" class="iconbtn" style="position:absolute;top:14px;right:14px">✕</button>' + html + "</div>";
          m.style.display = "grid";
        }
        window.closeModal = function () {
          const m = el("jpModal");
          if (m) m.style.display = "none";
        };

        // ===============================================================
        // Helpers
        // ===============================================================
        function shuffle(arr) {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }
        function uniqueChoices(answer, pool, n) {
          const set = new Set([answer]);
          for (const x of shuffle(pool)) {
            if (set.size >= n) break;
            if (x && x !== answer) set.add(x);
          }
          return shuffle(Array.from(set));
        }
        function escapeHtml(s) {
          return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c],
          );
        }
        const escapeAttr = escapeHtml;

        // ===============================================================
        // Boot
        // ===============================================================
        // Re-render the dashboard when the install prompt becomes available.
        window.__jpRefreshInstall = function () {
          const cur = document.querySelector(".view.active");
          if (cur && cur.dataset.view === "dashboard") RENDER.dashboard();
        };
        buildTabs();
        (async function () {
          await pullState();
          const start = (location.hash || "").replace("#", "");
          go(TABS.some((t) => t[0] === start) ? start : "dashboard");
        })();
      })();
    </script>

    <script>
      // Admin shell boilerplate (identity + logout) — offline-tolerant so the
      // installed PWA still opens with no connection.
      document.getElementById("logoutBtn").addEventListener("click", async () => {
        try {
          await fetch("/admin-logout", { method: "POST", credentials: "same-origin" });
        } catch (e) {}
        window.location.href = "/admin-login.html";
      });
      function jpSetMe(name) {
        document.getElementById("meName").innerText = name;
        document.getElementById("meAvatar").innerText = String(name).slice(0, 2).toUpperCase();
      }
      (async () => {
        try {
          const r = await fetch("/whoami", { credentials: "same-origin" });
          // Only a real "unauthorized" bounces to login. A network failure
          // (offline) must NOT — the cached app should still open.
          if (r.status === 401 || r.status === 403) {
            window.location.href = "/admin-login.html";
            return;
          }
          if (r.ok) {
            const data = await r.json();
            const name = ((data && data.admin) || {}).username || "Admin";
            try {
              localStorage.setItem("jp_me", name);
            } catch (e) {}
            jpSetMe(name);
            return;
          }
        } catch (e) {
          /* offline — fall through to the cached identity */
        }
        let cached = "Admin";
        try {
          cached = localStorage.getItem("jp_me") || "Admin";
        } catch (e) {}
        jpSetMe(cached);
      })();

      // Register the offline service worker, scoped to just this page.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/japanese-sw.js", { scope: "/japanese.html" })
            .catch(function () {});
        });
      }
      // Capture the browser's install prompt so the dashboard can offer it.
      window.__jpDeferredInstall = null;
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__jpDeferredInstall = e;
        if (window.__jpRefreshInstall) window.__jpRefreshInstall();
      });
      window.jpInstall = async function () {
        const d = window.__jpDeferredInstall;
        if (!d) return;
        window.__jpDeferredInstall = null;
        try {
          d.prompt();
          await d.userChoice;
        } catch (e) {}
        if (window.__jpRefreshInstall) window.__jpRefreshInstall();
      };
    </script>
    <script src="/theme.js"></script>
    <script src="/admin-nav.js"></script>
  </body>
