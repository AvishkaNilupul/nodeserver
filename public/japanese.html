<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Japanese N5 · RedeemHub</title>
    <!-- Installable offline PWA (see /japanese-sw.js, scoped to this page). -->
    <link rel="manifest" href="/japanese-manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="日本語 N5" />
    <link rel="apple-touch-icon" href="/japanese-icon-192.png" />
    <style>
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --line: #e7eaf0;
        --ink: #0f172a;
        --muted: #6b7280;
        --accent: #4f46e5;
        --accent2: #6366f1;
        --green: #059669;
        --red: #ef4444;
        --jp: #e11d48;
        --jp2: #f43f5e;
        --amber: #d97706;
      }
      html[data-theme="dark"] {
        --bg: #0e1014;
        --surface: #161a22;
        --surface-2: #1e232e;
        --line: #2a3140;
        --ink: #e8ebf2;
        --muted: #9aa3b4;
        color-scheme: dark;
      }
      html[data-theme="dark"] .nav .links a.active {
        background: rgba(99, 102, 241, 0.2);
      }
      html[data-theme="dark"] .chip.active,
      html[data-theme="dark"] .tabs button.active {
        background: rgba(99, 102, 241, 0.2);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        display: flex;
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
      }
      .jp {
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo",
          "MS PGothic", sans-serif;
      }

      /* ---- Sidebar (shared shell) ---- */
      .nav {
        width: 236px;
        background: var(--surface);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }
      .nav .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }
      .nav .brand .mark {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        display: grid;
        place-items: center;
        box-shadow: 0 6px 14px rgba(79, 70, 229, 0.32);
      }
      .nav .brand b {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.15;
      }
      .nav .brand b span {
        display: block;
        font-size: 10.5px;
        color: var(--muted);
        font-weight: 500;
      }
      .nav .links {
        padding: 12px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
        overflow-y: auto;
      }
      .nav .links a {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 11px 13px;
        border-radius: 10px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
      }
      .nav .links a:hover {
        background: var(--surface-2);
      }
      .nav .links a.active {
        background: #eef2ff;
        color: var(--accent);
        font-weight: 600;
      }
      .nav .me {
        border-top: 1px solid var(--line);
        padding: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav .me .av {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #34d399, #10b981);
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        flex-shrink: 0;
      }
      .nav .me .who {
        line-height: 1.2;
        min-width: 0;
      }
      .nav .me .who b {
        font-size: 13.5px;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 110px;
      }
      .nav .me .who span {
        display: block;
        font-size: 11px;
        color: var(--muted);
      }
      .nav .me .logout {
        margin-left: auto;
        width: 32px;
        height: 32px;
        border-radius: 9px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      .nav .me .logout + .logout {
        margin-left: 8px;
      }
      .nav .me .logout:hover {
        color: #ef4444;
        border-color: #fecaca;
        background: #fef2f2;
      }

      /* ---- Page ---- */
      .page {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 26px 30px 80px;
        min-width: 0;
      }
      .page-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .page-head h1 {
        font-size: 22px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .page-head h1 .badge-jp {
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, var(--jp2), var(--jp));
        padding: 3px 9px;
        border-radius: 999px;
      }
      .page-head .sub {
        color: var(--muted);
        font-size: 13px;
        margin-top: 4px;
      }
      .head-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .sync {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--muted);
        padding: 5px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        white-space: nowrap;
      }
      .sync .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--muted);
        flex-shrink: 0;
      }
      .sync.ok .dot {
        background: var(--green);
      }
      .sync.saving .dot {
        background: var(--amber);
      }
      .sync.off .dot {
        background: var(--red);
      }

      .tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 22px;
      }
      .tabs button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        padding: 8px 14px;
        border-radius: 999px;
        cursor: pointer;
        white-space: nowrap;
      }
      .tabs button:hover {
        background: var(--surface-2);
      }
      .tabs button.active {
        background: #eef2ff;
        color: var(--accent);
        border-color: transparent;
      }

      .view {
        display: none;
      }
      .view.active {
        display: block;
        animation: fade 0.18s ease;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 18px;
      }
      .card h2 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .card .hint {
        color: var(--muted);
        font-size: 12.5px;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        gap: 14px;
      }
      .cols-3 {
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      }

      /* stat tiles */
      .stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px 18px;
      }
      .stat .k {
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .stat .v {
        font-size: 26px;
        font-weight: 800;
        margin-top: 6px;
      }
      .stat .v small {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
      }
      .progress {
        height: 8px;
        border-radius: 999px;
        background: var(--surface-2);
        overflow: hidden;
        margin-top: 12px;
        border: 1px solid var(--line);
      }
      .progress > i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        border-radius: 999px;
        transition: width 0.4s ease;
      }

      .btn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        padding: 9px 15px;
        border-radius: 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }
      .btn:hover {
        background: var(--surface-2);
      }
      .btn.primary {
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        color: #fff;
        border-color: transparent;
      }
      .btn.primary:hover {
        filter: brightness(1.05);
      }
      .btn.jp {
        background: linear-gradient(135deg, var(--jp2), var(--jp));
        color: #fff;
        border-color: transparent;
      }
      .btn.sm {
        padding: 6px 10px;
        font-size: 12px;
      }
      .btn.danger {
        color: var(--red);
        border-color: rgba(239, 68, 68, 0.4);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btnrow {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        padding: 6px 12px;
        border-radius: 999px;
        cursor: pointer;
        white-space: nowrap;
      }
      .chip.active {
        background: #eef2ff;
        color: var(--accent);
        border-color: transparent;
      }
      .chiprow {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .search {
        width: 100%;
        max-width: 320px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        border-radius: 10px;
        padding: 10px 13px;
        font: inherit;
        font-size: 16px;
        margin-bottom: 16px;
      }
      .search:focus {
        outline: none;
        border-color: var(--accent2);
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .toolbar .search {
        margin-bottom: 0;
      }

      /* form fields (custom words / sentences) */
      .field {
        margin-bottom: 12px;
      }
      .field label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        margin: 0 0 5px 2px;
      }
      .field input,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        border-radius: 10px;
        padding: 11px 13px;
        font: inherit;
        font-size: 16px;
      }
      .field textarea {
        min-height: 64px;
        resize: vertical;
      }
      .field input:focus,
      .field textarea:focus {
        outline: none;
        border-color: var(--accent2);
      }
      .field .jpin {
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo",
          sans-serif;
      }
      .field2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* kana grid */
      .kana-block {
        margin-bottom: 22px;
      }
      .kana-block h3 {
        font-size: 12.5px;
        color: var(--muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 10px;
      }
      .kana-grid {
        display: grid;
        gap: 7px;
      }
      .kana-cell {
        aspect-ratio: 1;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.08s ease, border-color 0.1s ease;
        min-height: 52px;
      }
      .kana-cell:hover {
        border-color: var(--accent2);
        transform: translateY(-2px);
      }
      .kana-cell.empty {
        border: 1px dashed transparent;
        background: transparent;
        cursor: default;
      }
      .kana-cell .g {
        font-size: 23px;
        font-weight: 600;
        line-height: 1;
      }
      .kana-cell .r {
        font-size: 11px;
        color: var(--muted);
        margin-top: 5px;
      }
      .kana-cell.learned {
        border-color: var(--green);
        box-shadow: inset 0 0 0 1px rgba(5, 150, 105, 0.35);
      }

      /* kanji cards */
      .kanji-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        padding: 14px;
        cursor: pointer;
        display: flex;
        gap: 12px;
        align-items: center;
        transition: transform 0.08s ease, border-color 0.1s ease;
      }
      .kanji-card:hover {
        border-color: var(--accent2);
        transform: translateY(-2px);
      }
      .kanji-card .c {
        font-size: 34px;
        font-weight: 600;
        line-height: 1;
        flex-shrink: 0;
      }
      .kanji-card .m {
        font-size: 13px;
        font-weight: 600;
      }
      .kanji-card .rd {
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 3px;
      }
      .kanji-card.in-srs {
        border-color: var(--accent);
      }
      .tick {
        margin-left: auto;
        font-size: 11px;
        color: var(--accent);
        font-weight: 700;
        flex-shrink: 0;
      }

      /* list rows (vocab / words / sentences) */
      .item-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        margin-bottom: 8px;
      }
      .item-row .word {
        font-size: 17px;
        font-weight: 700;
        min-width: 88px;
      }
      .item-row .read {
        font-size: 12.5px;
        color: var(--muted);
        min-width: 84px;
      }
      .item-row .mean {
        font-size: 13.5px;
        flex: 1;
        min-width: 110px;
      }
      .item-row .mean .note {
        display: block;
        font-size: 11.5px;
        color: var(--muted);
        margin-top: 2px;
      }
      .item-row .romaji {
        font-size: 12px;
        color: var(--muted);
        font-style: italic;
        min-width: 80px;
      }
      .item-row .acts {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
        margin-left: auto;
      }
      .iconbtn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        width: 36px;
        height: 36px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        cursor: pointer;
        flex-shrink: 0;
        font-size: 14px;
      }
      .iconbtn:hover {
        color: var(--accent);
        border-color: var(--accent2);
      }
      .iconbtn.on {
        color: var(--accent);
        border-color: var(--accent);
        background: #eef2ff;
      }
      html[data-theme="dark"] .iconbtn.on,
      html[data-theme="dark"] .kanji-card.in-srs {
        background: rgba(99, 102, 241, 0.15);
      }

      /* grammar / phrases */
      .acc {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        margin-bottom: 8px;
        overflow: hidden;
      }
      .acc > summary {
        padding: 14px 16px;
        cursor: pointer;
        font-weight: 700;
        font-size: 14px;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .acc > summary::-webkit-details-marker {
        display: none;
      }
      .acc > summary .struct {
        margin-left: auto;
        font-size: 12px;
        color: var(--accent);
        font-weight: 600;
        background: #eef2ff;
        padding: 3px 9px;
        border-radius: 7px;
      }
      html[data-theme="dark"] .acc > summary .struct {
        background: rgba(99, 102, 241, 0.18);
      }
      .acc .body {
        padding: 0 16px 16px;
      }
      .acc .body .note {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 12px;
      }
      .ex {
        border-left: 3px solid var(--accent2);
        padding: 4px 0 4px 12px;
        margin-bottom: 12px;
      }
      .ex .j {
        font-size: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ex .r {
        font-size: 12px;
        color: var(--muted);
        font-style: italic;
        margin-top: 2px;
      }
      .ex .e {
        font-size: 13px;
        margin-top: 2px;
      }

      /* flashcard / review / quiz */
      .study {
        max-width: 520px;
        margin: 0 auto;
      }
      .flashcard {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--surface);
        padding: 40px 22px;
        text-align: center;
        min-height: 230px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .flashcard .front {
        font-size: 56px;
        font-weight: 600;
        line-height: 1.15;
      }
      .flashcard .front.small {
        font-size: 32px;
      }
      .flashcard .back {
        margin-top: 18px;
        border-top: 1px dashed var(--line);
        padding-top: 18px;
        width: 100%;
      }
      .flashcard .back .b1 {
        font-size: 22px;
        font-weight: 700;
      }
      .flashcard .back .b2 {
        font-size: 14px;
        color: var(--muted);
        margin-top: 6px;
        line-height: 1.5;
      }
      .flashcard .tap {
        font-size: 12px;
        color: var(--muted);
        margin-top: 16px;
      }
      .rate {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 16px;
      }
      .rate button {
        border: 1px solid var(--line);
        background: var(--surface);
        font: inherit;
        font-weight: 700;
        font-size: 13px;
        padding: 14px 8px;
        border-radius: 12px;
        cursor: pointer;
      }
      .rate button small {
        display: block;
        font-size: 10.5px;
        font-weight: 500;
        color: var(--muted);
        margin-top: 2px;
      }
      .rate .again {
        color: var(--red);
        border-color: rgba(239, 68, 68, 0.35);
      }
      .rate .good {
        color: var(--accent);
        border-color: rgba(79, 70, 229, 0.35);
      }
      .rate .easy {
        color: var(--green);
        border-color: rgba(5, 150, 105, 0.35);
      }
      .rate button:hover {
        background: var(--surface-2);
      }
      .sess-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        font-size: 13px;
        color: var(--muted);
        font-weight: 600;
      }

      .opt {
        border: 1px solid var(--line);
        background: var(--surface);
        font: inherit;
        font-size: 16px;
        font-weight: 600;
        padding: 16px;
        border-radius: 12px;
        cursor: pointer;
        text-align: center;
        color: var(--ink);
      }
      .opt:hover {
        background: var(--surface-2);
      }
      .opt.correct {
        border-color: var(--green);
        background: rgba(5, 150, 105, 0.12);
        color: var(--green);
      }
      .opt.wrong {
        border-color: var(--red);
        background: rgba(239, 68, 68, 0.12);
        color: var(--red);
      }
      .opts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 18px;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
      }
      .empty-state .big {
        font-size: 44px;
        margin-bottom: 10px;
      }
      .plan li {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 11px 0;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
      }
      .plan li:last-child {
        border-bottom: none;
      }
      .plan li .dot {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 2px solid var(--line);
        flex-shrink: 0;
        display: grid;
        place-items: center;
        font-size: 12px;
      }
      .plan li.done .dot {
        background: var(--green);

      .toast {
        position: fixed;
        bottom: 22px;
        left: 50%;

        opacity: 1;
        transform: translateX(-50%) translateY(0);

      .modal-wrap {
        position: fixed;
        inset: 0;
        z-index: 250;
        display: grid;
        place-items: center;
        background: rgba(15, 23, 42, 0.5);
        padding: 16px;

        background: var(--surface);

        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }

      .spk-result.mid { background: rgba(217, 119, 6, 0.14); color: var(--amber); }
      .spk-result.bad { background: rgba(239, 68, 68, 0.12); color: var(--red); }
      .scene {

      .bubble .you-prompt { font-size: 13.5px; margin-bottom: 8px; }

      /* drills: counter tables + number display */
      .ctable { width: 100%; border-collapse: collapse; }

      @media (max-width: 700px) {

    <script src="/japanese-extra-data.js"></script>
    <script>
      (function () {
        "use strict";
        const DATA = window.JP_DATA;
        // Merge the N4 dataset in, tagging every item with its JLPT level so
        // views, quizzes and exams can filter by level.
        const N4 = window.JP_N4_DATA || { kanji: [], vocab: [], grammar: [], particles: [] };
        ["kanji", "vocab", "grammar", "particles"].forEach((key) => {
          DATA[key].forEach((o) => (o.lv = "n5"));
          (N4[key] || []).forEach((o) => (o.lv = "n4"));
          DATA[key] = DATA[key].concat(N4[key] || []);
        });
        // Reading passages + listening dialogues (already level-tagged).
        const EXTRA = window.JP_EXTRA || { readings: [], dialogues: [] };
        const LEVELS = [["n5", "N5"], ["n4", "N4"], ["all", "All"]];
        const lvName = () => (settings.level === "all" ? "N5+N4" : (settings.level || "n5").toUpperCase());
        function byLevel(arr) {
          const lv = settings.level || "n5";
          return lv === "all" ? arr : arr.filter((o) => o.lv === lv);
        }
        const $ = (s, r) => (r || document).querySelector(s);
        const el = (id) => document.getElementById(id);

        // ===============================================================
        // State — single source of truth, mirrored to localStorage (for
        // offline/instant use) and synced to the server (cross-device).
        // ===============================================================
        const srs = {};
        const words = [];
        const sentences = [];
        const stats = { streak: 0, lastStudy: null, history: {}, reviewsTotal: 0 };
        const settings = { script: "hiragana", showRomaji: true, level: "n5" };
        const state = { updatedAt: 0 };
        const LS_KEY = "jp_state_v2";

        function snapshot() {
          return {
            srs,
            stats,
            settings,
            words,
            sentences,
            updatedAt: state.updatedAt,
          };
        }
        // Replace all live containers in place so existing references stay valid.
        function adopt(ns) {
          if (!ns) return;
          Object.keys(srs).forEach((k) => delete srs[k]);
          Object.assign(srs, ns.srs || {});
          Object.keys(stats).forEach((k) => delete stats[k]);
          Object.assign(
            stats,
            { streak: 0, lastStudy: null, history: {}, reviewsTotal: 0 },
            ns.stats || {},
          );
          Object.keys(settings).forEach((k) => delete settings[k]);
          Object.assign(
            settings,
            { script: "hiragana", showRomaji: true, level: "n5" },
            ns.settings || {},
          );
          words.length = 0;
          (ns.words || []).forEach((w) => words.push(w));
          sentences.length = 0;
          (ns.sentences || []).forEach((s) => sentences.push(s));
          state.updatedAt = ns.updatedAt || 0;
        }

        function localSave() {
          try {
            localStorage.setItem(LS_KEY, JSON.stringify(snapshot()));
          } catch (e) {}
        }
        function localLoad() {
          try {
            const raw = localStorage.getItem(LS_KEY);
            if (raw) return JSON.parse(raw);
            // Migrate from the first (localStorage-only) version if present.
            const oldSrs = localStorage.getItem("jp_srs_v1");
            if (oldSrs) {
              return {
                srs: JSON.parse(oldSrs || "{}"),
                stats: JSON.parse(localStorage.getItem("jp_stats_v1") || "{}"),
                settings: JSON.parse(
                  localStorage.getItem("jp_settings_v1") || "{}",
                ),
                words: [],
                sentences: [],
                updatedAt: Date.now(),
              };
            }
          } catch (e) {}
          return null;
        }

        // Any local mutation goes through here: bump timestamp, cache, sync.
        function touch() {
          state.updatedAt = Date.now();
          localSave();
          schedulePush();
        }

        // ---- Server sync ---------------------------------------------
        async function api(method, url, body) {
          const opts = { method, credentials: "same-origin", headers: {} };
          if (body !== undefined) {
            opts.headers["Content-Type"] = "application/json";
            opts.body = JSON.stringify(body);
          }
          const res = await fetch(url, opts);
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        }
        let syncState = "local";
        function setSync(s) {
          syncState = s;
          const badge = el("syncBadge");
          const txt = el("syncText");
          if (!badge) return;
          badge.className =
            "sync " +
            (s === "saved" ? "ok" : s === "saving" ? "saving" : s === "off" ? "off" : "");
          txt.textContent =
            s === "saved"
              ? "Synced"
              : s === "saving"
                ? "Saving…"
                : s === "off"
                  ? "Offline"
                  : "Local";
        }
        let pushTimer = null;
        let pushing = false;
        let pushAgain = false;
        function schedulePush(now) {
          clearTimeout(pushTimer);
          pushTimer = setTimeout(doPush, now ? 0 : 1400);
        }
        async function doPush() {
          if (pushing) {
            pushAgain = true;
            return;
          }
          pushing = true;
          setSync("saving");
          try {
            await api("PUT", "/japanese/state", snapshot());
            setSync("saved");
          } catch (e) {
            setSync("off");
          } finally {
            pushing = false;
            if (pushAgain) {
              pushAgain = false;
              schedulePush(true);
            }
          }
        }
        async function pullState() {
          // Load local first so the UI is instant and works offline.
          adopt(localLoad());
          try {
            const r = await api("GET", "/japanese/state");
            const server = r.state;
            if (server && (server.updatedAt || 0) >= (state.updatedAt || 0)) {
              adopt(server);
              localSave();
              setSync("saved");
            } else if (server) {
              // Local is newer than server — push it.
              setSync("saving");
              schedulePush(true);
            } else {
              // Nothing on the server yet — seed it with whatever we have.
              if (Object.keys(srs).length || words.length || sentences.length) {
                schedulePush(true);
              } else {
                setSync("saved");
              }
            }
          } catch (e) {
            setSync("off");
          }
        }
        // Flush when connectivity returns or the tab is hidden/closed.
        window.addEventListener("online", () => schedulePush(true));
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden" && syncState !== "saved")
            schedulePush(true);
        });

        // ===============================================================
        // Text-to-speech (browser Web Speech API — no network needed)
        // ===============================================================
        let jaVoice = null;
        function pickVoice() {
          if (!("speechSynthesis" in window)) return;
          const vs = speechSynthesis.getVoices();
          jaVoice =
            vs.find((v) => v.lang === "ja-JP") ||
            vs.find((v) => v.lang && v.lang.indexOf("ja") === 0) ||
            null;
        }
        if ("speechSynthesis" in window) {
          pickVoice();
          speechSynthesis.onvoiceschanged = pickVoice;
        }
        function speak(text, rate, pitch) {
          if (!("speechSynthesis" in window) || !text) return;
          try {
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "ja-JP";
            u.rate = rate || 0.9;
            if (pitch) u.pitch = pitch;
            if (jaVoice) u.voice = jaVoice;
            speechSynthesis.speak(u);
          } catch (e) {}
        }
        window.__jpSpeak = speak;

        function toast(msg) {
          const t = el("toast");
          t.textContent = msg;
          t.classList.add("show");
          clearTimeout(toast._t);
          toast._t = setTimeout(() => t.classList.remove("show"), 1600);
        }

        const spk =
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';

        // ===============================================================
        // Lookups for the spaced-repetition engine
        // ===============================================================
        const KANA_MAP = {};
        const KANA_FLAT = [];
        ["gojuon", "dakuten", "yoon"].forEach((sec) =>
          DATA.kana[sec].forEach((row) =>
            row.forEach((cell) => {
              if (cell) {
                KANA_FLAT.push(cell);
                KANA_MAP[cell.h] = cell.r;
                KANA_MAP[cell.k] = cell.r;
              }
            }),
          ),
        );
        const KANJI_MAP = {};
        DATA.kanji.forEach((o) => (KANJI_MAP[o.c] = o));
        const VOCAB_MAP = {};
        DATA.vocab.forEach((o) => (VOCAB_MAP[o.w + "|" + o.k] = o));
        const wordMap = () => {
          const m = {};
          words.forEach((w) => (m[w.id] = w));
          return m;
        };
        const sentMap = () => {
          const m = {};
          sentences.forEach((s) => (m[s.id] = s));
          return m;
        };

        const vocabId = (o) => "vocab:" + o.w + "|" + o.k;
        const kanjiId = (o) => "kanji:" + o.c;
        const kanaId = (glyph) => "kana:" + glyph;
        const wordCardId = (w) => "word:" + w.id;
        const sentCardId = (s) => "sent:" + s.id;

        function resolveCard(id) {
          const i = id.indexOf(":");
          const type = id.slice(0, i);
          const rest = id.slice(i + 1);
          if (type === "kana") {
            return { front: rest, b1: KANA_MAP[rest] || "?", b2: "Kana", speak: rest };
          }
          if (type === "kanji") {
            const o = KANJI_MAP[rest];
            if (!o) return null;
            return {
              front: o.c,
              b1: o.m,
              b2: "on " + o.on + "  ·  kun " + o.kun + "\n" + o.ex,
              speak: o.c,
            };
          }
          if (type === "vocab") {
            const o = VOCAB_MAP[rest];
            if (!o) return null;
            return {
              front: o.w,
              fsmall: o.w.length > 4,
              b1: o.k,
              b2: o.m + "  ·  " + o.r,
              speak: o.k,
            };
          }
          if (type === "word") {
            const o = wordMap()[rest];
            if (!o) return null;
            return {
              front: o.w,
              fsmall: (o.w || "").length > 4,
              b1: o.k || "",
              b2: o.m + (o.r ? "  ·  " + o.r : "") + (o.note ? "\n" + o.note : ""),
              speak: o.k || o.w,
            };
          }
          if (type === "sent") {
            const o = sentMap()[rest];
            if (!o) return null;
            // Talk practice: prompt with the meaning, recall/say the Japanese.
            return {
              front: o.m || o.j,
              fsmall: true,
              b1: o.j,
              b2: (o.r || "") + (o.note ? "\n" + o.note : ""),
              speak: o.j,
            };
          }
          return null;
        }

        const INTERVALS = [0, 1, 2, 4, 8, 16, 32, 60];
        function ensureCard(id) {
          if (!srs[id]) srs[id] = { box: 0, due: todayStr(), reps: 0, lapses: 0 };
          return srs[id];
        }
        function addToSrs(id) {
          if (srs[id]) return false;
          ensureCard(id);
          touch();
          return true;
        }
        function removeFromSrs(id) {
          if (srs[id]) {
            delete srs[id];
            touch();
          }
        }
        function grade(id, q) {
          const card = ensureCard(id);
          card.reps += 1;
          if (q === "again") {
            card.box = 0;
            card.lapses += 1;
            card.due = todayStr();
          } else {
            const step = q === "easy" ? 2 : 1;
            card.box = Math.min(INTERVALS.length - 1, card.box + step);
            card.due = addDays(todayStr(), INTERVALS[card.box]);
          }
          touch();
        }
        const isDue = (id) => srs[id] && srs[id].due <= todayStr();
        function dueIds() {
          return Object.keys(srs).filter((id) => isDue(id) && !!resolveCard(id));
        }
        // Cards you keep getting wrong: any with lapses, or still in the early
        // boxes after being reviewed — surfaced regardless of due date.
        function weakIds() {
          return Object.keys(srs)
            .filter((id) => {
              const c = srs[id];
              return c && (c.lapses > 0 || (c.reps > 0 && (c.box || 0) <= 1)) && !!resolveCard(id);
            })
            .sort((a, b) => (srs[b].lapses || 0) - (srs[a].lapses || 0) || (srs[a].box || 0) - (srs[b].box || 0))
            .slice(0, 20);
        }
        function counts() {
          let kana = 0, kanji = 0, vocab = 0, word = 0, sent = 0;
          Object.keys(srs).forEach((id) => {
            if (id.startsWith("kana:")) kana++;
            else if (id.startsWith("kanji:")) kanji++;
            else if (id.startsWith("vocab:")) vocab++;
            else if (id.startsWith("word:")) word++;
            else if (id.startsWith("sent:")) sent++;
          });
          return {
            kana, kanji, vocab, word, sent,
            deck: kana + kanji + vocab + word + sent,
            due: dueIds().length,
          };
        }

        // ---- dates ----
        function todayStr() {
          const d = new Date();
          return (
            d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0")
          );
        }
        function addDays(str, n) {
          const [y, m, d] = str.split("-").map(Number);
          const dt = new Date(y, m - 1, d + n);
          return (
            dt.getFullYear() + "-" +
            String(dt.getMonth() + 1).padStart(2, "0") + "-" +
            String(dt.getDate()).padStart(2, "0")
          );
        }
        function markStudied(n) {
          const t = todayStr();
          if (stats.lastStudy !== t) {
            if (stats.lastStudy === addDays(t, -1)) stats.streak += 1;
            else stats.streak = 1;
            stats.lastStudy = t;
          }
          const prev = stats.history[t] || 0;
          stats.history[t] = prev + (n || 0);
          stats.reviewsTotal += n || 0;
          const beforeLvl = xpInfo().lvl;
          stats.xp = (stats.xp || 0) + (n || 0);
          if (xpInfo().lvl > beforeLvl) celebrate("⬆️ Level up! You are now " + xpInfo().title);
          const goal = settings.dailyGoal || 30;
          if (prev < goal && stats.history[t] >= goal) celebrate("🎉 Daily goal reached — " + goal + " items! すごい！");
          touch();
        }

        // ---- XP levels & celebrations ---------------------------------
        const XP_TITLES = [
          [0, "🌱 Beginner"],
          [150, "📖 Student"],
          [400, "🍙 Apprentice"],
          [900, "🎒 Adventurer"],
          [1800, "🗡️ Samurai"],
          [3200, "🎓 Sensei"],
          [5200, "🏯 Master"],
          [8000, "🐉 Legend"],
        ];
        function xpInfo() {
          const xp = stats.xp || 0;
          let lvl = 0;
          for (let i = 0; i < XP_TITLES.length; i++) if (xp >= XP_TITLES[i][0]) lvl = i;
          const cur = XP_TITLES[lvl][0];
          const next = lvl + 1 < XP_TITLES.length ? XP_TITLES[lvl + 1][0] : null;
          return {
            lvl, xp,
            title: XP_TITLES[lvl][1],
            next,
            pct: next === null ? 100 : Math.min(100, Math.round(((xp - cur) / (next - cur)) * 100)),
          };
        }
        const PRAISE = ["よくできました！ Well done!", "すごい！ Amazing!", "いいね！ Keep it up!", "がんばったね！ Great effort!", "継続は力なり — consistency is power!"];
        const praise = () => PRAISE[Math.floor(Math.random() * PRAISE.length)];
        function confetti() {
          if (!document.getElementById("jpConfettiCss")) {
            const st = document.createElement("style");
            st.id = "jpConfettiCss";
            st.textContent = "@keyframes jpConfettiFall{0%{transform:translateY(-40px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:.4}}.jp-confetti{position:fixed;top:0;z-index:9999;pointer-events:none;font-size:22px;animation:jpConfettiFall linear forwards}";
            document.head.appendChild(st);
          }
          const emo = ["🎉", "✨", "🌸", "⭐", "🎊"];
          for (let i = 0; i < 26; i++) {
            const s = document.createElement("span");
            s.className = "jp-confetti";
            s.textContent = emo[Math.floor(Math.random() * emo.length)];
            s.style.left = Math.random() * 100 + "vw";
            s.style.animationDuration = 1.4 + Math.random() * 1.6 + "s";
            s.style.animationDelay = Math.random() * 0.5 + "s";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 3600);
          }
        }
        function celebrate(msg) {
          toast(msg);
          confetti();
        }

        function uid(p) {
          return (
            (p || "x") +
            Date.now().toString(36) +
            Math.random().toString(36).slice(2, 7)
          );
        }

        // ===============================================================

          ["dashboard", "Dashboard"],

          ["kanji", "Kanji"],
          ["vocab", "Vocabulary"],

          ["sentences", "Sentences"],
          ["speak", "Speak"],
          ["listen", "Listen"],
          ["podcast", "Podcast"],
          ["reading", "Reading"],
          ["grammar", "Grammar"],
          ["review", "Review"],
          ["quiz", "Quiz"],
          ["exam", "Exam"],
          ["drills", "Drills"],
          ["phrases", "Phrases"],

        function buildTabs() {
          el("tabs").innerHTML = TABS.map(
            ([k, label]) => '<button data-tab="' + k + '">' + label + "</button>",

          el("tabs")
            .querySelectorAll("button")

            .querySelectorAll("button")
            .forEach((b) => b.classList.toggle("active", b.dataset.tab === view));
          const active = el("tabs").querySelector("button.active");
          if (active) active.scrollIntoView({ inline: "center", block: "nearest" });
          if (RENDER[view]) RENDER[view]();
          try {
            location.hash = view;
          } catch (e) {}
          $(".page").scrollTop = 0;

            ).join("") +
            "</div>"

            "<button class=\"btn\" onclick=\"go('kana')\">Practice kana</button>" +
            (weakCount ? '<button class="btn" onclick="startWeak()">🎯 Weak cards (' + weakCount + ")</button>" : "") +
            "<button class=\"btn\" onclick=\"go('quiz')\">Quick quiz</button>" +
            "<button class=\"btn\" onclick=\"go('exam')\">📝 Mock exam</button></div></div>" +
            levelChips() +

            '<div class="grid cols-3" style="margin-bottom:18px">' +
            statTile("🔥 Streak", stats.streak + '<small> day' + (stats.streak === 1 ? "" : "s") + "</small>", null) +
            statTile("✅ Reviewed today", (stats.history[todayStr()] || 0) + "", null) +
            statTile("📚 In your deck", c.deck + '<small> cards</small>', null) +
            "</div>" +
            '<div class="grid cols-3" style="margin-bottom:18px">' +
            statTile("Kana", c.kana + '<small>/' + KANA_FLAT.length + "</small>", kanaPct) +
            statTile("Kanji · " + lvName(), kanjiIn + '<small>/' + lvKanji.length + "</small>", kanjiPct) +
            statTile("Vocabulary · " + lvName(), vocabIn + '<small>/' + lvVocab.length + "</small>", vocabPct) +
            "</div>" +
            '<div class="card"><h2>Today\'s plan</h2><ul class="plan" id="planList"></ul></div>' +
            '<div class="card"><h2>Jump-start your deck</h2><div class="hint">Load a batch of cards into spaced repetition and start reviewing. Your progress syncs to every device.</div>' +
            '<div class="btnrow" style="margin-top:14px">' +
            '<button class="btn" onclick="seedKana()">+ All hiragana</button>' +
            '<button class="btn" onclick="seedKana(\'k\')">+ All katakana</button>' +
            '<button class="btn" onclick="seedNew(\'kanji\',10)">+ 10 kanji</button>' +
            '<button class="btn" onclick="seedNew(\'vocab\',15)">+ 15 vocab</button>' +
            '<button class="btn" onclick="go(\'mywords\')">+ Add your own words</button>' +
            "</div></div>" +
            '<div class="card"><h2>Backup &amp; restore</h2><div class="hint">Download all your progress as a file, or restore it on another device.</div>' +
            '<div class="btnrow" style="margin-top:14px"><button class="btn" onclick="jpExport()">⬇️ Export backup</button>' +
            '<button class="btn" onclick="jpImport()">⬆️ Import backup</button>' +
            '<input type="file" id="jpImportFile" accept="application/json" style="display:none"></div></div>';
          const fi = el("jpImportFile");
          if (fi) fi.addEventListener("change", jpImportFile);

          const plan = [
            { label: "Review your due cards" + (c.due ? " (" + c.due + ")" : ""), done: c.due === 0 && studiedToday, go: "review" },
            { label: "Practice a kana set", done: c.kana > 0, go: "kana" },
            { label: "Learn 5 new kanji", done: c.kanji >= 5, go: "kanji" },
            { label: "Add a word or sentence of your own", done: words.length + sentences.length > 0, go: "mywords" },
            { label: "Read a passage (Reading tab)", done: false, go: "reading" },
            { label: "Listen to a dialogue or podcast episode", done: false, go: "listen" },
            { label: "Study 1 grammar point", done: false, go: "grammar" },
          ];
          el("planList").innerHTML = plan
            .map(
              (p) =>
                '<li class="' + (p.done ? "done" : "") + '"><span class="dot">' +
                (p.done ? "✓" : "") + '</span><span class="label">' + p.label +
                '</span><span class="go" onclick="go(\'' + p.go + "')\">Open →</span></li>",
            )
            .join("");
          updateHeadReview();
        };
        function xpCard() {
          const x = xpInfo();
          const goal = settings.dailyGoal || 30;
          const today = stats.history[todayStr()] || 0;
          const gPct = Math.min(100, Math.round((today / goal) * 100));
          return (
            '<div class="card" style="margin-bottom:18px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">' +
            '<b style="font-size:15px">' + x.title + '</b><span class="hint">' + x.xp + " XP" +
            (x.next === null ? " · max level!" : " · " + (x.next - x.xp) + " XP to next level") + "</span></div>" +
            '<div class="progress" style="margin-top:8px"><i style="width:' + x.pct + '%"></i></div>' +

            '<span style="font-size:13px;font-weight:600">' + (gPct >= 100 ? "🎉 " : "🎯 ") + "Daily goal: " + today + " / " + goal + "</span>" +
            '<span class="chiprow" style="margin:0">' +
            [15, 30, 60, 100].map((n) => '<button class="chip ' + (goal === n ? "active" : "") + '" onclick="setGoal(' + n + ')">' + n + "</button>").join("") +
            "</span></div>" +

          touch();
          rerender();

        window.jpExport = function () {
          const blob = new Blob([JSON.stringify(snapshot(), null, 2)], { type: "application/json" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "japanese-progress-" + todayStr() + ".json";
          a.click();
          setTimeout(() => URL.revokeObjectURL(a.href), 2000);
          toast("Backup downloaded");
        };
        window.jpImport = function () {
          const fi = el("jpImportFile");
          if (fi) fi.click();
        };
        function jpImportFile(ev) {
          const f = ev.target.files && ev.target.files[0];
          if (!f) return;
          const rd = new FileReader();
          rd.onload = () => {
            try {
              const ns = JSON.parse(rd.result);
              if (!ns || typeof ns.srs !== "object") throw new Error("bad file");
              ns.updatedAt = Date.now();
              adopt(ns);
              touch();
              rerender();
              celebrate("Backup restored — " + Object.keys(srs).length + " cards");
            } catch (e) {
              toast("⚠️ Not a valid backup file");
            }
          };
          rd.readAsText(f);
          ev.target.value = "";
        }
        function statTile(k, v, pct) {

            "</div>"
          );

            if (!srs[kanaId(glyph)]) {
              ensureCard(kanaId(glyph));
              added++;
            }
          });
          if (added) touch();
          toast(added + " kana added to review");
          RENDER.dashboard();
        };
        window.seedNew = function (type, n) {
          const pool = type === "kanji" ? byLevel(DATA.kanji).map(kanjiId) : byLevel(DATA.vocab).map(vocabId);
          let added = 0;
          for (const id of pool) {
            if (added >= n) break;

              ensureCard(id);
              added++;

          toast(added + " " + type + " cards added");

            '<div class="card"><div class="toolbar">' +
            '<div class="chiprow" style="margin:0">' +

            "</div>" +
            '<label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);font-weight:600;margin-left:auto;cursor:pointer">' +

          el("romajiToggle").addEventListener("change", (e) => {

        function paintKana() {

        window.kanjiDetail = function (ch) {

          // Cross-link into the vocab the learner is studying: every N5 word

          const appears = DATA.vocab.filter((x) => x.w.indexOf(ch) !== -1).slice(0, 10);
          const appearsHtml = appears.length
            ? rowKV(
                "Appears in",
                '<div style="display:flex;flex-wrap:wrap;gap:6px">' +

                    .map(
                      (x) =>

        function paintCustom(containerId, arr, type) {

        window.addAllCustom = function (type) {

              added++;

          updateHeadReview();

          touch();
          rerender();
          updateHeadReview();
          toast("Deleted");

        window.wordForm = function (existing) {

            field("w_w", "Japanese (word)", o.w, "e.g. 面白い", true) +
            '<div class="field2">' + field("w_k", "Reading (kana)", o.k, "おもしろい", true) + field("w_r", "Romaji (optional)", o.r, "omoshiroi") + "</div>" +

          toast(id ? "Saved" : "Word added");
        };
        window.sentForm = function (existing) {

          openModal(
            '<h2 style="font-size:16px;font-weight:700;margin-bottom:14px">' + (existing ? "Edit sentence" : "Add a sentence") + "</h2>" +
            fieldArea("s_j", "Japanese sentence", o.j, "e.g. 今日は天気がいいですね。", true) +
            field("s_r", "Romaji (optional)", o.r, "Kyō wa tenki ga ii desu ne.") +
            field("s_m", "Meaning (English)", o.m, "The weather is nice today, isn't it?") +
            fieldArea("s_note", "Note (optional)", o.note, "when to use it, who said it…") +
            '<div class="btnrow" style="justify-content:flex-end;margin-top:8px"><button class="btn" onclick="closeModal()">Cancel</button>' +
            '<button class="btn primary" onclick="saveSent(' + (existing ? "'" + existing.id + "'" : "") + ')">Save</button></div>',
          );
          setTimeout(() => el("s_j") && el("s_j").focus(), 60);
        };
        window.saveSent = function (id) {

          if (id) {
            const o = sentences.find((x) => x.id === id);
            if (o) Object.assign(o, rec);
          } else {
            sentences.unshift(Object.assign({ id: uid("s"), createdAt: Date.now() }, rec));
          }
          touch();
          closeModal();
          RENDER.sentences();
          toast(id ? "Saved" : "Sentence added");
        };
        window.startWordFlash = function () {

          runFlashSession({
            title: "My Words", back: "mywords",
            cards: list.map((o) => ({
              front: o.w || o.k, fsmall: (o.w || "").length > 4, b1: o.k || "", b2: (o.m || "") + (o.r ? "  ·  " + o.r : ""), speak: o.k || o.w,
            })),
          });

        window.startSentPractice = function () {

              front: o.m || o.j, fsmall: true, b1: o.j, b2: o.r || "", speak: o.j,

        function field(id, label, value, ph, jp) {

        const val = (id) => (el(id) ? el(id).value.trim() : "");

        // ===============================================================
        // Grammar

        RENDER.grammar = function () {

        // Grammar/phrase example row — speaker wired via data-speak (no inline

        function exampleRow(j, r, e) {
          return (
            '<div class="ex"><div class="j jp">' + escapeHtml(j) +

        // ===============================================================
        // Review (spaced repetition session)
        // ===============================================================
        RENDER.review = function () {
          const v = $('[data-view="review"]');
          const due = dueIds();
          const c = counts();
          if (!due.length) {
            const weak = weakIds().length;
            v.innerHTML =
              '<div class="card study"><div class="empty-state"><div class="big">🎉</div>' +
              (c.deck === 0
                ? "<b>Your review deck is empty.</b><div style='margin-top:8px'>Add cards from Kana, Kanji, Vocabulary or your own words, or jump-start below.</div>"
                : "<b>All caught up!</b><div style='margin-top:8px'>No cards are due right now. Drill your weak cards, or learn ahead.</div>") +
              '<div class="btnrow" style="justify-content:center;margin-top:18px">' +
              (weak ? '<button class="btn jp" onclick="startWeak()">🎯 Weak cards (' + weak + ")</button>" : "") +
              '<button class="btn primary" onclick="seedNew(\'vocab\',10);go(\'review\')">+ 10 vocab & review</button>' +
              '<button class="btn" onclick="seedNew(\'kanji\',10);go(\'review\')">+ 10 kanji</button></div></div></div>';

          runReviewSession(shuffle(due));
        };
        // Switch to the review view and run an explicit queue (used by the
        // "weak cards" shortcut, which ignores due dates).
        function openReviewSession(ids) {
          document.querySelectorAll(".view").forEach((vw) => vw.classList.toggle("active", vw.dataset.view === "review"));
          el("tabs").querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.tab === "review"));
          try { location.hash = "review"; } catch (e) {}
          $(".page").scrollTop = 0;
          runReviewSession(ids);
        }
        window.startWeak = function () {
          const ids = weakIds();
          if (!ids.length) return toast("No weak cards yet — the ones you miss in review will show up here.");
          openReviewSession(shuffle(ids));
        };
        function runReviewSession(queue) {
          const v = $('[data-view="review"]');
          let idx = 0, done = 0, revealed = false;
          function render() {
            if (idx >= queue.length) {
              markStudied(done);
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">✅</div><b>Session complete!</b>' +
                "<div style='margin-top:8px'>You reviewed <b>" + done + "</b> card" + (done === 1 ? "" : "s") + ". 🔥 " + stats.streak + "-day streak.</div>" +
                '<div class="btnrow" style="justify-content:center;margin-top:18px">' +
                "<button class=\"btn primary\" onclick=\"go('review')\">Review more</button>" +
                "<button class=\"btn\" onclick=\"go('dashboard')\">Dashboard</button></div></div></div>";
              updateHeadReview();
              return;
            }
            const id = queue[idx];
            const card = resolveCard(id);
            if (!card) {
              idx++;
              return render();
            }
            const box = srs[id].box || 0;
            v.innerHTML =
              '<div class="study">' +
              '<div class="sess-top"><span>Review</span><span>' + (idx + 1) + " / " + queue.length + "</span></div>" +
              '<div class="progress" style="margin-bottom:16px"><i style="width:' + ((idx / queue.length) * 100).toFixed(0) + '%"></i></div>' +
              '<div class="flashcard" id="fc"><div class="front jp ' + (card.fsmall ? "small" : "") + '">' + escapeHtml(card.front) + "</div>" +
              (revealed
                ? '<div class="back"><div class="b1 jp">' + escapeHtml(card.b1) + '</div><div class="b2" style="white-space:pre-line">' + escapeHtml(card.b2) + "</div></div>"
                : '<div class="tap">Tap to reveal</div>') + "</div>" +
              (revealed
                ? '<div class="rate">' +
                  '<button class="again" data-q="again">Again<small>&lt; 1 min</small></button>' +
                  '<button class="good" data-q="good">Good<small>+' + INTERVALS[Math.min(INTERVALS.length - 1, box + 1)] + 'd</small></button>' +
                  '<button class="easy" data-q="easy">Easy<small>+' + INTERVALS[Math.min(INTERVALS.length - 1, box + 2)] + "d</small></button></div>"
                : '<div class="btnrow" style="justify-content:center;margin-top:16px"><button class="btn" id="hearBtn">' + spk + " Hear</button></div>") +
              "</div>";
            const fc = el("fc");
            fc.onclick = () => {
              if (!revealed) {
                revealed = true;
                speak(card.speak);
                render();
              }
            };
            if (!revealed && el("hearBtn"))
              el("hearBtn").addEventListener("click", (e) => {
                e.stopPropagation();
                speak(card.speak);
              });
            if (revealed)
              v.querySelectorAll(".rate button").forEach((b) =>
                b.addEventListener("click", () => {
                  grade(id, b.dataset.q);
                  // Missed cards come back at the end of this same session
                  // instead of waiting for the next one.
                  if (b.dataset.q === "again") queue.push(id);
                  done++;
                  idx++;
                  revealed = false;
                  render();
                }),
              );
          }
          render();
        }

        // ===============================================================
        // Flashcard session (study — no SRS writeback)
        // ===============================================================
        function runFlashSession(cfg) {
          const v = $('[data-view="' + cfg.back + '"]');
          let idx = 0, revealed = false;
          function render() {
            if (idx >= cfg.cards.length) {
              markStudied(cfg.cards.length);
              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">🎴</div><b>Deck finished!</b><div style="margin-top:8px">' +
                cfg.cards.length + ' cards reviewed.</div><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" id="flashDone">Done</button></div></div></div>';
              el("flashDone").addEventListener("click", () => rerender());
              return;
            }
            const card = cfg.cards[idx];
            v.innerHTML =
              '<div class="study"><div class="sess-top"><span>' + escapeHtml(cfg.title) + "</span><span>" + (idx + 1) + " / " + cfg.cards.length + "</span></div>" +
              '<div class="flashcard" id="fc"><div class="front jp ' + (card.fsmall ? "small" : "") + '">' + escapeHtml(card.front) + "</div>" +
              (revealed
                ? '<div class="back"><div class="b1 jp">' + escapeHtml(card.b1) + '</div><div class="b2" style="white-space:pre-line">' + escapeHtml(card.b2) + "</div></div>"
                : '<div class="tap">Tap to reveal</div>') + "</div>" +
              '<div class="btnrow" style="justify-content:space-between;margin-top:16px">' +
              '<button class="btn" id="hearBtn">' + spk + " Hear</button>" +
              '<button class="btn primary" id="nextBtn">' + (revealed ? "Next →" : "Reveal") + "</button></div></div>";
            el("fc").onclick = () => {
              if (!revealed) {

            });

                revealed = true;
                speak(card.speak);

        // ===============================================================
        // Multiple-choice session (kana practice + quizzes)
        // ===============================================================
        function runMcSession(cfg) {
          const v = $('[data-view="' + cfg.back + '"]');
          let idx = 0, score = 0, answered = false;
          function render() {
            if (idx >= cfg.items.length) {

              v.innerHTML =
                '<div class="card study"><div class="empty-state"><div class="big">' + (pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪") + "</div><b>" +
                score + " / " + cfg.items.length + " correct</b><div style='margin-top:8px'>" +
                (pct >= 80 ? "Excellent!" : pct >= 50 ? "Good progress — keep going." : "Keep practising, you'll get there.") +
                '</div><div class="btnrow" style="justify-content:center;margin-top:18px"><button class="btn primary" id="mcDone">Back</button></div></div></div>';
              el("mcDone").addEventListener("click", () => rerender());
