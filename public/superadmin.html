<!DOCTYPE html>
<html lang="en">

<head>
<script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admins · RedeemHub</title>
  <style>
  :root{--bg:#f6f7fb;--surface:#ffffff;--surface-2:#f8fafc;--line:#e7eaf0;--ink:#0f172a;--muted:#6b7280;--accent:#4f46e5;--accent2:#6366f1;}
  html[data-theme="dark"]{--bg:#0e1014;--surface:#161a22;--surface-2:#1e232e;--line:#2a3140;--ink:#e8ebf2;--muted:#9aa3b4;color-scheme:dark;}
  html[data-theme="dark"] .nav .links a.active{background:rgba(99,102,241,0.20);}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Inter", "Segoe UI", Tahoma, sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; overflow: hidden; }

  .nav { width: 236px; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; flex-shrink: 0; }
  .nav .brand { display: flex; align-items: center; gap: 10px; padding: 18px 20px; border-bottom: 1px solid var(--line); }
  .nav .brand .mark { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: grid; place-items: center; box-shadow: 0 6px 14px rgba(79,70,229,0.32); }
  .nav .brand b { font-size: 15px; font-weight: 700; line-height: 1.15; }
  .nav .brand b span { display: block; font-size: 10.5px; color: var(--muted); font-weight: 500; }
  .nav .links { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .nav .links a { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 10px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; }
  .nav .links a:hover { background: var(--surface-2); }
  .nav .links a.active { background: #eef2ff; color: var(--accent); font-weight: 600; }
  .nav .me { border-top: 1px solid var(--line); padding: 14px; display: flex; align-items: center; gap: 10px; }
  .nav .me .av { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#34d399,#10b981); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .nav .me .who { line-height: 1.2; min-width: 0; }
  .nav .me .who b { font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
  .nav .me .who span { display: block; font-size: 11px; color: var(--muted); }
  .nav .me .logout { margin-left: auto; width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); display: grid; place-items: center; cursor: pointer; }
  .nav .me .logout + .logout { margin-left: 8px; }
  .nav .me .logout:hover { color: #ef4444; border-color: #fecaca; background: #fef2f2; }

  .page { flex: 1; overflow-y: auto; padding: 28px 32px; min-width: 0; }
  .page h1 { font-size: 22px; font-weight: 800; }
  .page .sub { color: var(--muted); font-size: 13.5px; margin-top: 4px; margin-bottom: 22px; }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 22px; margin-bottom: 22px; max-width: 760px; }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  label { font-size: 12.5px; font-weight: 600; color: var(--muted); display: block; margin: 0 0 6px 2px; }
  .field { margin-bottom: 14px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .row .field { flex: 1; min-width: 180px; }
  input, select { width: 100%; padding: 12px 13px; border-radius: 11px; border: 1.5px solid var(--line); background: var(--surface-2); color: var(--ink); outline: none; font-family: inherit; font-size: 14px; }
  input:focus, select:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 4px rgba(79,70,229,0.12); }
  .btn { padding: 11px 18px; border: none; border-radius: 11px; background: linear-gradient(180deg, var(--accent2), var(--accent)); color: #fff; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn:hover { transform: translateY(-1px); }
  .btn.ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); box-shadow: none; }
  .btn.danger { background: #fff; color: #ef4444; border: 1px solid #fecaca; box-shadow: none; }
  html[data-theme="dark"] .btn.danger { background: transparent; border-color: rgba(239,68,68,0.4); }
  .btn.sm { padding: 8px 12px; font-size: 13px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--line); font-size: 13.5px; vertical-align: middle; }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700; }
  .badge.super { background: #eef2ff; color: var(--accent); }
  .badge.admin { background: #ecfdf5; color: #059669; }
  html[data-theme="dark"] .badge.super { background: rgba(99,102,241,0.18); }
  html[data-theme="dark"] .badge.admin { background: rgba(16,185,129,0.16); color: #34d399; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .msg { font-size: 13.5px; min-height: 20px; margin-bottom: 12px; }
  .msg.err { color: #dc2626; }
  .msg.ok { color: #059669; }

  .modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .modal-bg.show { display: flex; }
  .modal { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 24px; }
  .modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
  .modal .actions { margin-top: 18px; }
  </style>
</head>

<body>
<aside class="nav">
  <div class="brand">
    <span class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 8.5 12 15 22 8.5 12 2"></polygon><path d="M2 8.5v7L12 22l10-6.5v-7"></path></svg></span>
    <b>RedeemHub<span>Admin console</span></b>
  </div>
  <nav class="links">
    <a href="/admin.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Inbox</a>
    <a href="/orders"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M3 9h18M7 14h6"></path></svg> Orders</a>
    <a href="/generate.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M2 7l10 5 10-5"></path></svg> Generate code</a>
    <a href="/items"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m7.5 4.27 9 5.15M21 8l-9 5-9-5 9-5 9 5zM3 8v8l9 5 9-5V8"></path></svg> Items</a>
    <a href="/inventory"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 7H4M16 3H8M6 11h12l-1 10H7z"></path></svg> Inventory</a>
    <a href="/twitch-inventory.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"></rect><path d="M8 21h8M12 18v3M7 8h.01M11 8h2"></path></svg> Twitch drops</a>
    <a href="/bots.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12" rx="2"></rect><path d="M12 8V5M9 3h6M9 14h.01M15 14h.01M2 13h2M20 13h2"></path></svg> Bots</a>
    <a class="active" href="/superadmin.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Admins</a>
  </nav>
  <div class="me">
    <span class="av" id="meAvatar">--</span>
    <div class="who"><b id="meName">Admin</b><span id="meRole">Super Admin</span></div>
    <button class="logout themebtn" data-theme-toggle onclick="toggleTheme()" title="Toggle dark mode" aria-pressed="false"><svg class="t-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg><svg class="t-sun" style="display:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg></button>
    <button class="logout" id="logoutBtn" title="Log out"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path></svg></button>
  </div>
</aside>

<main class="page">
  <h1>Admins</h1>
  <div class="sub">Create and manage admin accounts. Superadmins can access Twitch drops, Bots and this page.</div>

  <div id="msg" class="msg"></div>

  <div class="card">
    <h2>Add a new admin</h2>
    <form id="addForm">
      <div class="row">
        <div class="field">
          <label>Username</label>
          <input id="newUsername" autocomplete="off" placeholder="e.g. jane" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="newPassword" type="password" autocomplete="new-password" placeholder="At least 6 characters" />
        </div>
        <div class="field" style="max-width:170px;">
          <label>Role</label>
          <select id="newRole">
            <option value="admin">Admin</option>
            <option value="superadmin">Superadmin</option>
          </select>
        </div>
      </div>
      <button class="btn" type="submit">Add admin</button>
    </form>
  </div>

  <div class="card">
    <h2>Existing admins</h2>
    <table>
      <thead>
        <tr><th>Username</th><th>Role</th><th>ID</th><th style="text-align:right;">Actions</th></tr>
      </thead>
      <tbody id="adminRows">
        <tr><td colspan="4" style="color:var(--muted);">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Edit modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>Edit admin</h3>
    <input type="hidden" id="editId" />
    <div class="field">
      <label>Username</label>
      <input id="editUsername" autocomplete="off" />
    </div>
    <div class="field">
      <label>New password <span style="font-weight:500;text-transform:none;">(leave blank to keep current)</span></label>
      <input id="editPassword" type="password" autocomplete="new-password" placeholder="Unchanged" />
    </div>
    <div class="field">
      <label>Role</label>
      <select id="editRole">
        <option value="admin">Admin</option>
        <option value="superadmin">Superadmin</option>
      </select>
    </div>
    <div class="actions">
      <button class="btn ghost" type="button" id="editCancel">Cancel</button>
      <button class="btn" type="button" id="editSave">Save changes</button>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let ME = {};

  function showMsg(text, kind) {
    const el = $("msg");
    el.textContent = text || "";
    el.className = "msg" + (kind ? " " + kind : "");
    if (text) {
      clearTimeout(showMsg._t);
      showMsg._t = setTimeout(() => { el.textContent = ""; el.className = "msg"; }, 4000);
    }
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    })[c]);
  }

  async function api(method, url, body) {
    const opts = { method, credentials: "same-origin", headers: {} };
    if (body !== undefined) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(url, opts);
    let data = {};
    try { data = await res.json(); } catch (e) { /* ignore */ }
    if (!res.ok || data.success === false) {
      throw new Error((data && data.message) || "Request failed");
    }
    return data;
  }

  async function loadAdmins() {
    try {
      const data = await api("GET", "/admins");
      renderAdmins(data.admins || []);
    } catch (e) {
      $("adminRows").innerHTML =
        '<tr><td colspan="4" style="color:#dc2626;">' + esc(e.message) + "</td></tr>";
    }
  }

  function renderAdmins(admins) {
    if (!admins.length) {
      $("adminRows").innerHTML =
        '<tr><td colspan="4" style="color:var(--muted);">No admins yet.</td></tr>';
      return;
    }
    $("adminRows").innerHTML = admins
      .map((a) => {
        const isMe = ME && a.id === ME.id;
        const roleBadge =
          a.role === "superadmin"
            ? '<span class="badge super">Superadmin</span>'
            : '<span class="badge admin">Admin</span>';
        const delBtn = isMe
          ? ""
          : '<button class="btn danger sm" data-del="' + esc(a.id) + '" data-name="' + esc(a.username) + '">Delete</button>';
        return (
          "<tr>" +
          "<td><b>" + esc(a.username) + "</b>" + (isMe ? ' <span style="color:var(--muted);font-weight:500;">(you)</span>' : "") + "</td>" +
          "<td>" + roleBadge + "</td>" +
          '<td style="color:var(--muted);font-size:12.5px;">' + esc(a.id) + "</td>" +
          '<td><div class="actions">' +
          '<button class="btn ghost sm" data-edit=\'' + esc(JSON.stringify(a)) + "'>Edit</button>" +
          delBtn +
          "</div></td>" +
          "</tr>"
        );
      })
      .join("");
  }

  $("addForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = $("newUsername").value.trim();
    const password = $("newPassword").value;
    const role = $("newRole").value;
    try {
      await api("POST", "/admins", { username, password, role });
      showMsg("Admin '" + username + "' created.", "ok");
      $("addForm").reset();
      loadAdmins();
    } catch (err) {
      showMsg(err.message, "err");
    }
  });

  function openEdit(admin) {
    $("editId").value = admin.id;
    $("editUsername").value = admin.username;
    $("editPassword").value = "";
    $("editRole").value = admin.role === "superadmin" ? "superadmin" : "admin";
    $("editModal").classList.add("show");
  }
  function closeEdit() { $("editModal").classList.remove("show"); }

  $("editCancel").addEventListener("click", closeEdit);
  $("editModal").addEventListener("click", (e) => {
    if (e.target === $("editModal")) closeEdit();
  });

  $("editSave").addEventListener("click", async () => {
    const id = $("editId").value;
    const body = {
      username: $("editUsername").value.trim(),
      role: $("editRole").value,
    };
    const pw = $("editPassword").value;
    if (pw) body.password = pw;
    try {
      await api("PUT", "/admins/" + encodeURIComponent(id), body);
      showMsg("Admin updated.", "ok");
      closeEdit();
      loadAdmins();
    } catch (err) {
      showMsg(err.message, "err");
    }
  });

  $("adminRows").addEventListener("click", async (e) => {
    const editBtn = e.target.closest("[data-edit]");
    if (editBtn) {
      try { openEdit(JSON.parse(editBtn.getAttribute("data-edit"))); } catch (err) { /* ignore */ }
      return;
    }
    const delBtn = e.target.closest("[data-del]");
    if (delBtn) {
      const id = delBtn.getAttribute("data-del");
      const name = delBtn.getAttribute("data-name");
      if (!confirm("Delete admin '" + name + "'? This cannot be undone.")) return;
      try {
        await api("DELETE", "/admins/" + encodeURIComponent(id));
        showMsg("Admin '" + name + "' deleted.", "ok");
        loadAdmins();
      } catch (err) {
        showMsg(err.message, "err");
      }
    }
  });

  $("logoutBtn").addEventListener("click", async () => {
    try { await fetch("/admin-logout", { method: "POST", credentials: "same-origin" }); } catch (e) {}
    window.location.href = "/admin-login.html";
  });

  (async () => {
    try {
      const r = await fetch("/whoami", { credentials: "same-origin" });
      if (!r.ok) { window.location.href = "/admin-login.html"; return; }
      const data = await r.json();
      ME = (data && data.admin) || {};
      const name = ME.username || "Admin";
      $("meName").innerText = name;
      $("meAvatar").innerText = name.slice(0, 2).toUpperCase();
    } catch (e) {
      window.location.href = "/admin-login.html";
      return;
    }
    loadAdmins();
  })();
</script>
<script src="/theme.js"></script>
<script src="/admin-nav.js"></script>
</body>
</html>
