<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- The order token lives in this page's URL. no-referrer stops the browser
         from leaking it in the Referer header when item images load from
         Twitch's CDN (or anywhere off-site). -->
    <meta name="referrer" content="no-referrer" />
    <title>Your account set</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --surface-2: #f8fafc;
        --line: #e7eaf0;
        --ink: #0f172a;
        --muted: #6b7280;
        --accent: #4f46e5;
        --green: #059669;
        --red: #dc2626;
        --yellow: #b45309;
      }
      html[data-theme="dark"] {
        --bg: #0e1014;
        --surface: #161a22;
        --surface-2: #1e232e;
        --line: #2a3140;
        --ink: #e8ebf2;
        --muted: #9aa3b4;
        --green: #34d399;
        --red: #f87171;
        --yellow: #fbbf24;
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
        background:
          radial-gradient(1000px 500px at 100% -10%, rgba(99,102,241,0.10) 0%, transparent 60%),
          radial-gradient(900px 500px at -10% 110%, rgba(168,85,247,0.08) 0%, transparent 55%),
          var(--bg);
        color: var(--ink);
        min-height: 100vh;
        padding: 26px 16px 70px;
      }
      .wrap {
        max-width: 940px;
        margin: 0 auto;
      }
      .theme-fab {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
      }
      .sub {
        color: var(--muted);
        font-size: 14px;
        margin-top: 4px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
      }
      .summary {
        margin-bottom: 18px;
      }
      .sumtop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .big {
        font-size: 20px;
        font-weight: 800;
      }
      .big b {
        color: var(--green);
      }
      .hbar {
        height: 12px;
        border-radius: 7px;
        background: var(--line);
        display: flex;
        overflow: hidden;
      }
      .hbar i {
        display: block;
        height: 100%;
      }
      .hbar i.a {
        background: var(--green);
      }
      .hbar i.b {
        background: var(--red);
      }
      .hbar i.u {
        background: #cbd5e1;
      }
      .hstat {
        font-size: 12.5px;
        color: var(--muted);
        margin-top: 8px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .hstat b {
        color: var(--ink);
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
      }
      .bundle {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .bitem {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface-2);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 12.5px;
      }
      .bitem img,
      .bitem .ph {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        object-fit: cover;
        background: var(--bg);
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        font-size: 9px;
        color: var(--muted);
      }
      .btn {
        border: 0;
        border-radius: 11px;
        padding: 11px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        font-family: inherit;
      }
      .btn:hover {
        filter: brightness(1.06);
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .btn.ghost {
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--line);
      }
      .guar {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--green);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 12px;
        margin-top: 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      .acct {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .acct .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .acct .n {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11.5px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
      }
      .badge.alive {
        color: var(--green);
        border-color: var(--green);
      }
      .badge.bad {
        color: var(--red);
        border-color: var(--red);
      }
      .badge.unchecked {
        color: var(--muted);
      }
      .field {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .field .k {
        width: 62px;
        font-size: 11.5px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .field .v {
        flex: 1;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        background: var(--surface-2);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 9px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cp {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        border-radius: 8px;
        width: 30px;
        height: 30px;
        flex-shrink: 0;
        cursor: pointer;
        display: grid;
        place-items: center;
      }
      .cp:hover {
        color: var(--accent);
        border-color: var(--accent);
      }
      .repnote {
        font-size: 11px;
        color: var(--muted);
      }
      .viewbtn {
        align-self: flex-start;
        background: var(--surface-2);
        border: 1px solid var(--line);
        color: var(--ink);
        border-radius: 9px;
        padding: 7px 12px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .viewbtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .items {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .irow {
        display: flex;
        align-items: center;
        gap: 9px;
        background: var(--surface-2);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 6px 9px;
        font-size: 12.5px;
      }
      .irow img,
      .irow .ph {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        object-fit: cover;
        background: var(--bg);
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        font-size: 9px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .irow .inm {
        flex: 1;
      }
      .irow .ict {
        font-weight: 700;
        color: var(--accent);
      }
      .state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .toast {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--bg);
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 0.95;
      }
      .foot {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <button
      class="theme-fab"
      data-theme-toggle
      onclick="toggleTheme()"
      title="Toggle dark mode"
      aria-pressed="false"
    >
      <svg
        class="t-moon"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg
        class="t-sun"
        style="display: none"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="4"></circle>
        <path
          d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
        ></path>
      </svg>
    </button>

    <div class="wrap">
      <div id="root">
        <div class="state">Loading your order…</div>
      </div>
      <div class="foot">
        Keep this link private — anyone with it can view these accounts.
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
      const token = location.pathname.split("/").filter(Boolean).pop();
      const $ = (id) => document.getElementById(id);

      function toast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove("show"), 1800);
      }
      function esc(s) {
        return String(s == null ? "" : s).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }
      const HEALTH_LABEL = {
        alive: "Working",
        token_dead: "Not working",
        integrity_failed: "Not working",
        missing_drops: "Not working",
        error: "Checking",
        unchecked: "Not checked",
      };
      const BAD = ["token_dead", "integrity_failed", "missing_drops", "error"];
      function badgeClass(s) {
        if (s === "alive") return "alive";
        if (BAD.includes(s)) return "bad";
        return "unchecked";
      }

      window.copyText = async (t, label) => {
        try {
          await navigator.clipboard.writeText(t);
          toast((label || "Value") + " copied");
        } catch (e) {
          toast("Copy failed");
        }
      };

      // One row in an account's "View items" panel: thumbnail + name + count.
      function itemRow(it) {
        const img = it.image
          ? '<img src="' + esc(it.image) + '" alt="" referrerpolicy="no-referrer" />'
          : '<span class="ph">' + esc((it.name || "?").slice(0, 2)) + "</span>";
        return (
          '<div class="irow">' +
          img +
          '<span class="inm">' +
          esc(it.name || "Reward") +
          "</span>" +
          '<span class="ict">×' +
          esc(it.count) +
          "</span></div>"
        );
      }

      // Expand/collapse an account's item list.
      window.toggleItems = function (idx, btn) {
        const el = document.getElementById("items-" + idx);
        if (!el) return;
        const show = el.style.display === "none";
        el.style.display = show ? "" : "none";
        if (btn)
          btn.textContent =
            (show ? "Hide items" : "View items") + " (" + el.children.length + ")";
      };

      function healthBar(sm) {
        const total = Math.max(1, sm.total || 0);
        const a = ((sm.alive || 0) / total) * 100;
        const b = ((sm.bad || 0) / total) * 100;
        const u = ((sm.unchecked || 0) / total) * 100;
        return (
          '<div class="hbar">' +
          '<i class="a" style="width:' + a + '%"></i>' +
          '<i class="b" style="width:' + b + '%"></i>' +
          '<i class="u" style="width:' + u + '%"></i>' +
          "</div>" +
          '<div class="hstat">' +
          '<span><span class="dot" style="background:var(--green)"></span><b>' +
          (sm.alive || 0) + "</b> working</span>" +
          ((sm.bad || 0)
            ? '<span><span class="dot" style="background:var(--red)"></span><b>' +
              sm.bad + "</b> not working</span>"
            : "") +
          ((sm.unchecked || 0)
            ? '<span><span class="dot" style="background:#cbd5e1"></span><b>' +
              sm.unchecked + "</b> not checked</span>"
            : "") +
          "</div>"
        );
      }

      function field(k, v, label) {
        const val = v || "—";
        return (
          '<div class="field"><span class="k">' +
          k +
          '</span><span class="v" title="' +
          esc(val) +
          '">' +
          esc(val) +
          "</span>" +
          (v
            ? '<button class="cp" onclick="copyText(' +
              JSON.stringify(v).replace(/"/g, "&quot;") +
              ",'" +
              label +
              "')\" title=\"Copy\">" +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
              "</button>"
            : "") +
          "</div>"
        );
      }

      function acctCard(u, idx) {
        const s = u.status || "unchecked";
        const cls = badgeClass(s);
        const items = u.items || [];
        return (
          '<div class="acct">' +
          '<div class="top"><span class="n">Account #' +
          (idx + 1) +
          '</span><span class="badge ' +
          cls +
          '">' +
          (HEALTH_LABEL[s] || s) +
          "</span></div>" +
          field("Login", u.login, "Login") +
          field("Password", u.password, "Password") +
          '<button class="viewbtn" type="button" onclick="toggleItems(' +
          idx +
          ',this)">View items (' +
          items.length +
          ")</button>" +
          '<div class="items" id="items-' +
          idx +
          '" style="display:none">' +
          items.map(itemRow).join("") +
          "</div>" +
          "</div>"
        );
      }

      function render(order) {
        const sm = order.healthSummary || {};
        const guar = order.guaranteeUntil
          ? new Date(order.guaranteeUntil)
          : null;
        const guarLive = guar && guar.getTime() > Date.now();
        const html =
          '<div class="head">' +
          "<div><h1>Your account set</h1>" +
          '<div class="sub">Order ' +
          esc(order.orderNo) +
          " · " +
          esc(order.setName) +
          " · " +
          (order.units || []).length +
          " accounts</div></div>" +
          '<button class="btn" id="recheck">Re-check health</button>' +
          "</div>" +
          '<div class="card summary">' +
          '<div class="sumtop"><div class="big"><b>' +
          (sm.alive || 0) +
          "</b> of " +
          (sm.total || 0) +
          " working</div>" +
          (guarLive
            ? '<span class="guar">✓ Guaranteed until ' +
              guar.toLocaleDateString() +
              "</span>"
            : "") +
          "</div>" +
          healthBar(sm) +
          "</div>" +
          '<div class="grid">' +
          (order.units || []).map(acctCard).join("") +
          "</div>";
        $("root").innerHTML = html;
        const rc = $("recheck");
        if (rc) rc.addEventListener("click", recheck);
      }

      async function load() {
        try {
          const res = await fetch("/bulk-orders/portal/" + token, {
            credentials: "same-origin",
          });
          const data = await res.json();
          if (!res.ok || !data.success)
            throw new Error(data.message || "Order not found");
          render(data.order);
        } catch (e) {
          $("root").innerHTML =
            '<div class="state">' +
            esc(e.message || "This order link is invalid or expired.") +
            "</div>";
        }
      }

      async function recheck() {
        const btn = $("recheck");
        btn.disabled = true;
        btn.textContent = "Checking…";
        try {
          const res = await fetch(
            "/bulk-orders/portal/" + token + "/health-check",
            { method: "POST", credentials: "same-origin" },
          );
          const data = await res.json();
          if (!res.ok || !data.success)
            throw new Error(data.message || "Check failed");
          const sm = (data.order && data.order.healthSummary) || {};
          toast(
            (sm.alive || 0) + " of " + (sm.total || 0) + " working",
          );
          render(data.order);
        } catch (e) {
          toast(e.message);
          const b = $("recheck");
          if (b) {
            b.disabled = false;
            b.textContent = "Re-check health";
          }
        }
      }

      load();
    </script>
    <script src="/theme.js"></script>
  </body>
</html>
