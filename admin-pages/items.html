
<!DOCTYPE html>
<html>

<head>
<script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>

<title>

Items Manager

</title>

<style>

  :root{--bg:#f6f7fb;--surface:#ffffff;--surface-2:#f8fafc;--line:#e7eaf0;--ink:#0f172a;--muted:#6b7280;}
  html[data-theme="dark"]{--bg:#0e1014;--surface:#161a22;--surface-2:#1e232e;--line:#2a3140;--ink:#e8ebf2;--muted:#9aa3b4;color-scheme:dark;}
  html[data-theme="dark"] .nav .links a.active{background:rgba(99,102,241,0.20);}
  html[data-theme="dark"] .nav .me .logout:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.4);}
  .themebtn{cursor:pointer;}
  .theme-fab{position:fixed;top:16px;right:16px;z-index:80;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px rgba(15,23,42,.12);transition:background .15s;}
  .theme-fab:hover{background:var(--surface-2);}

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #4f46e5; --accent2: #6366f1; --ink: #0f172a; --muted: #6b7280;  }
    body { font-family: "Inter", "Segoe UI", Tahoma, sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; overflow: hidden; }

    .nav { width: 236px; background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; flex-shrink: 0; }
    .nav .brand { display: flex; align-items: center; gap: 10px; padding: 18px 20px; border-bottom: 1px solid var(--line); }
    .nav .brand .mark { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: grid; place-items: center; box-shadow: 0 6px 14px rgba(79,70,229,0.32); }
    .nav .brand b { font-size: 15px; font-weight: 700; line-height: 1.15; }
    .nav .brand b span { display: block; font-size: 10.5px; color: var(--muted); font-weight: 500; }
    .nav .links { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .nav .links a { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 10px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; }
    .nav .links a:hover { background: var(--surface-2); }
    .nav .links a.active { background: #eef2ff; color: var(--accent); font-weight: 600; }
    .nav .me { border-top: 1px solid var(--line); padding: 14px; display: flex; align-items: center; gap: 10px; }
    .nav .me .av { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#34d399,#10b981); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .nav .me .who { line-height: 1.2; min-width: 0; }
    .nav .me .who b { font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
    .nav .me .who span { display: block; font-size: 11px; color: var(--muted); }
    .nav .me .logout { margin-left: auto; width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); display: grid; place-items: center; cursor: pointer; }
    .nav .me .logout:hover { color: #ef4444; border-color: #fecaca; background: #fef2f2; }

    .page { flex: 1; overflow-y: auto; padding: 30px 34px; min-width: 0; }
    .page h1 { font-size: 22px; font-weight: 800; margin-bottom: 22px; }
    input, select, textarea { width: 100%; padding: 12px 14px; margin-bottom: 6px; border-radius: 12px; border: 1.5px solid var(--line); outline: none; background: var(--surface-2); color: var(--ink); font-size: 14px; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 4px rgba(79,70,229,0.12); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    button { padding: 12px 18px; border: none; border-radius: 11px; cursor: pointer; background: linear-gradient(180deg, var(--accent2), var(--accent)); color: #fff; font-weight: 600; font-family: inherit; font-size: 14px; }
    button:hover { opacity: 0.95; }
    h2 { font-weight: 800; }
    h3 { font-weight: 700; }

    /* Items page components */
    #itemsList { display: grid; gap: 18px; margin-top: 22px; }
    .item { background: var(--surface); padding: 20px; border-radius: 18px; border: 1px solid var(--line); box-shadow: 0 1px 2px rgba(16,24,40,0.04); }
    .item.used { background: #fef2f2; border: 1px solid #fecaca; }
    .itemHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .status { font-size: 13px; font-weight: 700; }
    .available { color: #059669; }
    .usedText { color: #dc2626; }
    .row { margin-bottom: 10px; color: var(--muted); }
    .deleteBtn { margin-top: 18px; }
    #statsBar .item h3 { font-size: 13px; color: var(--muted); font-weight: 600; }
    #statsBar .item h2 { font-size: 30px; margin: 6px 0 0; }
    #searchInput { max-width: 420px; }
  </style>

</head>

<body>
<aside class="nav">
  <div class="brand">
    <span class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 8.5 12 15 22 8.5 12 2"></polygon><path d="M2 8.5v7L12 22l10-6.5v-7"></path></svg></span>
    <b>RedeemHub<span>Admin console</span></b>
  </div>
  <nav class="links">
      <a href="/admin.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Inbox</a>
      <a href="/orders"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M3 9h18M7 14h6"></path></svg> Orders</a>
      <a href="/generate.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M2 7l10 5 10-5"></path></svg> Generate code</a>
      <a class="active" href="/items"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m7.5 4.27 9 5.15M21 8l-9 5-9-5 9-5 9 5zM3 8v8l9 5 9-5V8"></path></svg> Items</a>
      <a href="/inventory"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 7H4M16 3H8M6 11h12l-1 10H7z"></path></svg> Inventory</a>
    <a href="/twitch-inventory.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"></rect><path d="M8 21h8M12 18v3M7 8h.01M11 8h2"></path></svg> Twitch drops</a>
  </nav>
  <div class="me">
    <span class="av" id="meAvatar">--</span>
    <div class="who"><b id="meName">Admin</b><span id="meRole">Seller</span></div>
    <button class="logout themebtn" data-theme-toggle onclick="toggleTheme()" title="Toggle dark mode" aria-pressed="false"><svg class="t-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg><svg class="t-sun" style="display:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg></button>
    <button class="logout" id="logoutBtn" title="Log out"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path></svg></button>
  </div>
</aside>
<main class="page">


<h1>

Items Manager

</h1>
<div

class="item"

style="
margin-bottom:28px;
"

>

<h2 style="
margin-top:0;
margin-bottom:22px;
">

Add Inventory Item

</h2>
<div

style="
display:grid;
grid-template-columns:
1fr auto;
gap:14px;
margin-bottom:18px;
align-items:center;
"

>

<select id="category">

</select>

<button
onclick="addCategory()"
>

+ Category

</button>

</div>

<div

class="formGrid"

style="
display:grid;
grid-template-columns:
1fr 1fr;
gap:14px;
margin-bottom:14px;
"

>
<div>

<label style="
display:block;
margin-bottom:8px;
color:var(--muted);
font-size:13px;
">

Username

</label>

<input
id="username"
placeholder="Username"
>

</div>

</div>

<div>

<label style="
display:block;
margin-bottom:8px;
color:var(--muted);
font-size:13px;
">

Password

</label>

<input
id="password"
placeholder="Password"
>

</div>

<div>

<label style="
display:block;
margin-bottom:8px;
color:var(--muted);
font-size:13px;
">

Notes

</label>

<input
id="notes"
placeholder="Notes"
>

</div>

<div>

<label style="
display:block;
margin-bottom:8px;
color:var(--muted);
font-size:13px;
">

Item Value

</label>

<input

id="value"

type="number"

placeholder="Item Value ($)"

min="0"

step="0.01"

>

</div>

</div>

<div
style="
display:flex;
justify-content:flex-end;
margin-top:10px;
"
>

<button

onclick="addItem()"

style="
padding:14px 28px;
font-size:15px;
"

>

Save Item

</button>

</div>

</div>


<hr style="margin:28px 0;">
<input

id="searchInput"

placeholder="Search accounts..."

oninput="loadItems()"

>

<div

id="statsBar"

style="
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(
220px,
1fr
)
);
gap:14px;
margin:24px 0;
"

>

</div>

<div id="itemsList">

</div>

<script>
function loadCategories(){

  const saved =

    JSON.parse(

      localStorage.getItem(
        "itemCategories"
      )

      ||

      '["Twitch","Rust","Steam"]'

    );

  const select =

    document
      .getElementById(
        "category"
      );

  select.innerHTML="";

  saved.forEach(

    cat=>{

      select.innerHTML +=

      `<option>

        ${cat}

      </option>`;

    }

  );

}

function addCategory(){

  const name =

    prompt(
      "Category name:"
    );

  if(

    !name

  ) return;

  const categories =

    JSON.parse(

      localStorage.getItem(

        "itemCategories"

      )

      ||

      '[]'

    );

  if(

    categories.includes(
      name
    )

  ){

    alert(
      "Already exists"
    );

    return;

  }

  categories.push(
    name
  );

  localStorage.setItem(

    "itemCategories",

    JSON.stringify(
      categories
    )

  );

  loadCategories();

}
async function loadItems(){

  const res =

    await fetch(
      "/items/list"
    );

  const items =

    await res.json();

  const search =

    document
      .getElementById(
        "searchInput"
      )
      .value
      .toLowerCase();

  const list =

    document
      .getElementById(
        "itemsList"
      );
  const statsBar =

  document
    .getElementById(
      "statsBar"
    );

  list.innerHTML="";

  statsBar.innerHTML="";


const filteredItems =

  items.filter(

    item=>

      !search

      ||

      JSON.stringify(
        item
      )

      .toLowerCase()

      .includes(
        search
      )

  );

const totalValue =

  filteredItems.reduce(

    (sum,item)=>

      sum +

      Number(
        item.value
        ||0
      ),

    0

  );

const availableValue =

  filteredItems

  .filter(
    i=>!i.used
  )

  .reduce(

    (sum,item)=>

      sum +

      Number(
        item.value
        ||0
      ),

    0

  );

const soldValue =

  filteredItems

  .filter(
    i=>i.used
  )

  .reduce(

    (sum,item)=>

      sum +

      Number(
        item.value
        ||0
      ),

    0

  );
  
  const grouped = {};

  filteredItems.forEach(

    item=>{

      if(

        !grouped[
          item.category
        ]

      ){

        grouped[
          item.category
        ]=[];

      }

      grouped[
        item.category
      ].push(item);

    }

  );

  statsBar.innerHTML =

`

<div class="item">

<h3>

💰 Inventory Value

</h3>

<h2 style="
font-size:34px;
margin:10px 0 0;
color:#22c55e;
">

$${totalValue.toFixed(2)}

</h2>

</div>

<div class="item">

<h3>

🟢 Available Value

</h3>

<h2>

$${availableValue.toFixed(2)}

</h2>

</div>

<div class="item">

<h3>

🔴 Sold Value

</h3>

<h2>

$${soldValue.toFixed(2)}

</h2>

</div>

<div class="item">

<h3>

📦 Total Items

</h3>

<h2>

${filteredItems.length}

</h2>

</div>

`;

  Object.keys(

    grouped

  ).forEach(

    category=>{

      const categoryItems =

        grouped[
          category
        ];

      const available =

        categoryItems
        .filter(
          i=>!i.used
        )
        .length;

      const used =

        categoryItems
        .filter(
          i=>i.used
        )
        .length;

      list.innerHTML +=

`
<div class="item">

<div style="

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:14px;

">

<div>

<h2 style="
margin:0;
">

${category}

</h2>

<div style="
font-size:13px;
color:var(--muted);
">

🟢 ${available}

•

🔴 ${used}

•

${categoryItems.length}

</div>

</div>

<button

onclick="toggleCategory('${category}')"

>

Toggle

</button>

</div>

<div

id="cat-${category}"

>

`;

      [...categoryItems]

      .reverse()

      .forEach(

        item=>{

          list.innerHTML +=

`
<div style="

display:flex;

justify-content:space-between;

align-items:center;

padding:10px;

margin-bottom:8px;

border-radius:12px;

background:

${
  item.used

  ?

  "#fef2f2"

  :

  "var(--surface-2)"
};

">

<div>

<b>

${item.username}

</b>

<span style="
color:var(--muted);
">

| ${item.password}

</span>

${
  item.notes

  ?

  `<span style="
color:var(--muted);
">

| ${item.notes}

</span>`

  :

  ""
}

${
  item.value

  ?

  `<span style="
color:#22c55e;
">

| $

${Number(
item.value
).toFixed(2)}

</span>`

  :

  ""
}


</div>

<div style="
display:flex;
gap:12px;
align-items:center;
">

<span>

${
  item.used

  ?

  "🔴 Used"

  :

  "🟢 Ready"
}

</span>

<button
onclick="
deleteItem(
'${item.id}'
)
">

Delete

</button>

</div>

</div>

`;

        }

      );

      list.innerHTML +=

`
</div>

</div>
`;

    }

  );

}

async function addItem(){

  const category =

    document
      .getElementById(
        "category"
      )
      .value;

  const username =

    document
      .getElementById(
        "username"
      )
      .value;

  const password =

    document
      .getElementById(
        "password"
      )
      .value;

  const notes =

    document
      .getElementById(
        "notes"
      )
      .value;

  const value =

  parseFloat(

    document
      .getElementById(
        "value"
      )
      .value

  ) || 0;
  await fetch(

    "/items/add",

    {

      method:"POST",

      headers:{

        "Content-Type":
          "application/json"

      },

      body:JSON.stringify({

        category,
        username,
        password,
        notes,
        value

      })

    }

  );

  document
    .getElementById(
      "username"
    )
    .value="";

  document
    .getElementById(
      "password"
    )
    .value="";

  document
    .getElementById(
      "notes"
    )
    .value="";
  document
    .getElementById(
    "value"
    )
    .value="";

  loadItems();


}


function toggleCategory(

  category

){

  const box =

    document
      .getElementById(

        `cat-${category}`

      );

  box.style.display =

    box.style.display
    ===
    "none"

    ?

    "block"

    :

    "none";

}

async function deleteItem(id){

  await fetch(

    `/items/delete/${id}`,

    {

      method:"DELETE"

    }

  );

  loadItems();

}

loadCategories();

loadItems();

</script>


</main>
<script>
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    try {
      await fetch("/admin-logout", { method: "POST", credentials: "same-origin" });
    } catch (e) { /* ignore */ }
    window.location.href = "/admin-login.html";
  });
  (async () => {
    try {
      const r = await fetch("/whoami");
      if (r.ok) {
        const data = await r.json();
        const admin = data && data.admin ? data.admin : {};
        const name = admin.username || "Admin";
        document.getElementById("meName").innerText = name;
        document.getElementById("meRole").innerText = "Seller" + (admin.id ? " \u00b7 " + admin.id : "");
        document.getElementById("meAvatar").innerText = name.slice(0, 2).toUpperCase();
      }
    } catch (e) { /* non-fatal */ }
  })();
</script>
<script src="/theme.js"></script>
</body>

</html>
