
<!DOCTYPE html>
<html>

<head>

<title>

Items Manager

</title>

<style>

body{

  background:#020617;

  color:white;

  font-family:'Segoe UI',sans-serif;

  padding:40px;

  max-width:1600px;

  margin:auto;

}

h1{

  margin-bottom:24px;

}

input,select{

  width:100%;

  padding:14px;

  margin-bottom:14px;

  border-radius:12px;

  border:none;

  outline:none;

  background:#1e293b;

  color:white;

  font-size:14px;

}

button{

  padding:12px 18px;

  border:none;

  border-radius:12px;

  cursor:pointer;

  background:#ef4444;

  color:white;

  font-weight:600;

}

button:hover{

  opacity:.92;

}

#itemsList{

  display:grid;

  gap:18px;

  margin-top:22px;

}

.item{

  background:#0f172a;

  padding:20px;

  border-radius:18px;

  border:

    1px solid

    rgba(255,255,255,.08);

}

.item.used{

  background:

    rgba(127,29,29,.30);

  border:

    1px solid

    #ef4444;

}

.itemHeader{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:18px;

}

.status{

  font-size:13px;

  font-weight:700;

}

.available{

  color:#22c55e;

}

.usedText{

  color:#ef4444;

}

.row{

  margin-bottom:10px;

  color:#cbd5e1;

}

.deleteBtn{

  margin-top:18px;

}

@media(max-width:768px){

    .formGrid{

  grid-template-columns:
  1fr !important;

}

  body{

    padding:20px;

  }

}

</style>

</head>

<body>

<h1>

Items Manager

</h1>

<div

style="
display:grid;
grid-template-columns:
1fr auto;
gap:14px;
margin-bottom:18px;
align-items:center;
"

>

<select id="category">

</select>

<button
onclick="addCategory()"
>

+ Category

</button>

</div>

<div

class="formGrid"

style="
display:grid;
grid-template-columns:
1fr 1fr;
gap:14px;
margin-bottom:14px;
"

>

<input
id="username"
placeholder="Username"
>

<input
id="password"
placeholder="Password"
>

<input
id="notes"
placeholder="Notes"
>

<input

id="value"

type="number"

placeholder="Item Value ($)"

min="0"

step="0.01"

>

</div>

<div
style="
display:flex;
justify-content:flex-end;
margin-bottom:10px;
"
>

<button
onclick="addItem()"
>

Save Item

</button>

</div>


<hr style="margin:28px 0;">
<input

  id="searchInput"

  placeholder="Search accounts..."

  oninput="loadItems()"

>

<div id="itemsList">

</div>

<script>
function loadCategories(){

  const saved =

    JSON.parse(

      localStorage.getItem(
        "itemCategories"
      )

      ||

      '["Twitch","Rust","Steam"]'

    );

  const select =

    document
      .getElementById(
        "category"
      );

  select.innerHTML="";

  saved.forEach(

    cat=>{

      select.innerHTML +=

      `<option>

        ${cat}

      </option>`;

    }

  );

}

function addCategory(){

  const name =

    prompt(
      "Category name:"
    );

  if(

    !name

  ) return;

  const categories =

    JSON.parse(

      localStorage.getItem(

        "itemCategories"

      )

      ||

      '[]'

    );

  if(

    categories.includes(
      name
    )

  ){

    alert(
      "Already exists"
    );

    return;

  }

  categories.push(
    name
  );

  localStorage.setItem(

    "itemCategories",

    JSON.stringify(
      categories
    )

  );

  loadCategories();

}
async function loadItems(){

  const res =

    await fetch(
      "/items/list"
    );

  const items =

    await res.json();

  const search =

    document
      .getElementById(
        "searchInput"
      )
      .value
      .toLowerCase();

  const list =

    document
      .getElementById(
        "itemsList"
      );

  list.innerHTML="";

  const grouped = {};

  items.forEach(

    item=>{

      if(

        search

        &&

        !JSON.stringify(
          item
        )

        .toLowerCase()

        .includes(
          search
        )

      ){

        return;

      }

      if(

        !grouped[
          item.category
        ]

      ){

        grouped[
          item.category
        ]=[];

      }

      grouped[
        item.category
      ].push(item);

    }

  );

  Object.keys(

    grouped

  ).forEach(

    category=>{

      const categoryItems =

        grouped[
          category
        ];

      const available =

        categoryItems
        .filter(
          i=>!i.used
        )
        .length;

      const used =

        categoryItems
        .filter(
          i=>i.used
        )
        .length;

      list.innerHTML +=

`
<div class="item">

<div style="

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:14px;

">

<div>

<h2 style="
margin:0;
">

${category}

</h2>

<div style="
font-size:13px;
color:#94a3b8;
">

🟢 ${available}

•

🔴 ${used}

•

${categoryItems.length}

</div>

</div>

<button

onclick="toggleCategory('${category}')"

>

Toggle

</button>

</div>

<div

id="cat-${category}"

>

`;

      [...categoryItems]

      .reverse()

      .forEach(

        item=>{

          list.innerHTML +=

`
<div style="

display:flex;

justify-content:space-between;

align-items:center;

padding:10px;

margin-bottom:8px;

border-radius:12px;

background:

${
  item.used

  ?

  "rgba(127,29,29,.35)"

  :

  "#1e293b"
};

">

<div>

<b>

${item.username}

</b>

<span style="
color:#94a3b8;
">

| ${item.password}

</span>

${
  item.notes

  ?

  `<span style="
color:#64748b;
">

| ${item.notes}

</span>`

  :

  ""
}

</div>

<div style="
display:flex;
gap:12px;
align-items:center;
">

<span>

${
  item.used

  ?

  "🔴 Used"

  :

  "🟢 Ready"
}

</span>

<button
onclick="
deleteItem(
'${item.id}'
)
">

Delete

</button>

</div>

</div>

`;

        }

      );

      list.innerHTML +=

`
</div>

</div>
`;

    }

  );

}

async function addItem(){

  const category =

    document
      .getElementById(
        "category"
      )
      .value;

  const username =

    document
      .getElementById(
        "username"
      )
      .value;

  const password =

    document
      .getElementById(
        "password"
      )
      .value;

  const notes =

    document
      .getElementById(
        "notes"
      )
      .value;

  const value =

  parseFloat(

    document
      .getElementById(
        "value"
      )
      .value

  ) || 0;
  await fetch(

    "/items/add",

    {

      method:"POST",

      headers:{

        "Content-Type":
          "application/json"

      },

      body:JSON.stringify({

        category,
        username,
        password,
        notes,
        value

      })

    }

  );

  document
    .getElementById(
      "username"
    )
    .value="";

  document
    .getElementById(
      "password"
    )
    .value="";

  document
    .getElementById(
      "notes"
    )
    .value="";
  document
    .getElementById(
    "value"
    )
    .value="";

  loadItems();


}


function toggleCategory(

  category

){

  const box =

    document
      .getElementById(

        `cat-${category}`

      );

  box.style.display =

    box.style.display
    ===
    "none"

    ?

    "block"

    :

    "none";

}

async function deleteItem(id){

  await fetch(

    `/items/delete/${id}`,

    {

      method:"DELETE"

    }

  );

  loadItems();

}

loadCategories();

loadItems();

</script>

</body>

</html>
