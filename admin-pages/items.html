```html
<!DOCTYPE html>
<html>

<head>

<title>

Items Manager

</title>

<style>

body{

  background:#020617;

  color:white;

  font-family:'Segoe UI',sans-serif;

  padding:40px;

}

h1{

  margin-bottom:24px;

}

input,select{

  width:100%;

  padding:14px;

  margin-bottom:14px;

  border-radius:12px;

  border:none;

  outline:none;

  background:#1e293b;

  color:white;

  font-size:14px;

}

button{

  padding:12px 18px;

  border:none;

  border-radius:12px;

  cursor:pointer;

  background:#ef4444;

  color:white;

  font-weight:600;

}

button:hover{

  opacity:.92;

}

#itemsList{

  display:grid;

  gap:18px;

  margin-top:22px;

}

.item{

  background:#0f172a;

  padding:20px;

  border-radius:18px;

  border:

    1px solid

    rgba(255,255,255,.08);

}

.item.used{

  background:

    rgba(127,29,29,.30);

  border:

    1px solid

    #ef4444;

}

.itemHeader{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:18px;

}

.status{

  font-size:13px;

  font-weight:700;

}

.available{

  color:#22c55e;

}

.usedText{

  color:#ef4444;

}

.row{

  margin-bottom:10px;

  color:#cbd5e1;

}

.deleteBtn{

  margin-top:18px;

}

@media(max-width:768px){

  body{

    padding:20px;

  }

}

</style>

</head>

<body>

<h1>

Items Manager

</h1>

<select id="category">

  <option>Twitch</option>

  <option>Rust</option>

  <option>Steam</option>

</select>

<input
id="username"
placeholder="Username"
>

<input
id="password"
placeholder="Password"
>

<input
id="notes"
placeholder="Notes"
>

<button
onclick="addItem()"
>

Save Item

</button>

<hr style="margin:28px 0;">

<div id="itemsList">

</div>

<script>

async function loadItems(){

  const res =

    await fetch(

      "/items/list"

    );

  const items =

    await res.json();

  const list =

    document
      .getElementById(
        "itemsList"
      );

  list.innerHTML="";

  items.reverse();

  items.forEach(

    (item)=>{

      list.innerHTML +=

`
<div class="item ${item.used ? 'used' : ''}">

<div class="itemHeader">

<div>

<b>

${item.category}

</b>

</div>

<div class="status">

${
  item.used

  ?

  `<span class="usedText">

  🔴 USED

  </span>`

  :

  `<span class="available">

  🟢 AVAILABLE

  </span>`
}

</div>

</div>

<div class="row">

👤 User:
${item.username}

</div>

<div class="row">

🔑 Pass:
${item.password}

</div>

${
  item.notes

  ?

  `<div class="row">

  📝 ${item.notes}

  </div>`

  :

  ""

}

<button

class="deleteBtn"

onclick="deleteItem('${item.id}')"

>

Delete

</button>

</div>
`;

    }

  );

}

async function addItem(){

  const category =

    document
      .getElementById(
        "category"
      )
      .value;

  const username =

    document
      .getElementById(
        "username"
      )
      .value;

  const password =

    document
      .getElementById(
        "password"
      )
      .value;

  const notes =

    document
      .getElementById(
        "notes"
      )
      .value;

  await fetch(

    "/items/add",

    {

      method:"POST",

      headers:{

        "Content-Type":
          "application/json"

      },

      body:JSON.stringify({

        category,
        username,
        password,
        notes

      })

    }

  );

  document
    .getElementById(
      "username"
    )
    .value="";

  document
    .getElementById(
      "password"
    )
    .value="";

  document
    .getElementById(
      "notes"
    )
    .value="";

  loadItems();

}

async function deleteItem(id){

  await fetch(

    `/items/delete/${id}`,

    {

      method:"DELETE"

    }

  );

  loadItems();

}

loadItems();

</script>

</body>

</html>
```
