<!DOCTYPE html>
<html>

<head>

<title>

Inventory

</title>

<style>

body{

  background:#020617;

  color:white;

  font-family:
    'Segoe UI',
    sans-serif;

  padding:30px;

}

input,select{

  width:100%;

  padding:12px;

  border:none;

  border-radius:10px;

  background:#1e293b;

  color:white;

}

button{

  border:none;

  border-radius:10px;

  padding:12px 18px;

  cursor:pointer;

  color:white;

}

.saveBtn{

  background:#22c55e;

}

.usedBtn{

  background:#eab308;

}

.usedDone{

  background:#16a34a;

  cursor:default;

}

.card{

  background:#0f172a;

  border-radius:16px;

  padding:20px;

  margin-bottom:20px;

}

.grid{

  display:grid;

  grid-template-columns:

    repeat(
      auto-fit,
      minmax(
        220px,
        1fr
      )
    );

  gap:16px;

}

.account{

  background:#111827;

  padding:14px;

  border-radius:12px;

  margin-bottom:10px;

}

.used{

  opacity:.55;

}

.categoryHeader{

  display:flex;

  justify-content:
    space-between;

  margin-bottom:12px;

}

</style>

</head>

<body>

<h1>

Inventory

</h1>

<div class="card">

<div class="grid">

<div>

<select
id="category"
>

</select>

</div>

<div>

<input
id="newCategory"
placeholder="New Category"
style="margin-bottom:10px;"
>

<input
id="categoryNote"
placeholder="Category Note"
>

</div>

<div>

<input
id="username"
placeholder="Username"
>

</div>

<div>

<input
id="password"
placeholder="Password"
>
<textarea

id="bulkInput"

placeholder="Mass Add

username:password
user2:pass2
user3:pass3"

style="
width:100%;
height:160px;
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
resize:vertical;
"

></textarea>
</div>

</div>

<br>

<button

class="saveBtn"

onclick="addAccount()"

>

Add Account
<button

onclick="bulkAdd()"

style="
background:#2563eb;
margin-left:10px;
"

>

Mass Add

</button>
</button>

</div>

<input

id="search"

placeholder="Search..."

oninput="loadInventory()"

>

<br><br>

<div
id="inventoryList"
>

</div>

<script>

const categoryNotes =

  JSON.parse(

    localStorage.getItem(
      "inventoryCategoryNotes"
    )

    ||

    "{}"

  );

const collapsedCategories =

  JSON.parse(

    localStorage.getItem(
      "inventoryCollapsed"
    )

    ||

    "{}"

  );

function loadCategories(){

  const cats =

    JSON.parse(

      localStorage.getItem(
        "inventoryCategories"
      )

      ||

      '["Rust","Steam","Twitch"]'

    );

  const select =

    document
      .getElementById(
        "category"
      );

  select.innerHTML="";

  cats.forEach(

    cat=>{

      select.innerHTML +=

`<option>${cat}</option>`;

    }

  );

}

async function addAccount(){

  const newCat =

    document
      .getElementById(
        "newCategory"
      )
      .value
      .trim();

  const selectedCategory =

    document
      .getElementById(
        "category"
      )
      .value;

  const note =

    document
      .getElementById(
        "categoryNote"
      )
      .value
      .trim();

  if(

    note

  ){

    categoryNotes[

      newCat ||

      selectedCategory

    ] = note;

    localStorage.setItem(

      "inventoryCategoryNotes",

      JSON.stringify(
        categoryNotes
      )

    );

  }

  if(

    newCat

  ){

    const cats =

      JSON.parse(

        localStorage.getItem(
          "inventoryCategories"
        )

        ||

        "[]"

      );

    if(

      !cats.includes(
        newCat
      )

    ){

      cats.push(
        newCat
      );

      localStorage.setItem(

        "inventoryCategories",

        JSON.stringify(
          cats
        )

      );

    }

    loadCategories();

    document
      .getElementById(
        "category"
      )
      .value =
        newCat;

  }

  await fetch(

    "/inventory/add",

    {

      method:"POST",

      headers:{

        "Content-Type":
          "application/json"

      },

      body:JSON.stringify({

        category:

          document
            .getElementById(
              "category"
            )
            .value,

        username:

          document
            .getElementById(
              "username"
            )
            .value,

        password:

          document
            .getElementById(
              "password"
            )
            .value

      })

    }

  );

  loadInventory();

}
async function bulkAdd(){

  const category =

    document
      .getElementById(
        "category"
      )
      .value;

  const raw =

    document
      .getElementById(
        "bulkInput"
      )
      .value
      .trim();

  if(

    !raw

  ){

    alert(

      "Paste accounts first."

    );

    return;

  }

  const lines =

    raw.split("\n");

  for(

    const line

    of

    lines

  ){

    const parts =

      line
        .trim()
        .split(":");

    if(

      parts.length
      < 2

    ){

      continue;

    }

    const username =
      parts[0]
      .trim();

    const password =

      parts
        .slice(1)
        .join(":")
        .trim();

    await fetch(

      "/inventory/add",

      {

        method:"POST",

        headers:{

          "Content-Type":
            "application/json"

        },

        body:JSON.stringify({

          category,

          username,

          password

        })

      }

    );

  }

  document
    .getElementById(
      "bulkInput"
    )
    .value = "";

  loadInventory();

}
async function markUsed(id){

  await fetch(

    `/inventory/mark-used/${id}`,

    {

      method:"POST"

    }

  );

  loadInventory();

}

async function markUnused(id){

  await fetch(

    `/inventory/mark-unused/${id}`,

    {

      method:"POST"

    }

  );

  loadInventory();

}

async function deleteAccount(id){

  if(

    !confirm(
      "Delete account?"
    )

  ){

    return;

  }

  await fetch(

    `/inventory/delete/${id}`,

    {

      method:"DELETE"

    }

  );

  loadInventory();

}

function toggleCategory(

  category

){

  collapsedCategories[
    category
  ] =

    !collapsedCategories[
      category
    ];

  localStorage.setItem(

    "inventoryCollapsed",

    JSON.stringify(

      collapsedCategories

    )

  );

  loadInventory();

}

async function loadInventory(){

  const res =

    await fetch(
      "/inventory/list"
    );

  const data =

    await res.json();

  const search =

    document
      .getElementById(
        "search"
      )
      .value
      .toLowerCase();

  const list =

    document
      .getElementById(
        "inventoryList"
      );

  list.innerHTML="";

  const grouped = {};

  data.forEach(

    item=>{

      if(

        search

        &&

        !JSON.stringify(
          item
        )

        .toLowerCase()

        .includes(
          search
        )

      ){

        return;

      }

      if(

        !grouped[
          item.category
        ]

      ){

        grouped[
          item.category
        ]=[];

      }

      grouped[
        item.category
      ]

      .push(
        item
      );

    }

  );

  Object.keys(

    grouped

  )

  .sort()

  .forEach(

    category=>{

      list.innerHTML +=

`
<div class="card">

<div class="categoryHeader">

<div>

<h2>

${category}

(${grouped[
  category
].length})

</h2>

${

categoryNotes[
  category
]

?

`

<div
style="
color:#94a3b8;
font-size:13px;
margin-top:6px;
"

>

${categoryNotes[
  category
]}

</div>

`

:

""

}

</div>

<button

onclick="toggleCategory(

'${category}'

)"

style="
background:#334155;
"

>

${

collapsedCategories[
  category
]

?

"Expand"

:

"Collapse"

}

</button>

</div>

${

collapsedCategories[
  category
]

?

""

:

grouped[
  category
]

.map(

item=>`

<div class="account ${

item.used
?
"used"
:
""

}">

${item.username}

|

${item.password}

<br><br>

${

!item.used

?

`

<button
class="usedBtn"
onclick="markUsed('${item.id}')"
>

Mark Used

</button>

`

:

`

<button
onclick="markUnused('${item.id}')"
style="
background:#2563eb;
margin-right:8px;
"
>

Unused

</button>

<button
class="usedDone"
disabled
>

Used ✓

</button>

`

}

<button
onclick="deleteAccount('${item.id}')"
style="
background:#dc2626;
margin-left:8px;
"
>

Delete

</button>

</div>

`

)

.join("")

}

</div>
`;

    }

  );

}

loadCategories();

loadInventory();

</script>

</body>

</html>
